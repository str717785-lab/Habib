function isLockedOut() {
  const l = getLockout();
  if (!l) return false;
  if (l.until && Date.now() < l.until) return l.until;

}

}

  btn.disabled = true; btn.textContent = 'Checking...';
  const val = document.getElementById('passInput').value;
  const hash = await hashStr(val);
  btn.disabled = false; btn.textContent = 'Login';
  if (hash === PASS_HASH) {
    clearLockout();
    sessionStorage.setItem(SK, '1');
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('adminSection').style.display = 'block';
    fetchVideos();
  } else {
    const attempts = recordFailedAttempt();
    const pi = document.getElementById('passInput');
    pi.classList.add('err');
    const remaining = MAX_ATTEMPTS - attempts;
    const msg = remaining > 0
      ? `Wrong password. ${remaining} attempt${remaining !== 1 ? 's' : ''} remaining.`
      : `Too many failed attempts. Locked out for 15 minutes.`;
    document.getElementById('passErr').textContent = msg;
    document.getElementById('passErr').style.display = 'block';
    if (remaining <= 0) showLockoutMsg('Account locked for 15 minutes.');
    setTimeout(() => { pi.classList.remove('err'); document.getElementById('passErr').style.display = 'none'; hideLockoutMsg(); }, 3000);
  }
}

function showLockoutMsg(msg) {
  const el = document.getElementById('lockoutMsg');
  el.textContent = msg; el.style.display = 'block';
}
function hideLockoutMsg() {
  document.getElementById('lockoutMsg').style.display = 'none';
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('passInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  sessionStorage.removeItem(SK);
  location.href = 'index.html';
}
document.getElementById('logoutBtn').addEventListener('click', doLogout);

if (sessionStorage.getItem(SK) === '1') {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('adminSection').style.display = 'block';
  fetchVideos();
}

/* ── TABS ── */
document.getElementById('tab-videos').addEventListener('click', () => switchTab('videos'));
document.getElementById('tab-categories').addEventListener('click', () => switchTab('categories'));

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-videos').classList.toggle('active', tab === 'videos');
  document.getElementById('tab-categories').classList.toggle('active', tab === 'categories');
  document.getElementById('videosTab').style.display     = tab === 'videos'     ? 'block' : 'none';
  document.getElementById('categoriesTab').style.display = tab === 'categories' ? 'block' : 'none';
  document.getElementById('addVideoBtn').style.display   = tab === 'videos'     ? 'flex'  : 'none';
  if (tab === 'categories') renderCategories();
}

/* ── FETCH — uses orderBy + limit for performance ── */
async function fetchVideos() {
  document.getElementById('videoList').innerHTML = '<div class="skeleton" style="height:70px"></div>'.repeat(3);
  document.getElementById('listCount').textContent = 'Loading...';
  try {
    const snap = await getDocs(query(collection(db, 'videos'), orderBy('title'), limit(QUERY_LIMIT)));
    videos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    selectedIds.clear();
    renderList();
    populateCatDropdowns();
    if (currentTab === 'categories') renderCategories();
  } catch(e) {
    console.error(e);
    showToast('❌ Failed to load. Check Firestore rules.');
    document.getElementById('listCount').textContent = 'Error';
    document.getElementById('videoList').innerHTML = '';
  }
}
window.fetchVideos = fetchVideos;
document.getElementById('refreshBtn').addEventListener('click', fetchVideos);

/* ── RENDER VIDEO LIST — all output HTML-escaped ── */
function renderList() {
  const q = (document.getElementById('searchBox')?.value || '').toLowerCase().trim();
  const filtered = q ? videos.filter(v => (v.title||'').toLowerCase().includes(q) || getCh(v).toLowerCase().includes(q)) : videos;

  document.getElementById('listCount').textContent = `${filtered.length} of ${videos.length} video${videos.length !== 1 ? 's' : ''}`;
  document.getElementById('selectAllRow').style.display = filtered.length ? 'flex' : 'none';
  document.getElementById('selectAllCb').checked = filtered.length > 0 && filtered.every(v => selectedIds.has(v.id));
  updateBulkBar();

  const list = document.getElementById('videoList');
  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#555">No videos found.</div>';
    return;
  }

  list.innerHTML = '';
  filtered.forEach(v => {
    const item = document.createElement('div');
    item.className = `video-item${editId === v.id ? ' editing' : ''}${selectedIds.has(v.id) ? ' selected' : ''}`;
    item.id = 'item-' + v.id;

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'cb-wrap';
    cb.checked = selectedIds.has(v.id);
    cb.addEventListener('change', () => toggleSelect(v.id, cb.checked));

    const cbWrap = document.createElement('div');
    cbWrap.className = 'cb-wrap';
    cbWrap.appendChild(cb);

    const thumb = document.createElement('img');
    thumb.className = 'video-thumb';
    thumb.src = v.thumb || '';
    thumb.alt = '';
    thumb.onerror = () => { thumb.src = 'https://placehold.co/72x42/111/444?text=img'; };

    const meta = document.createElement('div');
    meta.className = 'video-meta';
    const titleEl = document.createElement('div');
    titleEl.className = 'video-title';
    titleEl.textContent = v.title || 'Untitled';
    const sub = document.createElement('div');
    sub.className = 'video-sub';
    sub.textContent = `📺 ${getCh(v)||'—'}  ⏱ ${v.duration||'—'}  👍 ${v.likes||0} 👎 ${v.dislikes||0} 👁 ${fmtNum(v.views||0)}`;
    meta.appendChild(titleEl);
    meta.appendChild(sub);

    const btns = document.createElement('div');
    btns.className = 'item-btns';

    const viewA = document.createElement('a');
    viewA.className = 'btn-icon btn-view';
    viewA.href = `video.html?id=${encodeURIComponent(v.id)}`;
    viewA.target = '_blank';
    viewA.innerHTML = '<svg class="icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

    const editB = document.createElement('button');
    editB.className = 'btn-icon btn-edit';
    editB.innerHTML = '<svg class="icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    editB.addEventListener('click', () => openEdit(v.id));

    const delB = document.createElement('button');
    delB.className = 'btn-icon btn-del';
    delB.innerHTML = '<svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
    delB.addEventListener('click', () => deleteVideo(v.id));

    btns.appendChild(viewA);
    btns.appendChild(editB);
    btns.appendChild(delB);

    item.appendChild(cbWrap);
    item.appendChild(thumb);
    item.appendChild(meta);
    item.appendChild(btns);
    list.appendChild(item);
  });
}

document.getElementById('searchBox').addEventListener('input', renderList);

/* ── BULK SELECT ── */
function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  const item = document.getElementById('item-' + id);
  if (item) item.classList.toggle('selected', checked);
  updateBulkBar();
  const q = (document.getElementById('searchBox')?.value || '').toLowerCase().trim();
  const filtered = q ? videos.filter(v => (v.title||'').toLowerCase().includes(q) || getCh(v).toLowerCase().includes(q)) : videos;
  document.getElementById('selectAllCb').checked = filtered.length > 0 && filtered.every(v => selectedIds.has(v.id));
}

document.getElementById('selectAllCb').addEventListener('change', e => {
  const q = (document.getElementById('searchBox')?.value || '').toLowerCase().trim();
  const filtered = q ? videos.filter(v => (v.title||'').toLowerCase().includes(q) || getCh(v).toLowerCase().includes(q)) : videos;
  filtered.forEach(v => { if (e.target.checked) selectedIds.add(v.id); else selectedIds.delete(v.id); });
  renderList();
});

function clearSelection() {
  selectedIds.clear();
  document.getElementById('selectAllCb').checked = false;
  renderList();
}
document.getElementById('bulkCancelBtn').addEventListener('click', clearSelection);

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const n = selectedIds.size;
  if (n > 0) {
    bar.classList.add('show');
    document.getElementById('bulkCount').textContent = `${n} video${n > 1 ? 's' : ''} selected`;
  } else {
    bar.classList.remove('show');
  }
}

/* ── ASSIGN MODAL ── */
document.getElementById('bulkAssignBtn').addEventListener('click', () => {
  populateCatDropdowns();
  document.getElementById('newCatInput').value = '';
  document.getElementById('existingCatSelect').value = '';
  document.getElementById('assignSubText').textContent = `Assign category to ${selectedIds.size} selected video${selectedIds.size > 1 ? 's' : ''}`;
  document.getElementById('assignModal').classList.add('show');
});

document.getElementById('assignCancelBtn').addEventListener('click', () => {
  document.getElementById('assignModal').classList.remove('show');
});

document.getElementById('assignConfirmBtn').addEventListener('click', async () => {
  const existing = document.getElementById('existingCatSelect').value.trim();
  const newName  = document.getElementById('newCatInput').value.trim();
  const category = newName || existing;
  if (!category) { showToast('⚠️ Enter or select a category name'); return; }
  if (selectedIds.size === 0) { document.getElementById('assignModal').classList.remove('show'); return; }

  const btn = document.getElementById('assignConfirmBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const batch = writeBatch(db);
    selectedIds.forEach(id => batch.update(doc(db, 'videos', id), { channel: category }));
    await batch.commit();
    const ids = [...selectedIds];
    videos.forEach(v => { if (ids.includes(v.id)) v.channel = category; });
    if (newName && !extraCategories.includes(newName)) extraCategories.push(newName);
    showToast(`✅ "${category}" assigned to ${ids.length} video${ids.length > 1 ? 's' : ''}`);
    document.getElementById('assignModal').classList.remove('show');
    clearSelection();
    populateCatDropdowns();
    renderList();
    if (currentTab === 'categories') renderCategories();
  } catch(e) {
    console.error(e);
    showToast('❌ Failed. Check Firestore rules.');
  } finally {
    btn.disabled = false; btn.textContent = 'Assign';
  }
});

/* ── VIDEO FORM ── */
document.getElementById('addVideoBtn').addEventListener('click', openAdd);
document.getElementById('closeFormBtn').addEventListener('click', closeForm);
document.getElementById('cancelFormBtn').addEventListener('click', closeForm);
document.getElementById('saveBtn').addEventListener('click', saveVideo);
document.getElementById('f-channel-pick').addEventListener('change', function() {
  if (this.value) { document.getElementById('f-channel').value = this.value; this.value = ''; }
});

function openAdd() {
  editId = null;
  ['title','src','thumb','preview','duration','channel','keywords'].forEach(k => document.getElementById('f-'+k).value = '');
  document.getElementById('f-views').value = '0';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-channel-pick').value = '';
  document.getElementById('formTitle').textContent = '➕ Add New Video';
  document.getElementById('saveBtnText').textContent = 'Add Video';
  document.getElementById('formCard').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}

function openEdit(id) {
  const v = videos.find(x => x.id === id);
  if (!v) return;
  editId = id;
  document.getElementById('f-title').value    = v.title || '';
  document.getElementById('f-src').value      = v.src || '';
  document.getElementById('f-thumb').value    = v.thumb || '';
  document.getElementById('f-preview').value  = v.preview || '';
  document.getElementById('f-duration').value = v.duration || '';
  document.getElementById('f-channel').value  = getCh(v);
  document.getElementById('f-views').value    = v.views || 0;
  document.getElementById('f-keywords').value = v.keywords || '';
  document.getElementById('f-desc').value     = v.description || '';
  document.getElementById('f-channel-pick').value = '';
  document.getElementById('formTitle').textContent = '✏️ Edit Video';
  document.getElementById('saveBtnText').textContent = 'Update Video';
  document.getElementById('formCard').style.display = 'block';
  renderList();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeForm() {
  editId = null;
  document.getElementById('formCard').style.display = 'none';
  renderList();
}

/* ── URL VALIDATION ── */
function isValidUrl(str) {
  if (!str) return true; // optional fields
  try { const u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; } catch { return false; }
}

async function saveVideo() {
  const title = document.getElementById('f-title').value.trim();
  const src   = document.getElementById('f-src').value.trim();
  const thumb = document.getElementById('f-thumb').value.trim();
  if (!title) { showToast('⚠️ Title is required'); return; }
  if (!src || !isValidUrl(src)) { showToast('⚠️ Valid Video URL required'); return; }
  if (!thumb || !isValidUrl(thumb)) { showToast('⚠️ Valid Thumbnail URL required'); return; }

  const preview = document.getElementById('f-preview').value.trim();
  if (preview && !isValidUrl(preview)) { showToast('⚠️ Invalid Preview URL'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  document.getElementById('saveBtnText').textContent = 'Saving...';
  try {
    const data = {
      title, src, thumb,
      preview: preview,
      duration:    document.getElementById('f-duration').value.trim(),
      channel:     document.getElementById('f-channel').value.trim(),
      views:       Math.max(0, parseInt(document.getElementById('f-views').value) || 0),
      keywords:    document.getElementById('f-keywords').value.trim(),
      description: document.getElementById('f-desc').value.trim(),
    };
    if (editId) {
      await updateDoc(doc(db, 'videos', editId), data);
      const idx = videos.findIndex(v => v.id === editId);
      if (idx !== -1) videos[idx] = { ...videos[idx], ...data };
      showToast('✅ Video updated!');
    } else {
      data.likes = 0; data.dislikes = 0;
      const ref = await addDoc(collection(db, 'videos'), { ...data, createdAt: serverTimestamp() });
      videos.push({ id: ref.id, ...data });
      showToast('✅ Video added!');
    }
    closeForm();
    populateCatDropdowns();
    renderList();
  } catch(e) {
    console.error(e);
    showToast('❌ Failed. Check Firestore write rules.');
  } finally {
    btn.disabled = false;
    document.getElementById('saveBtnText').textContent = editId ? 'Update Video' : 'Add Video';
  }
}

async function deleteVideo(id) {
  if (!confirm('Delete this video permanently?')) return;
  try {
    await deleteDoc(doc(db, 'videos', id));
    videos = videos.filter(v => v.id !== id);
    selectedIds.delete(id);
    showToast('🗑️ Deleted');
    renderList();
    if (currentTab === 'categories') renderCategories();
  } catch(e) {
    console.error(e);
    showToast('❌ Delete failed.');
  }
}

/* ── CATEGORIES TAB ── */
function renderCategories() {
  const cats = getAllCategories();
  document.getElementById('catListTitle').textContent = `Categories (${cats.length})`;
  const container = document.getElementById('catItems');
  if (cats.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#555">No categories yet.</div>';
    return;
  }
  container.innerHTML = '';
  cats.forEach(cat => {
    const count = videos.filter(v => getCh(v).toLowerCase() === cat.toLowerCase()).length;
    const row = document.createElement('div');
    row.className = 'cat-item';
    row.id = 'catrow-' + btoa(encodeURIComponent(cat)).replace(/[^a-z0-9]/gi, '_');

    const nameEl = document.createElement('div');
    nameEl.className = 'cat-name';
    nameEl.textContent = cat;

    const countEl = document.createElement('div');
    countEl.className = 'cat-count';
    countEl.textContent = `${count} video${count !== 1 ? 's' : ''}`;

    const editInput = document.createElement('input');
    editInput.className = 'cat-edit-input';
    editInput.type = 'text';
    editInput.value = cat;
    editInput.style.display = 'none';

    const actions = document.createElement('div');
    actions.className = 'cat-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'btn-cat-edit';
    editBtn.textContent = '✏️ Rename';
    editBtn.addEventListener('click', () => {
      nameEl.style.display = 'none';
      editInput.style.display = 'block';
      editBtn.style.display = 'none';
      saveBtn2.style.display = 'block';
      editInput.focus();
    });

    const saveBtn2 = document.createElement('button');
    saveBtn2.className = 'btn-cat-save';
    saveBtn2.textContent = '💾 Save';
    saveBtn2.style.display = 'none';
    saveBtn2.addEventListener('click', () => saveEditCat(cat, editInput, saveBtn2, row));

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-cat-del';
    delBtn.textContent = '🗑️ Delete';
    delBtn.addEventListener('click', () => deleteCategory(cat));

    actions.appendChild(editBtn);
    actions.appendChild(saveBtn2);
    actions.appendChild(delBtn);

    row.appendChild(nameEl);
    row.appendChild(countEl);
    row.appendChild(editInput);
    row.appendChild(actions);
    container.appendChild(row);
  });
}

document.getElementById('addCatBtn').addEventListener('click', () => {
  const name = document.getElementById('newCatName').value.trim();
  if (!name) { showToast('⚠️ Enter a category name'); return; }
  const exists = getAllCategories().some(c => c.toLowerCase() === name.toLowerCase());
  if (exists) { showToast('⚠️ Category already exists'); return; }
  extraCategories.push(name);
  document.getElementById('newCatName').value = '';
  populateCatDropdowns();
  renderCategories();
  showToast(`✅ "${name}" added to categories`);
});

async function saveEditCat(oldCat, editInput, saveBtn2, row) {
  const newCat = editInput.value.trim();
  if (!newCat) { showToast('⚠️ Category name cannot be empty'); return; }
  if (newCat.toLowerCase() === oldCat.toLowerCase()) {
    renderCategories(); return;
  }
  const affected = videos.filter(v => getCh(v).toLowerCase() === oldCat.toLowerCase());
  if (!confirm(`Rename "${oldCat}" → "${newCat}"? This will update ${affected.length} video${affected.length !== 1 ? 's' : ''}.`)) return;
  saveBtn2.disabled = true; saveBtn2.textContent = 'Saving...';
  try {
    if (affected.length > 0) {
      const batch = writeBatch(db);
      affected.forEach(v => batch.update(doc(db, 'videos', v.id), { channel: newCat }));
      await batch.commit();
      affected.forEach(v => { v.channel = newCat; });
    }
    const ei = extraCategories.findIndex(c => c.toLowerCase() === oldCat.toLowerCase());
    if (ei !== -1) extraCategories[ei] = newCat;
    showToast(`✅ Renamed to "${newCat}" (${affected.length} videos updated)`);
    populateCatDropdowns();
    renderCategories();
  } catch(e) {
    console.error(e);
    showToast('❌ Failed. Check Firestore rules.');
    saveBtn2.disabled = false; saveBtn2.textContent = '💾 Save';
  }
}

async function deleteCategory(cat) {
  const affected = videos.filter(v => getCh(v).toLowerCase() === cat.toLowerCase());
  const msg = affected.length > 0
    ? `Delete category "${cat}"? This will clear the channel from ${affected.length} video${affected.length !== 1 ? 's' : ''}.`
    : `Remove category "${cat}"?`;
  if (!confirm(msg)) return;
  try {
    if (affected.length > 0) {
      const batch = writeBatch(db);
      affected.forEach(v => batch.update(doc(db, 'videos', v.id), { channel: '' }));
      await batch.commit();
      affected.forEach(v => { v.channel = ''; });
    }
    const ei = extraCategories.findIndex(c => c.toLowerCase() === cat.toLowerCase());
    if (ei !== -1) extraCategories.splice(ei, 1);
    showToast(`🗑️ "${cat}" removed`);
    populateCatDropdowns();
    renderCategories();
    renderList();
  } catch(e) {
    console.error(e);
    showToast('❌ Failed. Check Firestore rules.');
  }
}

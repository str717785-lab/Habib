/* ── META TAG HELPERS ── */
function setMeta(id, val) {
  const el=document.getElementById(id);
  if(!el) return;
  if(el.tagName==='META') el.setAttribute('content', val);
  else if(el.tagName==='LINK') el.setAttribute('href', val);
  else el.textContent = val;
}

/* ── ISO 8601 DURATION — e.g. "28:14" → "PT28M14S", "1:28:14" → "PT1H28M14S" ── */
function toDuration(str) {
  if (!str) return '';
  const parts = String(str).trim().split(':').map(p => parseInt(p, 10) || 0);
  if (parts.length === 2) return `PT${parts[0]}M${parts[1]}S`;
  if (parts.length === 3) return `PT${parts[0]}H${parts[1]}M${parts[2]}S`;
  return '';
}

/* ── SCHEMA.ORG VideoObject — required for Google video indexing ── */
function buildSchema(v, pageUrl, uploadDate) {
  const schema = {
    "@context": "https://schema.org",
    "@type": "VideoObject",
    "name": v.title || "",
    "description": v.description || v.title || "",
    "thumbnailUrl": v.thumb ? [v.thumb] : [],
    "uploadDate": uploadDate,
    "contentUrl": v.src || "",
    "embedUrl": pageUrl,
    "interactionStatistic": {
      "@type": "InteractionCounter",
      "interactionType": { "@type": "WatchAction" },
      "userInteractionCount": parseInt(v.views) || 0
    }
  };
  const dur = toDuration(v.duration);
  if (dur) schema.duration = dur;
  return JSON.stringify(schema);
}

/* ── REC CARDS — DOM-based, no innerHTML for user data ── */
function createRecCard(v) {
  const ch = getCh(v);
  const card = document.createElement('div');
  card.className = 'video-card';
  card.dataset.id = v.id;
  card.dataset.preview = v.preview || '';

  const thumbWrap = document.createElement('div');
  thumbWrap.className = 'thumb-wrap';
  thumbWrap.dataset.preview = v.preview || '';

  const img = document.createElement('img');
  img.src = v.thumb || '';
  img.alt = v.title || '';
  img.loading = 'lazy';
  img.onerror = () => { img.src = 'https://placehold.co/640x360/13162a/444?text=Video'; };

  const badge4k = document.createElement('div');
  badge4k.className = 'badge-4k';
  badge4k.textContent = '4K';

  thumbWrap.appendChild(img);
  thumbWrap.appendChild(badge4k);
  if (v.duration) {
    const dur = document.createElement('div');
    dur.className = 'duration-badge';
    dur.textContent = v.duration;
    thumbWrap.appendChild(dur);
  }

  const cardInfo = document.createElement('div');
  cardInfo.className = 'card-info';

  const titleEl = document.createElement('div');
  titleEl.className = 'card-title';
  titleEl.textContent = v.title || '';

  const meta = document.createElement('div');
  meta.className = 'card-meta';

  const chTag = document.createElement('div');
  chTag.className = 'card-ch';
  chTag.innerHTML = '<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>';
  chTag.appendChild(document.createTextNode(ch || 'Channel'));

  const viewsEl = document.createElement('div');
  viewsEl.className = 'card-views';
  viewsEl.innerHTML = '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  viewsEl.appendChild(document.createTextNode(fmtNum(v.views||0)));

  meta.appendChild(chTag);
  meta.appendChild(viewsEl);
  cardInfo.appendChild(titleEl);
  cardInfo.appendChild(meta);
  card.appendChild(thumbWrap);
  card.appendChild(cardInfo);
  return card;
}

function attachRecEvents() {
  document.querySelectorAll('#recList .video-card').forEach(card => {
    const id=card.dataset.id, previewUrl=card.dataset.preview;
    const thumb=card.querySelector('.thumb-wrap');
    let previewEl=null, touchTimer=null, touchMoved=false;
    function showP(){if(!previewUrl||previewEl)return;previewEl=document.createElement('video');previewEl.src=previewUrl;previewEl.autoplay=true;previewEl.muted=true;previewEl.loop=true;previewEl.playsInline=true;previewEl.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1';const b=document.createElement('div');b.className='preview-badge';b.style.zIndex='3';const dot=document.createElement('span');dot.className='preview-dot';b.appendChild(dot);b.appendChild(document.createTextNode('PREVIEW'));b.id='pb_'+id;thumb.appendChild(previewEl);thumb.appendChild(b);}
    function hideP(){if(previewEl){previewEl.remove();previewEl=null;}const pb=document.getElementById('pb_'+id);if(pb)pb.remove();}
    thumb.addEventListener('mouseenter',showP);thumb.addEventListener('mouseleave',hideP);
    thumb.addEventListener('touchstart',()=>{touchMoved=false;touchTimer=setTimeout(()=>{if(!touchMoved)showP();},150);},{passive:true});
    thumb.addEventListener('touchmove',()=>{touchMoved=true;if(touchTimer)clearTimeout(touchTimer);hideP();},{passive:true});
    thumb.addEventListener('touchend',()=>{if(touchTimer)clearTimeout(touchTimer);setTimeout(hideP,600);},{passive:true});
    thumb.addEventListener('touchcancel',()=>{if(touchTimer)clearTimeout(touchTimer);hideP();},{passive:true});
    card.addEventListener('click',()=>location.href='video.html?id='+encodeURIComponent(id));
  });
}

/* ── HAMBURGER MENU ── */

document.getElementById('catToggle').addEventListener('click',e=>{e.stopPropagation();catOpen=!catOpen;catList.classList.toggle('open',catOpen);catChevron.classList.toggle('open',catOpen);});
document.addEventListener('click',e=>{if(!document.getElementById('menuWrap').contains(e.target))closeMenu();});

/* ── MAIN LOAD ── */
(async()=>{
  if(!videoId){ location.href='index.html'; return; }
  try{
    videoRef=doc(db,'videos',videoId);
    const vSnap=await getDoc(videoRef);
    if(!vSnap.exists()){ location.href='index.html'; return; }
    const v={id:vSnap.id,...vSnap.data()};
    const ch=getCh(v);
    currentLikes=Number(v.likes)||0;
    currentDislikes=Number(v.dislikes)||0;
    currentVote=localStorage.getItem('vote_'+videoId)||null;

    const pageUrl=`https://www.4kpornvideo.com/video?id=${encodeURIComponent(videoId)}`;

    /* ── uploadDate: use Firestore timestamp if available ── */
    let uploadDate = new Date().toISOString();
    if (v.createdAt && v.createdAt.toDate) {
      uploadDate = v.createdAt.toDate().toISOString();
    } else if (v.createdAt && v.createdAt.seconds) {
      uploadDate = new Date(v.createdAt.seconds * 1000).toISOString();
    }

    /* ── Page meta ── */
    document.title=(v.title||'Video')+' - 4KPornVideo | Watch Free 4K XXX HD';
    setMeta('metaTitle', document.title);
    setMeta('metaDesc', v.description||v.title||'Watch free 4K porn video online in ultra HD quality.');
    setMeta('metaKeywords', v.keywords||ch||'4k porn video');
    setMeta('metaCanonical', pageUrl);

    /* ── Open Graph ── */
    setMeta('ogTitle', v.title||'');
    setMeta('ogDesc', v.description||v.title||'');
    setMeta('ogImage', v.thumb||'https://www.4kpornvideo.com/og-image.jpg');
    setMeta('ogUrl', pageUrl);
    /* og:video — direct video URL for Google rich results */
    if (v.src) {
      setMeta('ogVideoUrl', v.src);
      setMeta('ogVideoSecure', v.src.replace('http://', 'https://'));
    }

    /* ── Twitter Card ── */
    setMeta('twTitle', v.title||'');
    setMeta('twDesc', v.description||v.title||'');
    setMeta('twImage', v.thumb||'https://www.4kpornvideo.com/og-image.jpg');
    setMeta('twPlayer', pageUrl);

    /* ── VideoObject schema for Google indexing ── */
    document.getElementById('schemaScript').textContent = buildSchema(v, pageUrl, uploadDate);

    /* ── Player ── */
    const vid = document.getElementById('mainVideo');
    vid.src = v.src || '';
    vid.poster = v.thumb || '';

    /* ── Info ── */
    document.getElementById('videoTitle').textContent = v.title || '';
    document.getElementById('videoViews').textContent = fmtNum(v.views||0);
    document.getElementById('channelName').textContent = ch || 'Channel';

    if(localStorage.getItem('wl_'+videoId)==='1') document.getElementById('wlBtn').className='wl-btn saved';
    updateVoteUI();

    if(v.description){
      document.getElementById('descBox').style.display='block';
      const dt=document.getElementById('descText');
      dt.textContent=v.description;
      if(v.description.length>120){
        const btn=document.getElementById('descToggle');
        btn.style.display='flex';
        let exp=false;
        btn.onclick=()=>{
          exp=!exp;
          dt.className='desc-text'+(exp?' exp':'');
          btn.innerHTML=exp
            ? 'Show less <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="18 15 12 9 6 15"/></svg>'
            : 'Show more <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="6 9 12 15 18 9"/></svg>';
        };
      }
    }

    document.getElementById('loadingSection').style.display='none';
    document.getElementById('playerSection').style.display='block';

    /* ── Recommended videos — limit to 20, ordered by views desc ── */
    const recSnap = await getDocs(query(collection(db,'videos'), orderBy('views','desc'), limit(21)));
    const all = recSnap.docs.filter(d=>d.id!==videoId).slice(0,20).map(d=>({id:d.id,...d.data()}));

    /* ── Build category list for hamburger menu ── */
    const chMap=new Map();
    all.forEach(v2=>{const c=getCh(v2);if(c&&!chMap.has(c.toLowerCase()))chMap.set(c.toLowerCase(),c);});
    const channels=[...chMap.values()].sort((a,b)=>a.toLowerCase().localeCompare(b.toLowerCase()));
    catList.innerHTML='';
    if (channels.length) {
      channels.forEach(c => {
        const a = document.createElement('a');
        a.href = `index.html?channel=${encodeURIComponent(c)}`;
        a.className = 'cat-item';
        a.textContent = c;
        catList.appendChild(a);
      });
    } else {
      catList.innerHTML = '<div style="padding:10px 16px;color:#555;font-size:12px">No categories</div>';
    }

    if(all.length){
      const recList = document.getElementById('recList');
      recList.innerHTML = '';
      all.forEach(v2 => recList.appendChild(createRecCard(v2)));
      document.getElementById('recSection').style.display='block';
      attachRecEvents();
    }

    /* ── Increment view count (fire-and-forget) ── */
    const viewKey = 'viewed_'+videoId;
    if (!sessionStorage.getItem(viewKey)) {
      sessionStorage.setItem(viewKey, '1');
      updateDoc(videoRef, { views: increment(1) }).catch(() => {});
    }

  } catch(e){
    console.error(e);
    document.getElementById('loadingSection').innerHTML='<div style="text-align:center;padding:60px 20px;color:#555"><div style="font-size:44px">⚠️</div><div style="margin-top:10px">Failed to load video</div></div>';
  }
})();
</script>

<style>
/* ═══════════════════════════════════════════════════
   RESET + TOKENS (shared with index)
═══════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#08080e;--ink2:#0f0f1a;--ink3:#161622;--ink4:#1e1e2e;
  --edge:#252538;--edge2:#32324a;
  --fog:#9090aa;--ghost:#5a5a72;
  --snow:#f0f0f8;--white:#fff;
  --gold:#f0b429;--gold-d:rgba(240,180,41,.12);--gold-g:rgba(240,180,41,.25);
  --green:#10d97e;--green-d:rgba(16,217,126,.1);
  --red:#ff3b5c;--red-d:rgba(255,59,92,.12);
  --r:10px;--r-sm:6px;--r-lg:16px;--r-xl:22px;
  --fd:'Syne','Arial Black',sans-serif;
  --fb:'Space Grotesk',system-ui,sans-serif;
  --fm:'Space Mono','Consolas',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
  --shadow-lg:0 8px 24px rgba(0,0,0,.5),0 24px 64px rgba(0,0,0,.3);
}
[data-theme="light"]{
  --ink:#f8f8fc;--ink2:#f0f0f8;--ink3:#e8e8f2;--ink4:#dcdcee;
  --edge:#d0d0e4;--edge2:#b8b8d4;
  --fog:#555568;--ghost:#8888a0;--snow:#0a0a18;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--ink);color:var(--snow);font-family:var(--fb);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;transition:background .35s,color .35s}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font-family:var(--fb);cursor:pointer}
::selection{background:var(--gold);color:#000}

body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.5;
}

.skip{position:absolute;top:-100%;left:0;padding:8px 20px;background:var(--gold);color:#000;font-weight:700;z-index:9999;transition:top .2s;border-radius:0 0 var(--r) 0}
.skip:focus{top:0}

/* ═══ HEADER ═══════════════════════════════════════ */
header{
  position:sticky;top:0;z-index:900;
  background:rgba(8,8,14,.92);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--edge);
}
[data-theme="light"] header{background:rgba(248,248,252,.92)}
.header-inner{
  display:grid;grid-template-columns:52px 1fr 52px;
  align-items:center;padding:0 18px;height:60px;gap:12px;
}
.back-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:none;border:1px solid var(--edge);border-radius:var(--r-sm);
  color:var(--fog);transition:all .2s;
}
.back-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-d)}
.logo-center{display:flex;align-items:center;justify-content:center}
.logo{font-family:var(--fd);font-size:22px;letter-spacing:4px;color:var(--gold);display:flex;align-items:center;gap:8px;line-height:1}
.logo-ring{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 2px var(--ink),0 0 0 3px var(--gold),0 0 12px var(--gold);animation:ring-pulse 3s ease-in-out infinite}
@keyframes ring-pulse{0%,100%{box-shadow:0 0 0 2px var(--ink),0 0 0 3px var(--gold),0 0 12px var(--gold)}50%{box-shadow:0 0 0 2px var(--ink),0 0 0 3px var(--gold),0 0 4px var(--gold)}}
.header-space{width:38px}

/* ═══ BREADCRUMB ════════════════════════════════════ */
.breadcrumb{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:8px 18px;font-family:var(--fm);font-size:10.5px;
  color:var(--ghost);border-bottom:1px solid var(--edge);
  position:relative;z-index:1;
}
.breadcrumb a{color:var(--ghost);transition:color .2s}
.breadcrumb a:hover{color:var(--gold)}
.breadcrumb-sep{opacity:.4}
.breadcrumb-cur{color:var(--fog);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px}

/* ═══ SKELETON LOADER ═══════════════════════════════ */
.skeleton{background:linear-gradient(90deg,var(--ink3) 25%,var(--ink4) 50%,var(--ink3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-video{width:100%;aspect-ratio:16/9}
.skel-title{height:28px;width:80%;margin-top:18px}
.skel-sub{height:18px;width:40%;margin-top:10px}
.skel-row{height:16px;width:60%;margin-top:8px}

/* ═══ VIDEO BOX ═════════════════════════════════════ */
.video-shell{width:100%;background:#000;position:relative;aspect-ratio:16/9}
.video-shell iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

/* ═══ PLAYER WRAP ═══════════════════════════════════ */
.player-wrap{max-width:800px;margin:0 auto;padding:22px 18px 80px;position:relative;z-index:1}

/* Title */
.ptitle{
  font-family:var(--fd);font-size:24px;font-weight:700;
  letter-spacing:.5px;line-height:1.25;color:var(--snow);
  margin-bottom:12px;
}
@media(max-width:600px){.ptitle{font-size:19px}}

/* Channel row */
.ch-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.ch-name{
  font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:1.2px;
  color:var(--green);background:var(--green-d);
  border:1.5px solid rgba(16,217,126,.4);border-radius:var(--r-xl);
  padding:5px 15px;display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 0 12px rgba(16,217,126,.15);
}
.ch-name::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.sub-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 20px;border-radius:var(--r-xl);
  background:var(--red);border:none;color:#fff;
  font-family:var(--fm);font-size:10.5px;font-weight:700;letter-spacing:1.8px;
  box-shadow:0 0 0 0 rgba(255,59,92,.5);
  animation:sub-throb 2.4s ease-in-out infinite;
  transition:transform .2s,filter .2s;
  position:relative;overflow:hidden;
}
.sub-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.22) 50%,transparent 60%);
  transform:translateX(-100%);animation:sub-sheen 2.4s ease-in-out infinite;
}
@keyframes sub-throb{0%,100%{box-shadow:0 0 0 0 rgba(255,59,92,.5)}50%{box-shadow:0 0 0 8px rgba(255,59,92,0)}}
@keyframes sub-sheen{0%{transform:translateX(-100%)}60%,100%{transform:translateX(100%)}}
.sub-btn:hover{transform:translateY(-1px) scale(1.03);filter:brightness(1.1)}
.sub-btn svg{width:9px;height:10px;fill:#fff}

/* Stats row */
.stats-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--edge)}
.stat-chip{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--fm);font-size:10.5px;font-weight:700;letter-spacing:.8px;
  padding:5px 13px;border-radius:var(--r-sm);
  background:var(--ink3);border:1px solid var(--edge);color:var(--fog);
  transition:border-color .2s;
}
.stat-chip-gold{color:var(--gold);background:var(--gold-d);border-color:rgba(240,180,41,.3)}
.stat-chip svg{width:9px;height:10px;fill:currentColor}

/* Description */
.pdesc{
  font-size:13.5px;color:var(--fog);line-height:1.8;
  margin-bottom:6px;white-space:pre-wrap;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden;
}
.pdesc.expanded{-webkit-line-clamp:unset;overflow:visible}
.desc-toggle{
  background:none;border:none;color:var(--ghost);
  font-family:var(--fm);font-size:10.5px;letter-spacing:1.5px;
  display:flex;align-items:center;gap:5px;margin-bottom:20px;
  padding:4px 0;transition:color .2s;
}
.desc-toggle:hover{color:var(--gold)}
.desc-toggle svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;transition:transform .3s}
.desc-toggle.open svg{transform:rotate(180deg)}

/* Tags */
.tag-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:26px}
.tag{
  font-family:var(--fm);font-size:10px;letter-spacing:.8px;
  color:var(--ghost);background:none;border:1px solid var(--edge);
  border-radius:var(--r-xl);padding:3px 12px;
  transition:color .2s,border-color .2s,background .2s;cursor:pointer;
}
.tag:hover{color:var(--gold);border-color:rgba(240,180,41,.5);background:var(--gold-d)}

/* Recommended */
.rec-section{margin-top:10px}
.sec-header2{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sec-title2{font-family:var(--fd);font-size:18px;letter-spacing:2.5px;color:var(--snow)}
.rec-grid{display:flex;flex-direction:column;gap:0}

/* Rec card (compact) */
.rcard{
  display:flex;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--edge);
  text-decoration:none;
  transition:background .2s;border-radius:var(--r-sm);
}
.rcard:hover{background:rgba(255,255,255,.025);padding-left:8px;padding-right:8px;margin:0 -8px}
.rcard-thumb{
  flex-shrink:0;width:140px;
  border-radius:var(--r-sm);overflow:hidden;
  position:relative;aspect-ratio:16/9;background:var(--ink3);
}
.rcard-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease)}
.rcard:hover .rcard-thumb img{transform:scale(1.05)}
.rcard-qbadge{
  position:absolute;top:5px;right:5px;
  font-family:var(--fm);font-size:8.5px;font-weight:700;letter-spacing:1.5px;
  color:var(--gold);background:rgba(8,8,14,.85);
  border:1px solid rgba(240,180,41,.4);border-radius:3px;padding:2px 6px;
  pointer-events:none;
}
.rcard-dbadge{
  position:absolute;bottom:4px;left:5px;
  font-family:var(--fm);font-size:9px;font-weight:700;
  color:#fff;background:rgba(8,8,14,.82);border-radius:3px;padding:2px 6px;
  pointer-events:none;
}
.rcard-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;justify-content:center}
.rcard-title{font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.3px;color:var(--snow);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color .2s}
.rcard:hover .rcard-title{color:var(--gold)}
.rcard-meta{font-family:var(--fm);font-size:10px;color:var(--ghost);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rcard-views{color:var(--gold);display:inline-flex;align-items:center;gap:3px}
.rcard-views svg{width:7px;height:8px;fill:var(--gold)}

/* Error page */
.error-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:18px;padding:40px 20px;text-align:center;position:relative;z-index:1;
}
.error-code{font-family:var(--fd);font-size:80px;color:var(--edge);line-height:1}
.error-title{font-family:var(--fd);font-size:26px;color:var(--gold)}
.error-msg{font-size:14px;color:var(--fog);max-width:360px;line-height:1.7}
.error-back{
  padding:11px 28px;background:var(--gold-d);border:1.5px solid var(--gold);
  color:var(--gold);border-radius:var(--r-xl);font-family:var(--fm);
  font-size:11px;font-weight:700;letter-spacing:1.5px;transition:background .2s;
}
.error-back:hover{background:rgba(240,180,41,.22)}

/* Footer */
footer{border-top:1px solid var(--edge);padding:24px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:relative;z-index:1}
.footer-brand{font-family:var(--fd);font-size:15px;letter-spacing:3px;color:var(--gold)}
.footer-copy{font-size:11px;color:var(--ghost);margin-top:2px}
.footer-links{display:flex;gap:16px;list-style:none;flex-wrap:wrap}
.footer-links a{font-size:11px;color:var(--ghost);transition:color .2s}
.footer-links a:hover{color:var(--gold)}

@media print{header,footer,.rec-section{display:none}body{background:#fff;color:#000}}
</style>
</head>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,getDoc,collection,getDocs}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  apiKey:"AIzaSyBYNU7wTq9_1-TdIVuG-yxAlKjeFb9Rm_M",

  messagingSenderId:"991575420179",

};
const db=getFirestore(initializeApp(FB));
const e=v=>String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const PLAY=`<svg viewBox="0 0 7 8" fill="currentColor"><path d="M1 1L6 4L1 7Z"/></svg>`;

function dur(d){if(!d)return'';if(typeof d==='number'){return`${Math.floor(d/60)}:${String(d%60).padStart(2,'0')}`;}return String(d);}
function views(v){if(!v)return'';if(typeof v==='number'){if(v>=1e6)return`${(v/1e6).toFixed(1)}M`;if(v>=1000)return`${(v/1000).toFixed(1)}K`;return String(v);}return String(v).replace(/\s*views?/i,'');}
const setMeta=(id,attr,val)=>{const el=document.getElementById(id);if(el&&val)el.setAttribute(attr,val);};

const videoId=new URLSearchParams(location.search).get('id')||new URLSearchParams(location.search).get('v');

async function init(){
  if(!videoId){showErr();return;}
  try{
    const snap=await getDoc(doc(db,'videos',videoId));
    if(!snap.exists()){showErr();return;}
    render({id:snap.id,...snap.data()});
    loadRec(videoId);
  }catch(err){console.error(err);showErr();}
}

function render(v){
  const dur_=dur(v.duration);
  const views_=views(v.views);
  const pageUrl=`https://cineinsight.info/video?id=${encodeURIComponent(v.id)}`;

  /* ── SEO HEAD UPDATES ────────────────────────────── */
  // Title tag
  document.getElementById('pageTitle').textContent=`${v.title} — CineInsight`;
  // Meta description: keyword-rich, include title + channel + category
  const descText=v.description
    ?`${v.description.slice(0,150).replace(/\n/g,' ')}… Watch on CineInsight.`
    :`Watch "${v.title}"${v.channel?` by ${v.channel}`:''}${v.category?` · ${v.category}`:''}. Free HD streaming on CineInsight.`;
  setMeta('metaDesc','content',descText);
  // Canonical
  setMeta('canonicalTag','href',pageUrl);
  // OG
  setMeta('ogUrl','content',pageUrl);
  setMeta('ogTitle','content',`${v.title} — CineInsight`);
  setMeta('ogDesc','content',descText);
  setMeta('ogImage','content',v.thumb||'');
  setMeta('ogVideo','content',v.src||'');
  // Twitter
  setMeta('twTitle','content',`${v.title} — CineInsight`);
  setMeta('twDesc','content',descText);
  setMeta('twImage','content',v.thumb||'');
  setMeta('twPlayer','content',v.src||'');

  /* ── VideoObject Schema ──────────────────────────── */
  document.getElementById('videoSchema').textContent=JSON.stringify({
    '@context':'https://schema.org',
    '@type':'VideoObject',
    name:v.title,
    description:descText,
    thumbnailUrl:v.thumb||'',
    embedUrl:v.src||'',
    contentUrl:v.src||'',
    uploadDate:v.uploadDate||new Date().toISOString().split('T')[0],
    duration:v.isoDuration||'PT0S',
    keywords:Array.isArray(v.tags)?v.tags.join(','):(v.tags||''),
    genre:v.category||'',
    inLanguage:v.language||'en',
    interactionStatistic:{
      '@type':'InteractionCounter',
      interactionType:'https://schema.org/WatchAction',
      userInteractionCount:parseInt(v.views)||0
    },
    publisher:{
      '@type':'Organization',name:'CineInsight',
      logo:{'@type':'ImageObject',url:'https://cineinsight.info/logo.png'}
    },
    author:v.channel?{'@type':'Person',name:v.channel}:undefined
  });

  /* ── BreadcrumbList Schema ───────────────────────── */
  document.getElementById('breadcrumbSchema').textContent=JSON.stringify({
    '@context':'https://schema.org','@type':'BreadcrumbList',
    itemListElement:[
      {'@type':'ListItem',position:1,name:'Home',item:'https://cineinsight.info/'},
      {'@type':'ListItem',position:2,name:v.title,item:pageUrl}
    ]
  });

  /* ── BREADCRUMB UI ───────────────────────────────── */
  document.getElementById('bcTitle').textContent=v.title;

  /* ── IFRAME ──────────────────────────────────────── */
  document.getElementById('playerFrame').src=e(v.src);

  /* ── TITLE ───────────────────────────────────────── */
  document.getElementById('ptitle').textContent=v.title;

  /* ── CHANNEL + SUBSCRIBE ─────────────────────────── */
  if(v.channel){
    const subHref=v.channelUrl||v.channel_url||'#';
    document.getElementById('chRow').innerHTML=`
      <span class="ch-name">${e(v.channel)}</span>
      <a class="sub-btn" href="${e(subHref)}" target="_blank" rel="noopener noreferrer"
         aria-label="Subscribe to ${e(v.channel)}">
        <svg viewBox="0 0 9 10"><path d="M3 2.5l5 2.5-5 2.5V2.5z"/></svg>
        SUBSCRIBE
      </a>`;
  }

  /* ── STATS ROW ───────────────────────────────────── */
  const stats=document.getElementById('statsRow');
  stats.innerHTML='';
  if(views_){
    const chip=document.createElement('span');
    chip.className='stat-chip stat-chip-gold';
    chip.innerHTML=`${PLAY} ${e(views_)} views`;
    stats.appendChild(chip);
  }
  if(dur_){
    const chip=document.createElement('span');
    chip.className='stat-chip';
    chip.textContent=dur_;
    stats.appendChild(chip);
  }
  if(v.quality){
    const chip=document.createElement('span');
    chip.className='stat-chip stat-chip-gold';
    chip.textContent=v.quality;
    stats.appendChild(chip);
  }
  if(v.category){
    const chip=document.createElement('span');
    chip.className='stat-chip';
    chip.textContent=v.category;
    stats.appendChild(chip);
  }
  if(v.uploadDate){
    const chip=document.createElement('span');
    chip.className='stat-chip';
    chip.textContent=v.uploadDate;
    stats.appendChild(chip);
  }

  /* ── DESCRIPTION ─────────────────────────────────── */
  if(v.description){
    const pd=document.getElementById('pdesc');
    pd.textContent=v.description;
    const tog=document.getElementById('descToggle');
    tog.style.display='flex';
    tog.setAttribute('data-open','false');
  }

  /* ── TAGS ────────────────────────────────────────── */
  if(v.tags){
    const tags=Array.isArray(v.tags)?v.tags:String(v.tags).split(',').map(t=>t.trim()).filter(Boolean);
    const tr=document.getElementById('tagRow');
    tags.forEach(t=>{
      const btn=document.createElement('button');
      btn.className='tag';btn.type='button';btn.textContent=`#${t}`;
      btn.setAttribute('aria-label',`Search tag: ${t}`);
      btn.onclick=()=>window.location.href=`/?q=${encodeURIComponent(t)}`;
      tr.appendChild(btn);
    });
  }

  /* ── SHOW PLAYER ─────────────────────────────────── */
  document.getElementById('skelState').style.display='none';
  document.getElementById('playerState').style.display='block';
}

/* Recommended */
async function loadRec(curId){
  try{
    const snap=await getDocs(collection(db,'videos'));
    const recs=[...snap.docs.map(d=>({id:d.id,...d.data()})).filter(v=>v.id!==curId)]
      .sort(()=>Math.random()-.5).slice(0,8);
    const grid=document.getElementById('recGrid');
    grid.innerHTML='';
    recs.forEach(v=>{
      const a=document.createElement('a');
      a.className='rcard';
      a.href=`/video?id=${encodeURIComponent(v.id)}`;
      a.setAttribute('role','listitem');
      a.setAttribute('aria-label',`Watch: ${e(v.title)}`);
      const d=dur(v.duration),vw=views(v.views);
      a.innerHTML=`
        <div class="rcard-thumb">
          <img src="${e(v.thumb)}" alt="${e(v.title)} thumbnail" width="280" height="157" loading="lazy" decoding="async">
          <span class="rcard-qbadge" aria-hidden="true">${e(v.quality||'4K')}</span>
          ${d?`<span class="rcard-dbadge" aria-hidden="true">${e(d)}</span>`:''}
        </div>
        <div class="rcard-body">
          <p class="rcard-title">${e(v.title)}</p>
          <div class="rcard-meta">
            ${vw?`<span class="rcard-views">${PLAY}${e(vw)} views</span>`:''}
            ${v.channel?`<span>${e(v.channel)}</span>`:''}
          </div>
        </div>`;
      grid.appendChild(a);
    });
  }catch(err){console.error('Rec failed:',err);}
}

/* Show/hide description */
window.toggleDesc=function(){
  const pd=document.getElementById('pdesc');
  const tog=document.getElementById('descToggle');
  const open=tog.getAttribute('data-open')==='true';
  if(open){
    pd.classList.remove('expanded');
    tog.setAttribute('data-open','false');
    tog.classList.remove('open');
    tog.innerHTML=`<svg viewBox="0 0 10 6"><polyline points="1,1 5,5 9,1" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/></svg> SHOW MORE`;
  }else{
    pd.classList.add('expanded');
    tog.setAttribute('data-open','true');
    tog.classList.add('open');
    tog.innerHTML=`<svg viewBox="0 0 10 6"><polyline points="1,5 5,1 9,5" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/></svg> SHOW LESS`;
  }
};

function showErr(){
  document.getElementById('skelState').style.display='none';
  document.getElementById('errState').style.display='block';
  document.getElementById('pageTitle').textContent='Video Not Found — CineInsight';
}

document.getElementById('footerYear').textContent=new Date().getFullYear();
const t=localStorage.getItem('ci-theme');
if(t==='light')document.documentElement.setAttribute('data-theme','light');
const l=localStorage.getItem('ci-lang');if(l)document.documentElement.setAttribute('lang',l);
init();

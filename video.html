<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Watch — VideoHub</title>
<meta name="description" content="Watch this video on VideoHub — free online streaming.">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#0d0d14">
<link rel="canonical" id="canonicalTag" href="https://cineinsight.info/video">
<meta property="og:type" content="video.other">
<meta property="og:site_name" content="VideoHub">
<meta property="og:title" id="ogTitle" content="Watch — VideoHub">
<meta property="og:description" id="ogDesc" content="Watch this video on VideoHub.">
<meta property="og:image" id="ogImage" content="https://cineinsight.info/og-cover.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="twTitle" content="Watch — VideoHub">
<meta name="twitter:image" id="twImage" content="https://cineinsight.info/og-cover.jpg">
<script type="application/ld+json" id="videoSchema">{}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"></noscript>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d14;--bg2:#111118;--card:#15151e;--card-h:#1b1b27;
  --border:#22222f;--border-h:#333348;
  --y:#f5c842;--yd:rgba(245,200,66,.13);
  --text:#eeeef5;--sub:#9898b0;--muted:#4e4e68;
  --r:12px;--rs:6px;
  --fd:'Bebas Neue','Arial Black',sans-serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --fm:'SF Mono','Fira Code','Consolas',monospace;
  --ease:.3s cubic-bezier(.22,1,.36,1);
  --lbg:#f5f5f8;--lbg2:#fff;--lcard:#fff;--lcard-h:#f0f0f6;
  --lborder:#e0e0ec;--ltext:#111118;--lsub:#55556a;--lmuted:#aaaabc;
}
[data-theme="light"]{--bg:var(--lbg);--bg2:var(--lbg2);--card:var(--lcard);--card-h:var(--lcard-h);--border:var(--lborder);--border-h:#c0c0d8;--text:var(--ltext);--sub:var(--lsub);--muted:var(--lmuted)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased;min-height:100vh;transition:background .3s,color .3s}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font-family:var(--fb)}
.skip{position:absolute;top:-100%;left:0;padding:8px 18px;background:var(--y);color:#000;font-weight:600;font-size:13px;z-index:9999;transition:top .2s}
.skip:focus{top:0}

/* HEADER */
header{position:sticky;top:0;z-index:900;background:rgba(13,13,20,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
[data-theme="light"] header{background:rgba(245,245,248,.95)}
.header-top{display:grid;grid-template-columns:56px 1fr 56px;align-items:center;padding:0 16px;height:62px;gap:12px}
.back-header-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;color:var(--sub);transition:border-color .2s,color .2s,background .2s;text-decoration:none}
.back-header-btn:hover{border-color:var(--y);color:var(--y);background:var(--yd)}
.logo-wrap{display:flex;align-items:center;justify-content:center}
.logo{font-family:var(--fd);font-size:26px;letter-spacing:3px;color:var(--y);display:flex;align-items:center;gap:6px;line-height:1}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--y);box-shadow:0 0 8px var(--y);animation:pulse-dot 2.4s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 6px var(--y),0 0 14px rgba(245,200,66,.5)}50%{box-shadow:0 0 2px var(--y)}}
.header-right-space{width:40px}

/* Breadcrumb */
.breadcrumb{padding:8px 16px;display:flex;gap:6px;font-size:11px;color:var(--muted);align-items:center;border-bottom:1px solid var(--border)}
.breadcrumb a{color:var(--muted);transition:color .2s}
.breadcrumb a:hover{color:var(--y)}

/* VIDEO BOX */
.video-box{width:100%;background:#000;position:relative;padding-top:56.25%}
.video-box iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:var(--muted);font-family:var(--fm);font-size:13px;letter-spacing:2px}

/* PLAYER CONTENT */
.player-wrap{max-width:780px;margin:0 auto;padding:20px 16px 60px}

/* Title */
.player-title{font-size:22px;font-weight:500;line-height:1.4;margin-bottom:10px;color:var(--text)}

/* Channel row */
.player-channel-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.player-channel-name{font-family:var(--fm);font-size:12px;font-weight:600;letter-spacing:1px;color:#22c55e;background:rgba(34,197,94,.1);border:1.5px solid #22c55e;border-radius:40px;padding:4px 14px;box-shadow:0 0 8px rgba(34,197,94,.18)}
.subscribe-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 18px;border-radius:40px;background:linear-gradient(135deg,#dc2626,#b91c1c);border:none;color:#fff;font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:1.5px;cursor:pointer;text-decoration:none;box-shadow:0 0 12px rgba(220,38,38,.4),2px 3px 0 0 rgba(120,10,10,.6);transform:perspective(200px) rotateX(3deg);transition:transform .2s,box-shadow .2s;animation:sub-pulse 2.8s ease-in-out infinite;position:relative;overflow:hidden}
.subscribe-btn::before{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,.18);transform:skewX(-20deg);animation:sub-shine 2.8s ease-in-out infinite}
@keyframes sub-pulse{0%,100%{box-shadow:0 0 12px rgba(220,38,38,.4),2px 3px 0 0 rgba(120,10,10,.6)}50%{box-shadow:0 0 22px rgba(220,38,38,.7),2px 3px 0 0 rgba(120,10,10,.6)}}
@keyframes sub-shine{0%{left:-60%}60%,100%{left:130%}}
.subscribe-btn:hover{background:linear-gradient(135deg,#ef4444,#dc2626);transform:perspective(200px) rotateX(1deg) translateY(-1px)}
.subscribe-btn svg{width:10px;height:10px;fill:#fff;flex-shrink:0}

/* Info badges */
.player-badges{display:flex;align-items:center;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.p-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10.5px;letter-spacing:.8px;padding:4px 12px;border-radius:5px;background:linear-gradient(145deg,#201a00,#140f00);border:1px solid rgba(245,200,66,.3);color:var(--y);box-shadow:2px 3px 0 0 rgba(100,70,0,.6),0 0 10px rgba(245,200,66,.1);transform:perspective(200px) rotateX(3deg)}
.p-badge-n{background:linear-gradient(145deg,#1c1c2a,#0f0f18);border:1px solid rgba(255,255,255,.12);color:var(--sub);box-shadow:2px 3px 0 0 rgba(0,0,0,.6)}
.p-badge svg{width:7px;height:8px;fill:var(--y)}

/* Description */
.player-desc{font-size:13.5px;color:var(--sub);line-height:1.75;margin-bottom:8px}
.desc-toggle{background:none;border:none;color:var(--muted);font-family:var(--fm);font-size:11px;cursor:pointer;letter-spacing:1px;padding:0;margin-bottom:28px;display:flex;align-items:center;gap:5px;transition:color .2s}
.desc-toggle:hover{color:var(--y)}

/* Tags */
.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.tag-chip{font-family:var(--fm);font-size:10px;letter-spacing:.8px;color:var(--muted);background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:40px;padding:3px 10px;cursor:pointer;transition:color .2s,border-color .2s}
.tag-chip:hover{color:var(--y);border-color:var(--y)}

/* Recommended */
.rec-section{margin-top:8px}
.section-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.section-title{font-family:var(--fd);font-size:22px;letter-spacing:2px}
.video-grid{display:flex;flex-direction:column;gap:18px}

/* Card (same as index) */
.card{background:var(--card);border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform var(--ease),border-color var(--ease),box-shadow var(--ease);display:block;text-decoration:none}
.card:hover{transform:translateY(-3px);background:var(--card-h);border-color:var(--border-h);box-shadow:0 20px 50px rgba(0,0,0,.45)}
.card-thumb{position:relative;overflow:hidden;aspect-ratio:16/9;background:#08080f;line-height:0}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .55s cubic-bezier(.22,1,.36,1)}
.card:hover .card-thumb img{transform:scale(1.04)}
.badge-quality{position:absolute;top:10px;right:10px;z-index:3;display:inline-flex;align-items:center;gap:4px;background:linear-gradient(145deg,#2a2008,#1a1400);border:1.5px solid #f5c842;border-radius:5px;padding:3px 8px 3px 7px;pointer-events:none;box-shadow:0 1px 0 rgba(255,220,100,.35) inset,2px 4px 0 rgba(120,80,0,.8),0 0 14px rgba(245,200,66,.2);transform:perspective(200px) rotateX(4deg)}
.badge-quality-dot{width:5px;height:5px;border-radius:50%;background:var(--y);box-shadow:0 0 5px var(--y);animation:pulse-dot 2.2s ease-in-out infinite}
.badge-quality-text{font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--y);line-height:1}
.card-bottom-meta{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 0;margin-bottom:3px}
.meta-time-badge{font-family:var(--fm);font-size:11.5px;font-weight:500;color:var(--sub);letter-spacing:.3px}
.meta-views-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:11.5px;font-weight:600;color:#4ade80}
.meta-views-badge svg{width:7px;height:8px;fill:#4ade80}
.card-info{padding:8px 12px 12px}
.card-title{font-size:14px;font-weight:500;line-height:1.5;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.card-meta-row{display:flex;gap:6px;flex-wrap:wrap}
.meta-chip{font-family:var(--fm);font-size:10px;letter-spacing:.5px;padding:2px 9px;border-radius:40px;color:var(--sub);background:rgba(255,255,255,.04);border:1px solid var(--border)}

/* States */
.state-msg{padding:40px 20px;text-align:center;font-family:var(--fm);font-size:13px;letter-spacing:2px;color:var(--muted)}
.error-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;padding:40px 20px;text-align:center}
.error-page h2{font-family:var(--fd);font-size:32px;color:var(--y)}
.error-page p{color:var(--sub);font-size:14px}
.error-page a{padding:10px 24px;background:var(--yd);border:1.5px solid var(--y);color:var(--y);border-radius:40px;font-family:var(--fm);font-size:12px;font-weight:700;letter-spacing:1px;transition:background .2s}
.error-page a:hover{background:rgba(245,200,66,.25)}

/* Footer */
footer{border-top:1px solid var(--border);padding:24px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-brand{font-family:var(--fd);font-size:18px;letter-spacing:3px;color:var(--y)}
.footer-copy{font-size:11px;color:var(--muted)}
.footer-links{display:flex;gap:14px;list-style:none;flex-wrap:wrap}
.footer-links a{font-size:11px;color:var(--muted);transition:color .2s}
.footer-links a:hover{color:var(--y)}
@media(max-width:600px){.player-title{font-size:18px}}
@media print{header,footer,.rec-section{display:none}body{background:#fff;color:#000}}
</style>
</head>
<body>
<a class="skip" href="#main">Skip to main content</a>

<header role="banner">
  <div class="header-top">
    <a href="/" class="back-header-btn" aria-label="Back to home">
      <svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 2L4 6L8 10"/></svg>
    </a>
    <div class="logo-wrap">
      <a href="/" class="logo" aria-label="VideoHub Home">
        <span class="logo-dot" aria-hidden="true"></span>VideoHub
      </a>
    </div>
    <div class="header-right-space"></div>
  </div>
</header>

<main id="main">

  <!-- Breadcrumb (filled by JS) -->
  <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb">
    <a href="/">Home</a>
    <span aria-hidden="true">›</span>
    <span id="breadcrumbTitle" style="color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px"></span>
  </nav>

  <!-- Loading state -->
  <div id="loadingState">
    <div class="video-box"><div class="video-loading" aria-live="polite">LOADING...</div></div>
    <div class="player-wrap"><p class="state-msg">Fetching video info…</p></div>
  </div>

  <!-- Error state -->
  <div id="errorState" style="display:none">
    <div class="error-page">
      <h2>Video Not Found</h2>
      <p>This video doesn't exist or has been removed.</p>
      <a href="/">← Back to Home</a>
    </div>
  </div>

  <!-- Player (hidden until loaded) -->
  <div id="playerState" style="display:none">
    <div class="video-box" role="region" aria-label="Video player">
      <iframe id="playerFrame" title="Video player"
              allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share"
              allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
    <div class="player-wrap">
      <h1 id="playerTitle" class="player-title"></h1>
      <div class="player-channel-row" id="channelRow"></div>
      <div class="player-badges" id="playerBadges"></div>
      <p id="playerDesc" class="player-desc"></p>
      <button class="desc-toggle" id="descToggle" style="display:none" onclick="toggleDesc()">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="2,3 5,7 8,3"/></svg>
        SHOW MORE
      </button>
      <div class="tag-row" id="tagRow"></div>
      <div class="rec-section">
        <div class="section-hdr"><h2 class="section-title">Up Next</h2></div>
        <div id="recGrid" class="video-grid" role="list" aria-label="Recommended videos"></div>
      </div>
    </div>
  </div>

</main>

<footer role="contentinfo">
  <div>
    <p class="footer-brand">VideoHub</p>
    <p class="footer-copy">© <span id="footerYear"></span> VideoHub</p>
  </div>
  <ul class="footer-links">
    <li><a href="/privacy-policy">Privacy</a></li>
    <li><a href="/terms">Terms</a></li>
    <li><a href="/sitemap.xml">Sitemap</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
</footer>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,getDoc,collection,getDocs}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cfg={
  apiKey:"AIzaSyBYNU7wTq9_1-TdIVuG-yxAlKjeFb9Rm_M",
  authDomain:"video-cms-b7c1e.firebaseapp.com",
  projectId:"video-cms-b7c1e",
  storageBucket:"video-cms-b7c1e.firebasestorage.app",
  messagingSenderId:"991575420179",
  appId:"1:991575420179:web:23459a09aa36f868e37ee6"
};
const app=initializeApp(cfg);
const db=getFirestore(app);
const s=(v='')=>String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const PLAY=`<svg viewBox="0 0 7 8"><path d="M1 1L6 4L1 7V1Z"/></svg>`;

function fmtDur(d){if(!d)return'';if(typeof d==='number'){const m=Math.floor(d/60),sc=String(d%60).padStart(2,'0');return`${m}:${sc}`;}return String(d);}
function fmtViews(v){if(!v)return'0 views';if(typeof v==='number'){if(v>=1e6)return`${(v/1e6).toFixed(1)}M views`;if(v>=1000)return`${(v/1000).toFixed(1)}K views`;return`${v} views`;}return String(v);}

/* ── Get video ID from URL ── */
const videoId=new URLSearchParams(location.search).get('id')||new URLSearchParams(location.search).get('v');

async function init(){
  if(!videoId){showError();return;}
  try{
    /* fetch single video doc directly — fast */
    const snap=await getDoc(doc(db,'videos',videoId));
    if(!snap.exists()){showError();return;}
    const video={id:snap.id,...snap.data()};
    renderPlayer(video);
    /* fetch recommended async — don't block player */
    loadRecommended(videoId);
  }catch(e){
    console.error(e);showError();
  }
}

function renderPlayer(v){
  /* Update head tags */
  document.title=`${v.title} — VideoHub`;
  document.getElementById('ogTitle').content=`${v.title} — VideoHub`;
  document.getElementById('ogDesc').content=v.description||`Watch ${v.title} on VideoHub.`;
  document.getElementById('ogImage').content=v.thumb||'';
  document.getElementById('twTitle').content=`${v.title} — VideoHub`;
  document.getElementById('twImage').content=v.thumb||'';
  document.getElementById('canonicalTag').href=`https://cineinsight.info/video?id=${encodeURIComponent(v.id)}`;
  document.getElementById('breadcrumbTitle').textContent=v.title;

  /* Video Schema */
  document.getElementById('videoSchema').textContent=JSON.stringify({
    '@context':'https://schema.org','@type':'VideoObject',
    name:v.title,description:v.description||`Watch ${v.title} on VideoHub.`,
    thumbnailUrl:v.thumb,embedUrl:v.src,
    uploadDate:v.uploadDate||new Date().toISOString().split('T')[0],
    duration:v.isoDuration||'PT0S',
    interactionStatistic:{'@type':'InteractionCounter',interactionType:'https://schema.org/WatchAction',userInteractionCount:parseInt(v.views)||0},
    publisher:{'@type':'Organization',name:'VideoHub',logo:{'@type':'ImageObject',url:'https://cineinsight.info/logo.png'}}
  });

  /* iframe */
  document.getElementById('playerFrame').src=s(v.src);

  /* Title */
  document.getElementById('playerTitle').textContent=v.title;

  /* Channel row */
  const cr=document.getElementById('channelRow');
  if(v.channel){
    const subHref=v.channelUrl||v.channel_url||'#';
    cr.innerHTML=`
      <span class="player-channel-name">${s(v.channel)}</span>
      <a class="subscribe-btn" href="${s(subHref)}" target="_blank" rel="noopener noreferrer" aria-label="Subscribe to ${s(v.channel)}">
        <svg viewBox="0 0 10 10"><path d="M4 2.5l4 2.5-4 2.5V2.5z"/></svg>
        SUBSCRIBE
      </a>`;
  }

  /* Badges */
  const dur=fmtDur(v.duration);
  const views=fmtViews(v.views);
  document.getElementById('playerBadges').innerHTML=`
    <span class="p-badge">${PLAY} ${s(views)}</span>
    <span class="p-badge">${s(v.quality||'4K')}</span>
    ${dur?`<span class="p-badge p-badge-n">${s(dur)}</span>`:''}
    ${v.category?`<span class="p-badge p-badge-n">${s(v.category)}</span>`:''}`;

  /* Description */
  if(v.description){
    const desc=document.getElementById('playerDesc');
    desc.textContent=v.description;
    desc.setAttribute('data-open','false');
    desc.style.cssText='display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden;color:var(--sub);font-size:13.5px;line-height:1.75;margin-bottom:8px;white-space:normal';
    const tog=document.getElementById('descToggle');
    tog.style.display='flex';
    tog.innerHTML=`<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="2,3 5,7 8,3"/></svg> SHOW MORE`;
  }

  /* Tags */
  if(v.tags&&v.tags.length){
    const tagRow=document.getElementById('tagRow');
    const tags=Array.isArray(v.tags)?v.tags:String(v.tags).split(',');
    tags.forEach(t=>{
      const chip=document.createElement('span');
      chip.className='tag-chip';
      chip.textContent=`#${t.trim()}`;
      chip.onclick=()=>window.location.href=`/?q=${encodeURIComponent(t.trim())}`;
      tagRow.appendChild(chip);
    });
  }

  /* Show player */
  document.getElementById('loadingState').style.display='none';
  document.getElementById('playerState').style.display='block';
}

async function loadRecommended(currentId){
  try{
    const snap=await getDocs(collection(db,'videos'));
    const all=snap.docs.map(d=>({id:d.id,...d.data()})).filter(v=>v.id!==currentId);
    const rec=[...all].sort(()=>Math.random()-.5).slice(0,6);
    const grid=document.getElementById('recGrid');
    grid.innerHTML='';
    rec.forEach(v=>{
      const a=document.createElement('a');
      a.className='card';
      a.href=`/video?id=${encodeURIComponent(v.id)}`;
      a.setAttribute('role','listitem');
      a.setAttribute('aria-label',s(v.title));
      const dur=fmtDur(v.duration);
      const views=fmtViews(v.views);
      a.innerHTML=`
        <div class="card-thumb">
          <img src="${s(v.thumb)}" alt="${s(v.title)}" width="480" height="270" loading="lazy" decoding="async">
          <span class="badge-quality">
            <span class="badge-quality-dot" aria-hidden="true"></span>
            <span class="badge-quality-text">${s(v.quality||'4K')}</span>
          </span>
        </div>
        <div class="card-bottom-meta">
          <span class="meta-time-badge">${s(dur)}</span>
          <span class="meta-views-badge">${PLAY}${s(views)}</span>
        </div>
        <div class="card-info">
          <p class="card-title">${s(v.title)}</p>
          <div class="card-meta-row">
            ${v.channel?`<span class="meta-chip">${s(v.channel)}</span>`:''}
            ${v.category?`<span class="meta-chip">${s(v.category)}</span>`:''}
          </div>
        </div>`;
      grid.appendChild(a);
    });
  }catch(e){console.error('Recommended failed:',e);}
}

function showError(){
  document.getElementById('loadingState').style.display='none';
  document.getElementById('errorState').style.display='block';
  document.title='Video Not Found — VideoHub';
}

window.toggleDesc=function(){
  const d=document.getElementById('playerDesc');
  const t=document.getElementById('descToggle');
  const isOpen=d.getAttribute('data-open')==='true';
  if(isOpen){
    d.setAttribute('data-open','false');
    d.style.webkitLineClamp='3';
    d.style.overflow='hidden';
    d.style.display='-webkit-box';
    t.innerHTML=`<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="2,3 5,7 8,3"/></svg> SHOW MORE`;
  }else{
    d.setAttribute('data-open','true');
    d.style.webkitLineClamp='unset';
    d.style.overflow='visible';
    d.style.display='block';
    t.innerHTML=`<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="2,7 5,3 8,7"/></svg> SHOW LESS`;
  }
};

document.getElementById('footerYear').textContent=new Date().getFullYear();
const t=localStorage.getItem('vh-theme');
if(t==='light')document.documentElement.setAttribute('data-theme','light');
const l=localStorage.getItem('vh-lang');
if(l)document.documentElement.setAttribute('lang',l);

init();
</script>
</body>
</html>

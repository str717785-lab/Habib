<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<!-- SEO meta tags injected dynamically below; base fallbacks here -->
<title>Watch Video — VideoHub</title>
<meta name="description" content="Watch free HD and 4K videos on VideoHub.">
<meta name="robots" id="metaRobots" content="noindex,follow">
<link rel="canonical" id="metaCanonical" href="https://cineinsight.info/video">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- Open Graph (populated by JS) -->
<meta property="og:type" content="video.other" id="ogType">
<meta property="og:site_name" content="VideoHub">
<meta property="og:locale" content="en_US">
<meta property="og:url" content="https://cineinsight.info/video" id="ogUrl">
<meta property="og:title" content="Watch Video — VideoHub" id="ogTitle">
<meta property="og:description" content="Watch free HD and 4K videos on VideoHub." id="ogDesc">
<meta property="og:image" content="https://cineinsight.info/og-cover.jpg" id="ogImage">
<meta property="og:image:width" content="1200" id="ogImgW">
<meta property="og:image:height" content="630" id="ogImgH">
<meta property="og:image:alt" content="Video thumbnail" id="ogImgAlt">

<!-- Twitter / X (populated by JS) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@VideoHub">
<meta name="twitter:title" content="Watch Video — VideoHub" id="twTitle">
<meta name="twitter:description" content="Watch free HD and 4K videos on VideoHub." id="twDesc">
<meta name="twitter:image" content="https://cineinsight.info/og-cover.jpg" id="twImage">
<meta name="twitter:image:alt" content="Video thumbnail" id="twImgAlt">
<meta name="twitter:player" content="" id="twPlayer">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"></noscript>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
:root{
  --bg:#080810;--bg2:#0f0f1a;--bg3:#15151f;
  --border:rgba(255,255,255,.07);
  --accent:#3d6fff;--accent2:#5f87ff;
  --text:#f0f0f8;--muted:#6a6a88;--muted2:#9090b0;
  --badge4k:#1a1200;--badge4kT:#f5c842;
  --badgehd:#0a2d12;--badgehdT:#5fce7f;
  --tag-bg:rgba(61,111,255,.12);--tag-border:rgba(61,111,255,.3);
  --radius:12px;--radius-sm:7px;
  --green:#4ade80;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overscroll-behavior:none}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
.skip{position:absolute;top:-100%;left:0;padding:8px 18px;background:var(--accent);color:#fff;font-weight:600;font-size:13px;border-radius:0 0 var(--radius) 0;z-index:9999;transition:top .2s}
.skip:focus{top:0}

/* HEADER */
#header{position:sticky;top:0;z-index:100;background:rgba(8,8,16,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:10px 14px}
.header-row{display:flex;align-items:center;gap:10px}
.back-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;flex-shrink:0;transition:border-color .2s,background .2s;color:var(--muted2)}
.back-btn:hover{border-color:var(--accent);background:rgba(61,111,255,.1);color:var(--accent2)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--accent2);letter-spacing:-.5px;display:flex;align-items:center;gap:5px;flex:1;justify-content:center;text-decoration:none}
.logo svg{width:20px;height:20px;fill:var(--accent)}
.header-placeholder{width:36px;flex-shrink:0}

/* PLAYER SECTION */
.player-wrap{background:#000;position:relative;width:100%;aspect-ratio:16/9;max-height:56vw}
.player-wrap iframe,.player-wrap video{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:2}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* VIDEO INFO */
.video-page{padding:0 0 40px}
.video-meta{padding:14px 14px 0}
.video-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;line-height:1.4;color:var(--text);margin-bottom:10px}
.meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.meta-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:4px 11px;border-radius:20px}
.chip-channel{color:var(--accent2);background:var(--tag-bg);border:1px solid var(--tag-border);cursor:pointer;transition:background .2s}
.chip-channel:hover{background:rgba(61,111,255,.25)}
.chip-channel svg{width:12px;height:12px;stroke:var(--accent2);fill:none;stroke-width:2;stroke-linecap:round}
.chip-quality-4k{background:#1a1200;color:#f5c842;border:1.5px solid #f5c842;font-weight:800;letter-spacing:1px;box-shadow:0 0 8px rgba(245,200,66,.35);text-shadow:0 0 6px rgba(245,200,66,.6)}
.chip-quality-hd{background:var(--badgehd);color:var(--badgehdT);border:1px solid rgba(95,206,127,.3)}
.chip-stat{color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border)}
.chip-stat svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.chip-like svg{stroke:#e05555}
.chip-view svg{stroke:var(--green)}

/* ACTION ROW — channel + download */
.action-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-wrap:wrap}
.channel-banner{display:inline-flex;align-items:center;gap:8px;text-decoration:none}
.ch-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch-avatar svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
.ch-info{}
.ch-label{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.ch-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
/* DOWNLOAD BUTTON */
.dl-btn{position:relative;display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:30px;background:linear-gradient(135deg,#c0000a,#ff1a2a);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;border:none;cursor:pointer;overflow:hidden;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(220,0,20,.45),0 0 0 0 rgba(220,0,20,.4);animation:dl-pulse 2.2s ease-in-out infinite;text-decoration:none}
.dl-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(220,0,20,.6),0 0 0 0 rgba(220,0,20,.4);animation:none}
.dl-btn:active{transform:translateY(0)}
.dl-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.dl-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 60%);pointer-events:none}
.dl-ripple{position:absolute;inset:0;border-radius:30px;background:transparent;box-shadow:0 0 0 0 rgba(220,0,20,.6);animation:dl-ripple 2.2s ease-in-out infinite}
@keyframes dl-pulse{0%,100%{box-shadow:0 4px 20px rgba(220,0,20,.45),0 0 0 0 rgba(220,0,20,.4)}50%{box-shadow:0 4px 28px rgba(220,0,20,.7),0 0 0 8px rgba(220,0,20,0)}}
@keyframes dl-ripple{0%{box-shadow:0 0 0 0 rgba(220,0,20,.5)}70%{box-shadow:0 0 0 12px rgba(220,0,20,0)}100%{box-shadow:0 0 0 0 rgba(220,0,20,0)}}

/* DESCRIPTION */
.desc-wrap{padding:14px}
.desc-text{font-size:13px;line-height:1.7;color:var(--muted2);white-space:pre-wrap;word-break:break-word;overflow:hidden;max-height:72px;transition:max-height .35s ease}
.desc-text.expanded{max-height:1000px}
.desc-toggle{margin-top:6px;font-size:12px;color:var(--accent2);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;padding:0;display:inline-flex;align-items:center;gap:4px;transition:color .2s}
.desc-toggle:hover{color:var(--text)}
.desc-toggle svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;transition:transform .3s}
.desc-toggle.open svg{transform:rotate(180deg)}

/* TAGS */
.tags-section{padding:0 14px 14px;display:flex;flex-wrap:wrap;gap:6px}
.tag-pill{display:inline-flex;align-items:center;font-size:11.5px;padding:4px 12px;border-radius:20px;background:var(--tag-bg);color:var(--accent2);border:1px solid var(--tag-border);cursor:pointer;transition:background .2s}
.tag-pill:hover{background:rgba(61,111,255,.25);color:#fff}

/* DIVIDER */
.section-head{padding:14px 14px 8px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.section-head::after{content:'';flex:1;height:1px;background:var(--border)}

/* RELATED GRID */
.related-grid{padding:0 14px 14px;display:flex;flex-direction:column;gap:10px}
.rcard{display:flex;gap:10px;background:var(--bg2);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);text-decoration:none;color:inherit;transition:border-color .2s,transform .2s}
.rcard:hover{border-color:rgba(61,111,255,.35);transform:translateX(2px)}
.rcard-thumb{position:relative;flex-shrink:0;width:120px;height:72px;background:var(--bg3);overflow:hidden}
.rcard-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.rcard-badge{position:absolute;top:4px;right:4px;font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px}
.rcard-dur{position:absolute;bottom:4px;left:4px;font-size:10px;font-weight:500;padding:1px 5px;border-radius:3px;background:rgba(0,0,0,.78);color:#fff}
.rcard-info{flex:1;padding:8px 10px 8px 0;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.rcard-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rcard-channel{font-size:11px;color:var(--muted2)}
.rcard-views{font-size:10.5px;color:var(--muted)}

/* STATES */
.state-msg{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.not-found{text-align:center;padding:60px 20px}
.not-found h2{font-family:'Syne',sans-serif;font-size:20px;color:var(--text);margin-bottom:8px}
.not-found p{font-size:13px;color:var(--muted);margin-bottom:16px}
.btn-home{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;text-decoration:none;transition:opacity .2s}
.btn-home:hover{opacity:.85}

footer{padding:24px 14px;border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--muted);margin-top:20px}
</style>
</head>
<body>
<a class="skip" href="#playerWrap">Skip to video</a>

<!-- HEADER -->
<header id="header" role="banner">
  <div class="header-row">
    <a href="/" class="back-btn" aria-label="Back to home">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </a>
    <a href="/" class="logo" aria-label="VideoHub Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="5,3 19,12 5,21" fill="var(--accent)"/></svg>
      VideoHub
    </a>
    <div class="header-placeholder"></div>
  </div>
</header>

<!-- MAIN -->
<main id="videoPage" class="video-page" aria-live="polite">
  <div id="playerWrap" class="player-wrap">
    <div class="player-loading"><div class="spinner"></div></div>
  </div>

  <div id="videoMeta" class="video-meta" hidden>
    <h1 id="videoTitle" class="video-title"></h1>
    <div class="meta-row" id="metaRow"></div>
  </div>

  <div id="actionRow" class="action-row" hidden>
    <a id="channelBanner" href="#" class="channel-banner" aria-label="View channel">
      <div class="ch-avatar">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <div class="ch-info">
        <p class="ch-label">Channel</p>
        <p class="ch-name" id="chNameEl">—</p>
      </div>
    </a>
    <a id="dlBtn" href="#" class="dl-btn" download aria-label="Download video">
      <span class="dl-ripple"></span>
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </a>
  </div>

  <div id="descWrap" class="desc-wrap" hidden>
    <p id="descText" class="desc-text"></p>
    <button id="descToggle" class="desc-toggle" aria-expanded="false">
      Show more
      <svg viewBox="0 0 24 24"><polyline points="6,9 12,15 18,9"/></svg>
    </button>
  </div>

  <div id="tagsWrap" class="tags-section" hidden></div>

  <p class="section-head" id="relatedHead" hidden>Related Videos</p>
  <div id="relatedGrid" class="related-grid" hidden></div>
</main>

<footer role="contentinfo">
  <p>&copy; <span id="footerYear"></span> VideoHub. All rights reserved.</p>
</footer>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,doc,getDoc,collection,getDocs,query,limit,orderBy}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const SITE='https://cineinsight.info';
const cfg={
  apiKey:"AIzaSyBYNU7wTq9_1-TdIVuG-yxAlKjeFb9Rm_M",
  authDomain:"video-cms-b7c1e.firebaseapp.com",
  projectId:"video-cms-b7c1e",
  storageBucket:"video-cms-b7c1e.firebasestorage.app",
  messagingSenderId:"991575420179",
  appId:"1:991575420179:web:23459a09aa36f868e37ee6"
};
const app=initializeApp(cfg);
const db=getFirestore(app);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const params=new URLSearchParams(location.search);
const videoId=params.get('id');

/* ── SET META TAG ── */
function setMeta(id,content){const el=document.getElementById(id);if(el)el.setAttribute('content',content);}
function setAttr(id,attr,val){const el=document.getElementById(id);if(el)el.setAttribute(attr,val);}

/* ── INJECT SEO ── */
function injectSEO(v){
  const url=`${SITE}/video?id=${encodeURIComponent(v.id)}`;
  const thumb=v.thumb||`${SITE}/og-cover.jpg`;
  const title=`${v.title} — VideoHub`;
  const desc=v.description||`Watch "${v.title}" in ${v.quality||'HD'} on VideoHub. Free streaming, no signup.`;
  document.title=title;
  document.querySelector('meta[name="description"]').setAttribute('content',desc);
  document.querySelector('meta[name="robots"]').setAttribute('content','index,follow,max-image-preview:large');
  setAttr('metaCanonical','href',url);
  /* OG */
  setMeta('ogUrl',url);setMeta('ogTitle',title);setMeta('ogDesc',desc);
  setMeta('ogImage',thumb);setMeta('ogImgW','480');setMeta('ogImgH','270');
  setMeta('ogImgAlt',`${v.title} thumbnail`);
  /* Twitter */
  setMeta('twTitle',title);setMeta('twDesc',desc);
  setMeta('twImage',thumb);setMeta('twImgAlt',`${v.title} thumbnail`);
  if(v.embed)setMeta('twPlayer',v.embed);
  /* Schema */
  const sc=document.createElement('script');
  sc.type='application/ld+json';
  sc.textContent=JSON.stringify({"@context":"https://schema.org","@type":"VideoObject","name":v.title,"description":desc,"thumbnailUrl":thumb,"uploadDate":v.uploadDate||new Date().toISOString(),"contentUrl":v.src||url,"embedUrl":v.embed||url,"publisher":{"@type":"Organization","name":"VideoHub","url":SITE}});
  document.head.appendChild(sc);
}

/* ── RENDER PLAYER ── */
function renderPlayer(v){
  const wrap=document.getElementById('playerWrap');
  if(v.embed){
    wrap.innerHTML=`<iframe src="${esc(v.embed)}" allowfullscreen allow="autoplay;encrypted-media;picture-in-picture" title="${esc(v.title)}"></iframe>`;
  }else if(v.src){
    wrap.innerHTML=`<video controls preload="metadata" poster="${esc(v.thumb||'')}"><source src="${esc(v.src)}"><p>Your browser does not support video playback.</p></video>`;
  }else{
    wrap.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#6a6a88;font-size:13px;">No player source available.</div>`;
  }
}

/* ── RENDER META / INFO ── */
function renderInfo(v){
  document.getElementById('videoTitle').textContent=v.title||'Untitled';
  const row=document.getElementById('metaRow');
  const qual=(v.quality||'').toLowerCase();
  let chips='';
  if(qual==='4k')chips+=`<span class="meta-chip chip-quality-4k">4K</span>`;
  else if(qual==='hd')chips+=`<span class="meta-chip chip-quality-hd">HD</span>`;
  if(v.duration)chips+=`<span class="meta-chip chip-stat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>${esc(v.duration)}</span>`;
  if(v.views)chips+=`<span class="meta-chip chip-stat chip-view"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${esc(v.views)}</span>`;
  if(v.likes)chips+=`<span class="meta-chip chip-stat chip-like"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${esc(v.likes)}</span>`;
  row.innerHTML=chips;
  document.getElementById('videoMeta').hidden=false;

  /* Channel banner + Download button */
  const actionRow=document.getElementById('actionRow');
  if(v.channel){
    document.getElementById('chNameEl').textContent=v.channel;
    document.getElementById('channelBanner').href=`/?channel=${encodeURIComponent(v.channel)}`;
    actionRow.hidden=false;
  }
  const dlBtn=document.getElementById('dlBtn');
  if(v.src){
    dlBtn.href=v.src;
    dlBtn.setAttribute('download','');
  }else if(v.embed){
    dlBtn.href=v.embed;
    dlBtn.removeAttribute('download');
    dlBtn.target='_blank';
    dlBtn.rel='noopener';
  }else{
    dlBtn.style.display='none';
  }
  if(!v.channel&&(v.src||v.embed))actionRow.hidden=false;

  /* Description */
  if(v.description){
    document.getElementById('descText').textContent=v.description;
    document.getElementById('descWrap').hidden=false;
    const toggle=document.getElementById('descToggle');
    const txt=document.getElementById('descText');
    toggle.onclick=()=>{const exp=txt.classList.toggle('expanded');toggle.classList.toggle('open',exp);toggle.setAttribute('aria-expanded',exp);toggle.childNodes[0].textContent=exp?'Show less':'Show more';};
    if(v.description.length<120){txt.style.maxHeight='none';toggle.style.display='none';}
  }

  /* Tags */
  const tags=v.tags||[];
  if(tags.length){
    const wrap=document.getElementById('tagsWrap');
    wrap.innerHTML=tags.map(t=>`<a href="/?q=${encodeURIComponent(t)}" class="tag-pill">#${esc(t)}</a>`).join('');
    wrap.hidden=false;
  }
}

/* ── RELATED VIDEOS ── */
async function loadRelated(v){
  try{
    const snap=await getDocs(collection(db,'videos'));
    const all=snap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.id!==v.id);
    /* prefer same channel, then same tags */
    const related=all.filter(x=>(x.channel&&x.channel===v.channel)||(x.tags||[]).some(t=>(v.tags||[]).includes(t))).slice(0,10);
    const fill=all.filter(x=>!related.find(r=>r.id===x.id)).slice(0,Math.max(0,6-related.length));
    const list=[...related,...fill].slice(0,6);
    if(!list.length)return;
    const grid=document.getElementById('relatedGrid');
    grid.innerHTML='';
    list.forEach(r=>grid.appendChild(buildRelated(r)));
    document.getElementById('relatedHead').hidden=false;
    grid.hidden=false;
  }catch(e){console.error(e);}
}

function buildRelated(r){
  const qual=(r.quality||'').toLowerCase();
  const badge=qual==='4k'?`<span class="rcard-badge" style="background:#1a1200;color:#f5c842;border:1.5px solid #f5c842;font-weight:800;letter-spacing:.8px;text-shadow:0 0 6px rgba(245,200,66,.6);box-shadow:0 0 6px rgba(245,200,66,.3)">4K</span>`:qual==='hd'?`<span class="rcard-badge" style="background:var(--badgehd);color:var(--badgehdT);border:1px solid rgba(95,206,127,.3)">HD</span>`:'';
  const a=document.createElement('a');
  a.className='rcard';
  a.href=`/video?id=${encodeURIComponent(r.id)}`;
  a.setAttribute('aria-label',esc(r.title));
  a.innerHTML=`
    <div class="rcard-thumb">
      <img src="${esc(r.thumb)}" alt="${esc(r.title)} thumbnail" loading="lazy" width="120" height="72">
      ${badge}
      ${r.duration?`<span class="rcard-dur">${esc(r.duration)}</span>`:''}
    </div>
    <div class="rcard-info">
      <p class="rcard-title">${esc(r.title)}</p>
      ${r.channel?`<p class="rcard-channel">${esc(r.channel)}</p>`:''}
      ${r.views?`<p class="rcard-views">${esc(r.views)}</p>`:''}
    </div>`;
  return a;
}

/* ── MAIN LOAD ── */
async function load(){
  if(!videoId){
    document.getElementById('playerWrap').innerHTML=`<div class="not-found" style="padding:60px 20px;text-align:center"><h2>No video selected</h2><p>Please go back and pick a video.</p><a href="/" class="btn-home">← Go Home</a></div>`;
    document.getElementById('playerWrap').style.aspectRatio='unset';
    return;
  }
  try{
    const snap=await getDoc(doc(db,'videos',videoId));
    if(!snap.exists()){
      document.getElementById('playerWrap').innerHTML=`<div class="not-found" style="padding:60px 20px;text-align:center"><h2>Video not found</h2><p>This video may have been removed.</p><a href="/" class="btn-home">← Go Home</a></div>`;
      document.getElementById('playerWrap').style.aspectRatio='unset';
      return;
    }
    const v={id:snap.id,...snap.data()};
    injectSEO(v);
    renderPlayer(v);
    renderInfo(v);
    loadRelated(v);
  }catch(e){
    console.error(e);
    document.getElementById('playerWrap').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#6a6a88;font-size:13px;flex-direction:column;gap:12px;"><p>Failed to load video.</p><a href="/" style="color:var(--accent2)">← Go Home</a></div>`;
  }
}

document.getElementById('footerYear').textContent=new Date().getFullYear();
load();
</script>

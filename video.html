<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CineInsight Player</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0b0b12;
color:#fff;
}

header{
position:sticky;
top:0;
z-index:1000;
background:rgba(11,11,18,.9);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,.08);
padding:15px 20px;
}

.logo{
font-size:28px;
font-weight:800;
color:#f5c842;
text-decoration:none;
}

.container{
max-width:1400px;
margin:auto;
padding:25px;
}

.player{
width:100%;
aspect-ratio:16/9;
border-radius:22px;
overflow:hidden;
background:#000;
border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 0 1px rgba(255,255,255,.05),
0 25px 60px rgba(0,0,0,.7),
0 0 40px rgba(245,200,66,.12);
}

.player iframe{
width:100%;
height:100%;
border:none;
}

.video-title{
font-size:32px;
font-weight:800;
margin-top:20px;
line-height:1.4;
}

.meta{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

.badge{
padding:10px 16px;
border-radius:50px;
background:linear-gradient(135deg,#f5c842,#ffd95e);
color:#000;
font-weight:700;
font-size:14px;
}

.channel-card{
margin-top:25px;
background:#14141f;
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:20px;

display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
}

.channel-left{
display:flex;
align-items:center;
gap:15px;
}

.avatar{
width:65px;
height:65px;
border-radius:50%;
background:#f5c842;
color:#000;
font-size:28px;
font-weight:800;

display:flex;
align-items:center;
justify-content:center;
}

.channel-name{
font-size:20px;
font-weight:700;
}

.channel-sub{
color:#999;
font-size:14px;
}

.subscribe{
background:#f5c842;
border:none;
padding:12px 22px;
border-radius:50px;
font-weight:700;
cursor:pointer;
}

.actions{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.actions button{
padding:12px 18px;
border-radius:50px;
border:1px solid rgba(255,255,255,.08);
background:#15151f;
color:#fff;
cursor:pointer;
}

.description{
margin-top:25px;
background:#14141f;
padding:20px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
}

.description h3{
margin-bottom:10px;
color:#f5c842;
}

.related-title{
font-size:26px;
font-weight:800;
margin:40px 0 20px;
}

.related-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:#14141f;
border-radius:18px;
overflow:hidden;
cursor:pointer;
border:1px solid rgba(255,255,255,.06);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card-title{
font-size:15px;
font-weight:600;
line-height:1.5;
}

.card-channel{
margin-top:8px;
color:#aaa;
font-size:13px;
}

@media(max-width:768px){

.container{
padding:15px;
}

.video-title{
font-size:24px;
}

.channel-card{
flex-direction:column;
align-items:flex-start;
}

.subscribe{
width:100%;
}

}
</style>
</head>
<body>

<header>
<a href="/" class="logo">CineInsight</a>
</header>

<div class="container">

<div class="player">
<iframe id="playerFrame" allowfullscreen></iframe>
</div>

<h1 class="video-title" id="videoTitle">
Loading...
</h1>

<div class="meta">
<div class="badge" id="viewsBadge">0 Views</div>
<div class="badge" id="durationBadge">00:00</div>
</div>

<div class="channel-card">

<div class="channel-left">

<div class="avatar" id="avatar">
C
</div>

<div>
<div class="channel-name" id="channelName">
Channel
</div>

<div class="channel-sub">
Official Creator Channel
</div>
</div>

</div>

<button class="subscribe">
Subscribe
</button>

</div>

<div class="actions">

<button>👍 Like</button>

<button>📤 Share</button>

<button>⭐ Save</button>

</div>

<div class="description">
<h3>Description</h3>

<p id="videoDescription">
Watch premium videos on CineInsight.
</p>

</div>

<h2 class="related-title">
More Videos
</h2>

<div class="related-grid" id="relatedGrid">

<!-- Firebase Videos -->

</div>

</div>

</body>
</html>

    btn.className = 'cat-item';
    btn.dataset.ch = ch;
    btn.textContent = ch;
    btn.addEventListener('click',()=>{
      state={channel:ch,search:'',sort:'latest'};
      bar.querySelectorAll('.ch-btn').forEach(x=>x.classList.remove('active'));
      const target=bar.querySelector(`.ch-btn[data-channel="${escHTML(ch)}"]`);
      if(target)target.classList.add('active'); else allBtn.classList.add('active');
      closeDropdown(); renderVideos();
    });
    catListEl.appendChild(btn);
  });
}

/* ── DROPDOWN MENU ── */
const dropdown=document.getElementById('dropdown');
const menuBtn=document.getElementById('menuBtn');
const catList=document.getElementById('catList');
const catChevron=document.getElementById('catChevron');
let dropOpen=false, catOpen=false;
function closeDropdown(){dropOpen=false;catOpen=false;dropdown.classList.remove('open');catList.classList.remove('open');catChevron.classList.remove('open');}
menuBtn.addEventListener('click',e=>{e.stopPropagation();dropOpen=!dropOpen;dropdown.classList.toggle('open',dropOpen);if(!dropOpen){catOpen=false;catList.classList.remove('open');catChevron.classList.remove('open');}});
document.getElementById('catToggle').addEventListener('click',e=>{e.stopPropagation();catOpen=!catOpen;catList.classList.toggle('open',catOpen);catChevron.classList.toggle('open',catOpen);});
document.addEventListener('click',e=>{if(!document.getElementById('menuWrap').contains(e.target))closeDropdown();});

document.getElementById('sortLatest').addEventListener('click',()=>{
  state={channel:'',search:'',sort:'latest'};
  document.getElementById('channelBar').querySelector('.ch-btn').click();
  closeDropdown(); renderVideos();
});
document.getElementById('sortViews').addEventListener('click',()=>{
  state={channel:'',search:'',sort:'mostviews'};
  document.getElementById('channelBar').querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('channelBar').querySelector('.ch-btn').classList.add('active');
  closeDropdown(); renderVideos();
});

/* ── INLINE SEARCH ── */
const searchBar=document.getElementById('searchBar');
const searchInput=document.getElementById('searchInput');
const searchClear=document.getElementById('searchClear');
document.getElementById('searchBtn').addEventListener('click',()=>{
  searchBar.classList.toggle('open');
  if(searchBar.classList.contains('open'))setTimeout(()=>searchInput.focus(),60);
});
searchInput.addEventListener('input',()=>{ searchClear.style.display=searchInput.value?'flex':'none'; });
searchClear.addEventListener('click',()=>{searchInput.value='';searchClear.style.display='none';searchInput.focus();});
document.getElementById('searchForm').addEventListener('submit',e=>{
  e.preventDefault();
  const q=searchInput.value.trim();
  if(!q)return;
  state={channel:'',search:q,sort:'latest'};
  document.getElementById('channelBar').querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('channelBar').querySelector('.ch-btn').classList.add('active');
  renderVideos();
  searchBar.classList.remove('open');
  searchInput.value=''; searchClear.style.display='none';
});

document.getElementById('clearBtn').addEventListener('click',()=>{
  state={channel:'',search:'',sort:'latest'};
  document.getElementById('channelBar').querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('channelBar').querySelector('.ch-btn').classList.add('active');
  renderVideos();
});

/* ── LOAD MORE ── */
document.getElementById('loadMoreBtn').addEventListener('click', async () => {
  if (!hasMore || !lastDoc) return;
  const btn = document.getElementById('loadMoreBtn');
  btn.textContent = 'Loading...'; btn.disabled = true;
  try {
    const snap = await getDocs(query(collection(db,'videos'), orderBy('createdAt','desc'), limit(PAGE_SIZE), startAfter(lastDoc)));
    if (!snap.empty) {
      lastDoc = snap.docs[snap.docs.length - 1];
      hasMore = snap.docs.length === PAGE_SIZE;
      snap.docs.forEach(d => allVideos.push({id:d.id,...d.data()}));
      buildChannelBar();
      renderVideos();
    } else {
      hasMore = false;
    }
  } catch(e) { console.error(e); }
  btn.textContent = 'Load More'; btn.disabled = false;
  btn.style.display = hasMore ? 'block' : 'none';
});

/* ── INIT — paginated fetch ── */
(async()=>{
  try {
    const snap=await getDocs(query(collection(db,'videos'), orderBy('createdAt','desc'), limit(PAGE_SIZE)));
    allVideos=snap.docs.map(d=>({id:d.id,...d.data()}));
    lastDoc = snap.docs.length ? snap.docs[snap.docs.length - 1] : null;
    hasMore = snap.docs.length === PAGE_SIZE;

    // handle URL params
    const params = new URLSearchParams(location.search);
    const qParam = params.get('q');
    const chParam = params.get('channel');
    const sortParam = params.get('sort');
    if (qParam) state = { channel:'', search: qParam, sort:'latest' };
    else if (chParam) state = { channel: chParam, search:'', sort:'latest' };
    else if (sortParam === 'mostviews') state = { channel:'', search:'', sort:'mostviews' };

    buildChannelBar();
    renderVideos();
  } catch(e) {
    document.getElementById('videoList').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div>Failed to load videos</div></div>';
    console.error(e);
  }
})();
</script>
</body>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
:root{
  --bg:#080810;--bg2:#0f0f1a;--bg3:#15151f;
  --border:rgba(255,255,255,.07);
  --accent:#3d6fff;--accent2:#5f87ff;
  --text:#f0f0f8;--muted:#6a6a88;--muted2:#9090b0;
  --badge4k:#0a2060;--badge4kT:#7eb3ff;
  --badgehd:#0a2d12;--badgehdT:#5fce7f;
  --tag-bg:rgba(61,111,255,.12);--tag-border:rgba(61,111,255,.3);
  --radius:12px;--radius-sm:7px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overscroll-behavior:none}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}

/* SKIP LINK */
.skip{position:absolute;top:-100%;left:0;padding:8px 18px;background:var(--accent);color:#fff;font-weight:600;font-size:13px;border-radius:0 0 var(--radius) 0;z-index:9999;transition:top .2s}
.skip:focus{top:0}

/* HEADER */
#header{position:sticky;top:0;z-index:100;background:rgba(8,8,16,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:10px 14px}
.header-row{display:flex;align-items:center;gap:10px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--accent2);letter-spacing:-.5px;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;text-decoration:none}
.logo svg{width:20px;height:20px;fill:var(--accent)}
.search-wrap{flex:1;position:relative}
.search-wrap svg.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
#searchInput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:30px;padding:8px 12px 8px 34px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
#searchInput:focus{border-color:rgba(61,111,255,.5)}
#searchInput::placeholder{color:var(--muted)}
.menu-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:border-color .2s,background .2s}
.menu-btn:hover{border-color:var(--accent);background:rgba(61,111,255,.1)}
.menu-btn svg{width:18px;height:18px;stroke:var(--muted2);fill:none;stroke-width:2;stroke-linecap:round}

/* SEARCH DROP */
#searchDrop{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;z-index:200;box-shadow:0 20px 60px rgba(0,0,0,.6)}
#searchDrop.show{display:block}
.s-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted2);transition:background .15s}
.s-item:last-child{border-bottom:none}
.s-item:hover{background:var(--bg3);color:var(--text)}
.s-item svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}

/* CATEGORY / CHANNEL BAR */
#catBar{display:flex;gap:7px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border)}
#catBar::-webkit-scrollbar{display:none}
.cat{white-space:nowrap;padding:6px 15px;border-radius:30px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--muted2);background:var(--bg2);transition:all .2s;flex-shrink:0}
.cat:hover{border-color:var(--accent2);color:var(--text)}
.cat.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* FEED */
#feed{padding:12px 14px;display:flex;flex-direction:column;gap:14px}

/* CARD — now an <a> element */
.vcard{display:block;background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:border-color .2s,transform .2s;text-decoration:none;color:inherit}
.vcard:hover{border-color:rgba(61,111,255,.4);transform:translateY(-2px)}
.vcard:active{transform:translateY(0)}
.vcard:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* THUMBNAIL — NO bottom gradient */
.thumb-wrap{position:relative;overflow:hidden;line-height:0}
.thumb-wrap img{width:100%;height:190px;object-fit:cover;display:block;background:var(--bg3)}

/* 4K BADGE — top right corner */
.badge-quality{position:absolute;top:8px;right:8px;z-index:3;display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:800;letter-spacing:1px;pointer-events:none;user-select:none}
.badge-4k{background:#1a1200;color:#f5c842;border:1.5px solid #f5c842;box-shadow:0 0 8px rgba(245,200,66,.45),0 0 20px rgba(245,200,66,.15);text-shadow:0 0 8px rgba(245,200,66,.7);animation:badge4k-glow 2.4s ease-in-out infinite}
@keyframes badge4k-glow{0%,100%{box-shadow:0 0 8px rgba(245,200,66,.45),0 0 20px rgba(245,200,66,.15)}50%{box-shadow:0 0 4px rgba(245,200,66,.2),0 0 10px rgba(245,200,66,.08)}}
.badge-hd{background:var(--badgehd);color:var(--badgehdT);border:1px solid rgba(95,206,127,.3)}

/* Duration badge — bottom left */
.dur{position:absolute;bottom:7px;left:8px;background:rgba(0,0,0,.78);color:#fff;font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;z-index:3;pointer-events:none}

.card-info{padding:11px 13px 13px}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;line-height:1.45;color:var(--text);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-channel{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.channel-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;color:var(--accent2);padding:3px 10px;border-radius:20px;background:var(--tag-bg);border:1px solid var(--tag-border);transition:background .2s,color .2s;cursor:pointer;text-decoration:none}
.channel-chip:hover{background:rgba(61,111,255,.25);color:#fff}
.channel-chip svg{width:11px;height:11px;stroke:var(--accent2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card-stats{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.stat{display:flex;align-items:center;gap:4px}
.stat svg{width:13px;height:13px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.stat.like svg{stroke:#e05555}
.stat.view svg{stroke:var(--muted)}

/* STATES */
.state-msg{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.spinner{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--accent);animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(5,5,12,.97);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);flex-direction:column}
#overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.overlay-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.overlay-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--accent2)}
.close-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s}
.close-btn:hover{border-color:var(--accent)}
.close-btn svg{width:18px;height:18px;stroke:var(--muted2);fill:none;stroke-width:2.5;stroke-linecap:round}
.overlay-nav{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 28px;gap:2px}
.nav-item{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:padding-left .2s}
.nav-item:last-child{border-bottom:none}
.nav-item:hover{padding-left:6px}
.nav-icon{width:38px;height:38px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,border-color .2s}
.nav-item:hover .nav-icon{background:rgba(61,111,255,.15);border-color:var(--accent)}
.nav-icon svg{width:18px;height:18px;stroke:var(--accent2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-label{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text)}
.nav-item:hover .nav-label{color:var(--accent2)}
.overlay-footer{padding:16px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.toggle-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted2)}
.toggle-row svg{width:16px;height:16px;stroke:var(--accent2);fill:none;stroke-width:2;stroke-linecap:round}
.toggle{width:40px;height:22px;background:var(--accent);border-radius:11px;position:relative;cursor:pointer;transition:background .2s}
.toggle.off{background:var(--bg3);border:1px solid var(--border)}
.toggle::after{content:'';position:absolute;top:3px;right:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:right .2s}
.toggle.off::after{right:auto;left:3px;background:var(--muted)}
.lang-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted2);font-size:12px;font-weight:500;padding:7px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;transition:border-color .2s}
.lang-btn:hover{border-color:var(--accent2);color:var(--text)}
.lang-btn svg{width:15px;height:15px;stroke:var(--accent2);fill:none;stroke-width:2;stroke-linecap:round}

footer{padding:24px 14px;border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--muted);margin-top:20px}
</style>
</head>
<body>
<a class="skip" href="#feed">Skip to content</a>
<h1 class="sr-only">VideoHub — Watch Free HD &amp; 4K Videos Online</h1>

<!-- HEADER -->
<header id="header" role="banner">
  <div class="header-row">
    <a href="/" class="logo" aria-label="VideoHub Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="5,3 19,12 5,21"/></svg>
      VideoHub
    </a>
    <div class="search-wrap" role="search">
      <svg class="s-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="searchInput" placeholder="Search videos…" autocomplete="off" aria-label="Search videos">
      <div id="searchDrop" role="listbox" aria-label="Search suggestions"></div>
    </div>

      <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

<!-- OVERLAY MENU -->
<div id="overlay" role="dialog" aria-modal="true" aria-label="Navigation menu">

    <button class="close-btn" onclick="closeOverlay()" aria-label="Close navigation menu">
      <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <nav class="overlay-nav" aria-label="Main navigation">
    <div class="nav-item" onclick="menuAction('latest')" tabindex="0" role="button">

      <span class="nav-label">Latest</span>
    </div>
    <div class="nav-item" onclick="menuAction('top')" tabindex="0" role="button">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg></div>

      <span class="nav-label">Most Viewed</span>

      <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>

<!-- FIREBASE MODULE -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,collection,getDocs}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const SITE='https://cineinsight.info';
const cfg={
  apiKey:"AIzaSyBYNU7wTq9_1-TdIVuG-yxAlKjeFb9Rm_M",
  authDomain:"video-cms-b7c1e.firebaseapp.com",
  projectId:"video-cms-b7c1e",
  storageBucket:"video-cms-b7c1e.firebasestorage.app",
  messagingSenderId:"991575420179",
  appId:"1:991575420179:web:23459a09aa36f868e37ee6"
};
const app=initializeApp(cfg);
const db=getFirestore(app);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

window._allVideos=[];
window._activeFilter='all';

/* ── FETCH ── */
async function fetchVideos(){
  try{
    const snap=await getDocs(collection(db,'videos'));
    window._allVideos=snap.docs.map(d=>({id:d.id,...d.data()})).reverse();
    buildChannelBar();
    renderFeed(window._allVideos);
  }catch(e){
    console.error(e);
    document.getElementById('feed').innerHTML='<div class="state-msg">Failed to load. Please refresh.</div>';
  }
}

/* ── CHANNEL BAR (replaces tag bar) ── */
function buildChannelBar(){
  const seen=new Set();
  const bar=document.getElementById('catBar');
  window._allVideos.forEach(v=>{
    const ch=(v.channel||'').trim();
    if(ch&&!seen.has(ch.toLowerCase())){
      seen.add(ch.toLowerCase());
      const btn=document.createElement('button');
      btn.className='cat';
      btn.dataset.filter=ch;
      btn.setAttribute('aria-pressed','false');
      btn.textContent=ch;
      btn.onclick=()=>filterByChannel(ch,btn);
      bar.appendChild(btn);
    }
  });
  document.querySelector('.cat[data-filter="all"]').onclick=()=>filterByChannel('all',document.querySelector('.cat[data-filter="all"]'));
}

function filterByChannel(ch,btn){
  window._activeFilter=ch;
  document.querySelectorAll('.cat').forEach(c=>{c.classList.remove('active');c.setAttribute('aria-pressed','false')});
  btn.classList.add('active');
  btn.setAttribute('aria-pressed','true');
  const list=ch==='all'?window._allVideos:window._allVideos.filter(v=>(v.channel||'').toLowerCase()===(ch||'').toLowerCase());
  renderFeed(list);
}

/* ── RENDER ── */
window.renderFeed=function(videos){
  const feed=document.getElementById('feed');
  if(!videos.length){feed.innerHTML='<div class="state-msg">No videos found.</div>';return;}
  feed.innerHTML='';
  videos.forEach(v=>feed.appendChild(buildCard(v)));
};

/* ── BUILD CARD ── */
function buildCard(v){
  const qual=(v.quality||'').toLowerCase();
  const badge=qual==='4k'?`<span class="badge-quality badge-4k">4K</span>`:qual==='hd'?`<span class="badge-quality badge-hd">HD</span>`:'';
  const dur=esc(v.duration||'');
  const views=esc(v.views||'0 views');
  const likes=esc(v.likes||'0%');
  const ch=esc(v.channel||'');

  const a=document.createElement('a');
  a.className='vcard';
  a.href=`/video?id=${encodeURIComponent(v.id)}`;
  a.setAttribute('aria-label',esc(v.title));
  a.innerHTML=`
    <div class="thumb-wrap">
      <img src="${esc(v.thumb)}" alt="${esc(v.title)} thumbnail" loading="lazy" width="400" height="190">
      ${badge}
      ${dur?`<span class="dur" aria-label="Duration ${dur}">${dur}</span>`:''}
    </div>
    <div class="card-info">
      <p class="card-title">${esc(v.title)}</p>
      ${ch?`<div class="card-channel">
        <span class="channel-chip" data-channel="${ch}" role="button" tabindex="0" aria-label="Filter by channel ${ch}">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          ${ch}
        </span>
      </div>`:''}
      <div class="card-stats">
        <span class="stat like">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          ${likes}
        </span>
        <span class="stat view">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          ${views}
        </span>
      </div>
    </div>`;

  /* channel chip click — filter without navigating */
  const chip=a.querySelector('.channel-chip');
  if(chip){
    chip.addEventListener('click',e=>{
      e.preventDefault();
      e.stopPropagation();
      const chName=chip.dataset.channel;
      const btn=document.querySelector(`.cat[data-filter="${CSS.escape(chName)}"]`);
      if(btn)filterByChannel(chName,btn);
    });
    chip.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();chip.click();}});
  }
  return a;
}

/* ── SEARCH ── */
const searchInput=document.getElementById('searchInput');
const searchDrop=document.getElementById('searchDrop');
searchInput.addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  if(!q||!window._allVideos.length){searchDrop.classList.remove('show');return;}
  const hits=window._allVideos.filter(v=>(v.title||'').toLowerCase().includes(q)||(v.channel||'').toLowerCase().includes(q)||(v.tags||[]).some(t=>t.toLowerCase().includes(q))).slice(0,8);
  searchDrop.innerHTML=!hits.length
    ?'<div class="s-item">No results found</div>'
    :hits.map(v=>`<div class="s-item" onclick="window._goVideo('${esc(v.id)}')"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>${esc(v.title)}</div>`).join('');
  searchDrop.classList.add('show');
});
window._goVideo=function(id){window.location.href=`/video?id=${encodeURIComponent(id)}`;};
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))searchDrop.classList.remove('show');});

/* ── MENU ACTIONS ── */
window.menuAction=function(type){
  closeOverlay();
  let list=[...window._allVideos];
  if(type==='latest'){}
  if(type==='top')list.sort((a,b)=>parseFloat(b.likes||0)-parseFloat(a.likes||0));
  if(type==='viewed')list.sort((a,b)=>{
    const n=s=>parseFloat((s||'0').replace(/[^0-9.]/g,''))*((s||'').includes('M')?1e6:(s||'').includes('K')?1e3:1);
    return n(b.views)-n(a.views);
  });
  if(type==='categories'){document.getElementById('catBar').scrollIntoView({behavior:'smooth'});return;}
  renderFeed(list);
  document.querySelectorAll('.cat').forEach(c=>{c.classList.remove('active');c.setAttribute('aria-pressed','false')});
};

fetchVideos();
</script>

<!-- UTILS -->
<script>
function openOverlay(){document.getElementById('overlay').classList.add('open');document.body.style.overflow='hidden';document.getElementById('menuBtn').setAttribute('aria-expanded','true');}
function closeOverlay(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';document.getElementById('menuBtn').setAttribute('aria-expanded','false');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeOverlay();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlay();});
let darkOn=true;
function toggleDark(){darkOn=!darkOn;const t=document.getElementById('darkToggle');t.classList.toggle('off',!darkOn);t.setAttribute('aria-checked',darkOn);if(!darkOn){document.documentElement.style.setProperty('--bg','#f4f4f8');document.documentElement.style.setProperty('--bg2','#ffffff');document.documentElement.style.setProperty('--bg3','#eaeaf0');document.documentElement.style.setProperty('--text','#111120');document.documentElement.style.setProperty('--muted','#888898');document.documentElement.style.setProperty('--muted2','#555568');document.documentElement.style.setProperty('--border','rgba(0,0,0,.09)');}else{document.documentElement.style.setProperty('--bg','#080810');document.documentElement.style.setProperty('--bg2','#0f0f1a');document.documentElement.style.setProperty('--bg3','#15151f');document.documentElement.style.setProperty('--text','#f0f0f8');document.documentElement.style.setProperty('--muted','#6a6a88');document.documentElement.style.setProperty('--muted2','#9090b0');document.documentElement.style.setProperty('--border','rgba(255,255,255,.07)');}}
const langs=['EN','BN','AR','FR','ES'];let langIdx=0;
function cycleLang(){langIdx=(langIdx+1)%langs.length;document.getElementById('langLabel').textContent=langs[langIdx];}
document.getElementById('footerYear').textContent=new Date().getFullYear();
</script>
</body>

<style>
/* ═══ RESET ═══════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
/* ═══ TOKENS ══════════════════════════════════════════════ */
:root{
  --bg:#0d0d14;--bg2:#111118;--card:#15151e;--card-h:#1b1b27;
  --border:#22222f;--border-h:#333348;
  --y:#f5c842;--yd:rgba(245,200,66,.13);--yg:rgba(245,200,66,.25);
  --text:#eeeef5;--sub:#9898b0;--muted:#4e4e68;
  --r:12px;--rs:6px;
  --fd:'Bebas Neue','Arial Black',sans-serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --fm:'SF Mono','Fira Code','Consolas',monospace;
  --ease:.3s cubic-bezier(.22,1,.36,1);
  /* light mode */
  --lbg:#f5f5f8;--lbg2:#fff;--lcard:#fff;--lcard-h:#f0f0f6;
  --lborder:#e0e0ec;--ltext:#111118;--lsub:#55556a;--lmuted:#aaaabc;
}
[data-theme="light"]{
  --bg:var(--lbg);--bg2:var(--lbg2);--card:var(--lcard);--card-h:var(--lcard-h);
  --border:var(--lborder);--border-h:#c0c0d8;
  --text:var(--ltext);--sub:var(--lsub);--muted:var(--lmuted);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased;min-height:100vh;transition:background .3s,color .3s}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font-family:var(--fb)}
/* ═══ SKIP LINK ═══════════════════════════════════════════ */
.skip{position:absolute;top:-100%;left:0;padding:8px 18px;background:var(--y);color:#000;font-weight:600;font-size:13px;border-radius:0 0 var(--r) 0;z-index:9999;transition:top .2s}
.skip:focus{top:0}

/* ═══════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════ */
header{
  position:sticky;top:0;z-index:900;
  background:rgba(13,13,20,.95);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
}
[data-theme="light"] header{background:rgba(245,245,248,.95)}
.header-top{
  display:grid;
  grid-template-columns:56px 1fr 56px;
  align-items:center;
  padding:0 16px;
  height:62px;
  gap:12px;
}
/* Hamburger */
.ham-btn{
  width:40px;height:40px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  background:none;border:1px solid var(--border);border-radius:var(--rs);
  cursor:pointer;transition:border-color var(--ease),background var(--ease);
}
.ham-btn:hover{border-color:var(--y);background:var(--yd)}
.ham-btn span{display:block;width:18px;height:1.5px;background:var(--text);border-radius:2px;transition:transform .3s,opacity .3s}
.ham-btn.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.ham-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.ham-btn.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
/* Logo center */
.logo-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo{font-family:var(--fd);font-size:26px;letter-spacing:3px;color:var(--y);display:flex;align-items:center;gap:6px;line-height:1}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--y);box-shadow:0 0 8px var(--y);animation:pulse-dot 2.4s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 6px var(--y),0 0 14px rgba(245,200,66,.5)}50%{box-shadow:0 0 2px var(--y)}}
/* Right: search toggle on mobile */
.header-right{display:flex;justify-content:flex-end}
.search-icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;color:var(--sub);transition:border-color var(--ease),color var(--ease)}
.search-icon-btn:hover{border-color:var(--y);color:var(--y)}

/* Search bar row (below logo row on desktop, slide on mobile) */
.header-search{
  padding:0 16px 12px;
  display:flex;align-items:center;gap:10px;
}
.search-wrap{
  flex:1;position:relative;
}
.search-input{
  width:100%;height:38px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:40px;
  padding:0 40px 0 16px;
  color:var(--text);
  font-family:var(--fb);font-size:13px;
  outline:none;
  transition:border-color var(--ease),box-shadow var(--ease);
}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(245,200,66,.1)}
.search-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;transition:color .2s;
}
.search-btn:hover{color:var(--y)}
/* Search dropdown */
.search-drop{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--card);
  border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;z-index:800;
  box-shadow:0 16px 40px rgba(0,0,0,.5);
  display:none;
}
.search-drop.open{display:block}
.search-drop-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;
  transition:background .2s;
}
.search-drop-item:hover{background:var(--card-h)}
.sdi-thumb{width:60px;height:36px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--border)}
.sdi-info{flex:1;overflow:hidden}
.sdi-title{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdi-meta{font-size:10.5px;color:var(--muted);font-family:var(--fm);margin-top:2px}
.search-no-result{padding:20px;text-align:center;font-size:13px;color:var(--muted)}

/* ═══════════════════════════════════════════════════════════
   SIDEBAR / DRAWER MENU
═══════════════════════════════════════════════════════════ */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{
  position:fixed;top:0;left:0;bottom:0;width:290px;
  background:var(--bg2);border-right:1px solid var(--border);
  z-index:1001;
  transform:translateX(-100%);
  transition:transform .35s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;overflow-y:auto;
}
.drawer.open{transform:translateX(0)}
.drawer-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.drawer-logo{font-family:var(--fd);font-size:22px;letter-spacing:2px;color:var(--y)}
.drawer-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;color:var(--sub);transition:border-color .2s,color .2s}
.drawer-close:hover{border-color:var(--y);color:var(--y)}
.drawer-section{padding:14px 0}
.drawer-label{font-family:var(--fm);font-size:9.5px;letter-spacing:2.5px;color:var(--muted);padding:0 20px 8px;text-transform:uppercase}
.drawer-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 20px;cursor:pointer;
  font-size:14px;font-weight:500;color:var(--sub);
  transition:background .2s,color .2s;
  border-left:3px solid transparent;
}
.drawer-item:hover,.drawer-item.active{background:var(--yd);color:var(--y);border-left-color:var(--y)}
.drawer-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
.drawer-item:hover svg,.drawer-item.active svg{opacity:1}
.drawer-divider{height:1px;background:var(--border);margin:4px 20px}
/* Settings in drawer */
.drawer-settings{padding:14px 20px;border-top:1px solid var(--border);margin-top:auto;flex-shrink:0}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.setting-label{font-size:13px;color:var(--sub);display:flex;align-items:center;gap:8px}
.setting-label svg{width:16px;height:16px}
/* Toggle switch */
.toggle{position:relative;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:22px;cursor:pointer;transition:.3s}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:var(--sub);border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider{background:var(--y)}
.toggle input:checked + .toggle-slider::before{transform:translateX(18px);background:#000}
/* Language select */
.lang-select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:4px 8px;font-size:12px;font-family:var(--fb);outline:none;cursor:pointer}

/* ═══════════════════════════════════════════════════════════
   CHANNEL STRIP
═══════════════════════════════════════════════════════════ */
.channel-strip{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  overflow-x:auto;
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.channel-strip::-webkit-scrollbar{display:none}
.ch-item{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  flex-shrink:0;cursor:pointer;
  transition:transform .2s;
}
.ch-item:hover{transform:translateY(-2px)}
.ch-item.active .ch-avatar{border-color:var(--y);box-shadow:0 0 0 2px var(--y),0 0 12px rgba(245,200,66,.3)}
.ch-avatar{
  width:48px;height:48px;border-radius:50%;
  border:2px solid var(--border);
  object-fit:cover;background:var(--border);
  transition:border-color .2s,box-shadow .2s;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.ch-avatar-placeholder{
  width:48px;height:48px;border-radius:50%;
  border:2px solid var(--border);
  background:#000000;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:16px;color:var(--y);
  transition:border-color .2s,box-shadow .2s;
  flex-shrink:0;
}
.ch-item.active .ch-avatar-placeholder{border-color:var(--y);box-shadow:0 0 0 2px var(--y),0 0 12px rgba(245,200,66,.3)}
.ch-name{
  font-size:10px;
  color:#fff;
  background:#000000;
  padding:3px 8px;
  border-radius:12px;

  white-space:nowrap;
  max-width:70px;
  overflow:hidden;
  text-overflow:ellipsis;
  text-align:center;

  border:1px solid #222;
}
.ch-item.active .ch-name{color:var(--y);font-weight:600}
/* "All" chip */
.ch-all{
  flex-shrink:0;
  padding:8px 16px;
  border:1.5px solid var(--y);border-radius:40px;
  font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:1px;
  color:var(--y);background:var(--yd);cursor:pointer;
  white-space:nowrap;
  transition:background .2s,box-shadow .2s;
}
.ch-all:hover{background:rgba(245,200,66,.22);box-shadow:0 0 10px rgba(245,200,66,.2)}

/* ═══════════════════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════════════════ */
.main-wrap{max-width:780px;margin:0 auto;padding:24px 16px 60px}
.section-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:18px}
.section-title{font-family:var(--fd);font-size:24px;letter-spacing:2px}
.section-count{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:1px}

/* ═══════════════════════════════════════════════════════════
   CARD — 3D BADGE STYLE
═══════════════════════════════════════════════════════════ */
.video-grid{display:flex;flex-direction:column;gap:22px}
.card{
  background:var(--card);
  border-radius:var(--r);
  overflow:hidden;
  cursor:pointer;
  border:1px solid var(--border);
  transition:transform var(--ease),border-color var(--ease),box-shadow var(--ease),background var(--ease);
  position:relative;
}
.card:hover,.card:focus-within{
  transform:translateY(-3px);
  background:var(--card-h);
  border-color:var(--border-h);
  box-shadow:0 20px 50px rgba(0,0,0,.45),0 0 0 1px var(--border-h);
}
.card:focus-visible{outline:2px solid var(--y);outline-offset:2px}

/* ── THUMB ── */
.card-thumb{position:relative;overflow:hidden;aspect-ratio:16/9;background:#08080f;line-height:0}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .55s cubic-bezier(.22,1,.36,1),filter .3s;filter:brightness(1)}
.card:hover .card-thumb img{transform:scale(1.04);filter:brightness(1)}
.card-thumb::after{display:none}

/* ── 3D QUALITY BADGE — top right ── */
.badge-quality{
  position:absolute;top:12px;right:12px;z-index:3;
  display:inline-flex;align-items:center;gap:5px;
  /* 3D effect: layered box-shadows + perspective highlight */
  background:linear-gradient(145deg,#2a2008 0%,#1a1400 60%);
  border:1.5px solid #f5c842;
  border-radius:5px;
  padding:4px 10px 4px 8px;
  pointer-events:none;user-select:none;
  /* Top highlight (lit face) */
  box-shadow:
    0 1px 0 0 rgba(255,220,100,.35) inset,   /* top inner highlight */
    0 -1px 0 0 rgba(0,0,0,.6) inset,         /* bottom inner shadow */
    2px 4px 0 0 rgba(120,80,0,.8),            /* 3D extrude right+bottom */
    3px 6px 12px rgba(0,0,0,.55),             /* drop shadow */
    0 0 16px rgba(245,200,66,.22);            /* ambient glow */
  transform:perspective(200px) rotateX(4deg);
  transition:transform .2s,box-shadow .2s;
}
.card:hover .badge-quality{
  transform:perspective(200px) rotateX(2deg) translateY(-1px);
  box-shadow:
    0 1px 0 0 rgba(255,220,100,.4) inset,
    0 -1px 0 0 rgba(0,0,0,.6) inset,
    2px 5px 0 0 rgba(120,80,0,.8),
    3px 8px 18px rgba(0,0,0,.6),
    0 0 22px rgba(245,200,66,.32);
}
.badge-quality-dot{
  width:6px;height:6px;border-radius:50%;background:var(--y);
  box-shadow:0 0 5px var(--y),0 0 10px rgba(245,200,66,.6);
  flex-shrink:0;animation:pulse-dot 2.2s ease-in-out infinite;
}
.badge-quality-text{
  font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:2px;
  color:var(--y);text-shadow:0 1px 4px rgba(0,0,0,.8);line-height:1;
}

/* ── 3D DURATION BADGE — bottom left ── */
.badge-duration{
  position:absolute;bottom:12px;left:14px;z-index:3;
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(145deg,#1c1c2a 0%,#0f0f18 60%);
  border:1px solid rgba(255,255,255,.18);
  border-radius:5px;
  padding:3px 9px;
  pointer-events:none;user-select:none;
  box-shadow:
    0 1px 0 0 rgba(255,255,255,.12) inset,
    0 -1px 0 0 rgba(0,0,0,.5) inset,
    2px 3px 0 0 rgba(0,0,0,.7),
    2px 5px 10px rgba(0,0,0,.5);
  transform:perspective(200px) rotateX(4deg);
}
.badge-duration-icon{
  width:7px;height:7px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.5);
  flex-shrink:0;
}
.badge-duration-text{
  font-family:var(--fm);font-size:11.5px;font-weight:600;letter-spacing:1.2px;
  color:#dde0f5;text-shadow:0 1px 3px rgba(0,0,0,.9);
}

/* ── 3D VIEWS BADGE — bottom right ── */
.badge-views{
  position:absolute;bottom:12px;right:14px;z-index:3;
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(145deg,#201a00 0%,#140f00 60%);
  border:1px solid rgba(245,200,66,.35);
  border-radius:5px;
  padding:3px 9px;
  pointer-events:none;user-select:none;
  box-shadow:
    0 1px 0 0 rgba(245,200,66,.2) inset,
    0 -1px 0 0 rgba(0,0,0,.5) inset,
    2px 3px 0 0 rgba(100,70,0,.7),
    2px 5px 10px rgba(0,0,0,.45),
    0 0 10px rgba(245,200,66,.12);
  transform:perspective(200px) rotateX(4deg);
}
.badge-views svg{width:7px;height:8px;fill:var(--y);flex-shrink:0}
.badge-views-text{
  font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.8px;
  color:var(--y);text-shadow:0 1px 3px rgba(0,0,0,.8);
}

/* ── CARD INFO ── */
.card-info{padding:14px 16px 14px}
.card-title{
  font-size:15px;font-weight:500;line-height:1.55;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:10px;
}
.card-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--fm);font-size:10.5px;letter-spacing:.6px;
  padding:3px 10px;border-radius:40px;
}
.meta-chip-y{color:var(--y);background:var(--yd);border:1px solid rgba(245,200,66,.2)}
.meta-chip-n{color:var(--sub);background:rgba(255,255,255,.04);border:1px solid var(--border)}
.meta-chip svg{width:7px;height:8px;fill:currentColor}

/* ═══════════════════════════════════════════════════════════
   LOADING / EMPTY STATES
═══════════════════════════════════════════════════════════ */
.state-msg{
  padding:60px 20px;text-align:center;
  font-family:var(--fm);font-size:13px;letter-spacing:2px;color:var(--muted);
}

/* ═══════════════════════════════════════════════════════════
   PLAYER PAGE
═══════════════════════════════════════════════════════════ */
.player-page{display:none}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  margin:20px 16px;
  padding:9px 20px;
  background:var(--card);color:var(--sub);
  border:1px solid var(--border);border-radius:40px;
  cursor:pointer;font-size:13px;font-weight:500;
  transition:border-color .2s,color .2s,background .2s;
}
.back-btn:hover{border-color:var(--y);color:var(--y);background:var(--yd)}
.video-box{width:100%;background:#000;position:relative;padding-top:56.25%}
.video-box iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-content{padding:20px 16px;max-width:780px;margin:0 auto}
.player-title{font-size:22px;font-weight:500;line-height:1.4;margin-bottom:12px}
.player-badges{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.p-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--fm);font-size:10.5px;letter-spacing:.8px;
  padding:4px 12px;border-radius:5px;
  background:linear-gradient(145deg,#201a00,#140f00);
  border:1px solid rgba(245,200,66,.3);color:var(--y);
  box-shadow:2px 3px 0 0 rgba(100,70,0,.6),0 0 10px rgba(245,200,66,.1);
  transform:perspective(200px) rotateX(3deg);
}
.p-badge-n{
  background:linear-gradient(145deg,#1c1c2a,#0f0f18);
  border:1px solid rgba(255,255,255,.12);color:var(--sub);

<!-- ══════════════════════════════════════════════════════════
     FIREBASE + APP LOGIC
══════════════════════════════════════════════════════════ -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,collection,getDocs}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const cfg={
  apiKey:"AIzaSyBYNU7wTq9_1-TdIVuG-yxAlKjeFb9Rm_M",
  authDomain:"video-cms-b7c1e.firebaseapp.com",
  projectId:"video-cms-b7c1e",
  storageBucket:"video-cms-b7c1e.firebasestorage.app",
  messagingSenderId:"991575420179",
  appId:"1:991575420179:web:23459a09aa36f868e37ee6"
};
const app=initializeApp(cfg);
const db=getFirestore(app);

let allVideos=[],filteredVideos=[],currentChannel='all',currentFilter='latest';

/* ── Sanitise ── */
const s=(v='')=>String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ── Play icon ── */
const PLAY_SVG=`<svg viewBox="0 0 7 8"><path d="M1 1L6 4L1 7V1Z"/></svg>`;

/* ══ BUILD CARD ══════════════════════════════════════════ */
function buildCard(video){
  const el=document.createElement('article');
  el.className='card';
  el.setAttribute('role','listitem');
  el.setAttribute('tabindex','0');
  el.setAttribute('aria-label',s(video.title));

  const qual=s(video.quality||'4K');
  const dur=s(video.duration||'00:00');
  const views=s(video.views||'0 views');

  el.innerHTML=`
    <div class="card-thumb">
      <img src="${s(video.thumb)}" alt="${s(video.title)} thumbnail"
           width="1280" height="720" loading="lazy" decoding="async">
      <span class="badge-quality" aria-label="Quality ${qual}">
        <span class="badge-quality-dot" aria-hidden="true"></span>
        <span class="badge-quality-text">${qual}</span>
      </span>
      <span class="badge-duration" aria-label="Duration ${dur}">
        <span class="badge-duration-icon" aria-hidden="true"></span>
        <span class="badge-duration-text">${dur}</span>
      </span>
      <span class="badge-views" aria-label="${views}">
        ${PLAY_SVG}
        <span class="badge-views-text">${views}</span>
      </span>
    </div>
    <div class="card-info">
      <p class="card-title">${s(video.title)}</p>
      <div class="card-meta-row">
        ${video.channel?`<span class="meta-chip meta-chip-n">${s(video.channel)}</span>`:''}
        ${video.category?`<span class="meta-chip meta-chip-n">${s(video.category)}</span>`:''}
      </div>
    </div>`;

  const open=()=>openVideo(video.id);
  el.addEventListener('click',open);
  el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open();}});
  return el;
}

/* ══ LOAD VIDEOS ═════════════════════════════════════════ */
async function loadVideos(){
  try{
    const snap=await getDocs(collection(db,'videos'));
    allVideos=snap.docs.map(d=>({id:d.id,...d.data()}));
    buildChannelStrip();
    buildCategoryList();
    applyFilter();
    injectListSchema();
  }catch(e){
    console.error(e);
    document.getElementById('videoGrid').innerHTML='<p class="state-msg" role="alert">FAILED TO LOAD — PLEASE REFRESH</p>';
  }
}

/* ══ CHANNEL STRIP ═══════════════════════════════════════ */
function buildChannelStrip(){
  const strip=document.getElementById('channelStrip');

  // পুরাতন badge মুছে ফেলবে
  strip.innerHTML =
    '<button class="ch-all active" onclick="filterChannel(\'all\')" aria-pressed="true">ALL</button>';

  const channelMap = new Map();

  allVideos.forEach(video => {
    if(!video.channel) return;

    const originalName = video.channel.trim();
    const key = originalName.toLowerCase();

    if(!channelMap.has(key)){
      channelMap.set(key, originalName);
    }
  });

  channelMap.forEach((channelName) => {
    const btn=document.createElement('button');
    btn.className='ch-item';

    btn.innerHTML=`
      <div class="ch-avatar-placeholder">
        ${channelName.charAt(0).toUpperCase()}
      </div>
      <span class="ch-name">${s(channelName)}</span>
    `;

    btn.onclick=()=>filterChannel(channelName);

    strip.appendChild(btn);
  });
}
/* ══ CATEGORY LIST ═══════════════════════════════════════ */
function buildCategoryList(){
  const cats=[...new Set(allVideos.map(v=>v.category).filter(Boolean))];
  const list=document.getElementById('categoryList');
  cats.forEach(cat=>{
    const d=document.createElement('div');
    d.className='drawer-item';
    d.setAttribute('data-filter',`cat:${cat}`);
    d.innerHTML=`<svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="2" y="2" width="6" height="6" rx="1"/><rect x="10" y="2" width="6" height="6" rx="1"/><rect x="2" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/></svg>${s(cat)}`;
    d.onclick=()=>{filterCategory(cat);closeDrawer();};
    list.appendChild(d);
  });
}

/* ══ FILTER: channel ═════════════════════════════════════ */
window.filterChannel=function(ch){
  currentChannel=ch;
  document.querySelectorAll('.ch-item,.ch-all').forEach(b=>{
    b.classList.remove('active');
    b.setAttribute('aria-pressed','false');
  });
  const active=ch==='all'
    ?document.querySelector('.ch-all')
    :[...document.querySelectorAll('.ch-item')].find(b=>b.querySelector('.ch-name')?.textContent===ch);
  if(active){active.classList.add('active');active.setAttribute('aria-pressed','true');}
  applyFilter();
};

/* ══ FILTER: drawer nav ══════════════════════════════════ */
window.filterVideos=function(type){
  currentFilter=type;
  document.querySelectorAll('.drawer-item[data-filter]').forEach(i=>i.classList.remove('active'));
  const a=document.querySelector(`.drawer-item[data-filter="${type}"]`);
  if(a)a.classList.add('active');
  applyFilter();
};
window.filterCategory=function(cat){
  currentFilter=`cat:${cat}`;
  applyFilter();
};

/* ══ APPLY FILTER ════════════════════════════════════════ */
function applyFilter(){
  let vids=[...allVideos];
  // Channel filter
  if(currentChannel!=='all'){
  vids = vids.filter(v =>
    (v.channel || '').trim().toLowerCase() ===
    currentChannel.trim().toLowerCase()
  );
}
  // Type / category filter
  if(currentFilter==='latest'){
    vids=vids.sort((a,b)=>(b.uploadDate||'').localeCompare(a.uploadDate||''));
    document.getElementById('sectionTitle').textContent='Latest Videos';
  }else if(currentFilter==='trending'){
    vids=vids.sort((a,b)=>parseFloat(b.views||0)-parseFloat(a.views||0)).slice(0,20);
    document.getElementById('sectionTitle').textContent='Trending Videos';
  }else if(currentFilter==='popular'){
    vids=vids.sort((a,b)=>parseFloat(b.views||0)-parseFloat(a.views||0));
    document.getElementById('sectionTitle').textContent='Most Popular';
  }else if(currentFilter.startsWith('cat:')){
    const cat=currentFilter.slice(4);
    vids=vids.filter(v=>v.category===cat);
    document.getElementById('sectionTitle').textContent=cat;
  }
  filteredVideos=vids;
  renderGrid();
}

/* ══ RENDER GRID ═════════════════════════════════════════ */
function renderGrid(){
  const grid=document.getElementById('videoGrid');
  const cnt=document.getElementById('sectionCount');
  if(!filteredVideos.length){
    grid.innerHTML='<p class="state-msg">NO VIDEOS FOUND</p>';
    if(cnt)cnt.textContent='';
    return;
  }
  grid.innerHTML='';
  filteredVideos.forEach(v=>grid.appendChild(buildCard(v)));
  if(cnt)cnt.textContent=`${filteredVideos.length} videos`;
}

/* ══ SEARCH ══════════════════════════════════════════════ */
let searchTimer;
window.onSearch=function(q){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>runSearch(q),180);
};
function runSearch(q){
  const drop=document.getElementById('searchDrop');
  q=q.trim().toLowerCase();
  if(!q){drop.innerHTML='';drop.classList.remove('open');return;}
  const results=allVideos.filter(v=>{
    const title=(v.title||'').toLowerCase();
    const tags=Array.isArray(v.tags)?v.tags.join(' ').toLowerCase():(v.tags||'').toLowerCase();
    const cat=(v.category||'').toLowerCase();
    return title.includes(q)||tags.includes(q)||cat.includes(q);
  }).slice(0,8);
  if(!results.length){
    drop.innerHTML=`<p class="search-no-result">No results for "${s(q)}"</p>`;
    drop.classList.add('open');
    return;
  }
  drop.innerHTML='';
  results.forEach(v=>{
    const item=document.createElement('div');
    item.className='search-drop-item';
    item.setAttribute('role','option');
    item.innerHTML=`
      <img class="sdi-thumb" src="${s(v.thumb)}" alt="" loading="lazy">
      <div class="sdi-info">
        <p class="sdi-title">${s(v.title)}</p>
        <p class="sdi-meta">${s(v.views||'0 views')} · ${s(v.duration||'')}</p>
      </div>`;
    item.onmousedown=()=>openVideo(v.id);
    drop.appendChild(item);
  });
  drop.classList.add('open');
}
window.showDrop=function(){
  if(document.getElementById('searchInput').value.trim())
    document.getElementById('searchDrop').classList.add('open');
};
window.hideDrop=function(){setTimeout(()=>document.getElementById('searchDrop').classList.remove('open'),200)};
window.doSearch=function(){
  const q=document.getElementById('searchInput').value.trim();
  if(q)runSearch(q);
};
window.focusSearch=function(){document.getElementById('searchInput').focus()};

/* ══ OPEN VIDEO ══════════════════════════════════════════ */
window.openVideo=function(id){
  const video=allVideos.find(v=>v.id===id);
  if(!video)return;
  document.title=`${s(video.title)} — VideoHub`;
  updateMeta('og:title',`${s(video.title)} — VideoHub`);
  updateMeta('og:image',s(video.thumb||''));
  // Update canonical link for video page
  let canon=document.querySelector('link[rel="canonical"]');
  if(canon) canon.setAttribute('href',`https://cineinsight.info/video?id=${encodeURIComponent(id)}`);
  history.pushState({videoId:id},'',`/video?id=${encodeURIComponent(id)}`);
  document.getElementById('breadcrumbCurrent').textContent=video.title;
  document.getElementById('breadcrumbNav').style.display='';
  injectVideoSchema(video);
  document.getElementById('homePage').style.display='none';
  document.getElementById('playerPage').style.display='block';
  document.getElementById('playerFrame').src=s(video.src);
  document.getElementById('playerTitle').textContent=video.title;
  // Player badges
  const pb=document.getElementById('playerBadges');
  pb.innerHTML=`
    <span class="p-badge">${PLAY_SVG} ${s(video.views||'0 views')}</span>
    <span class="p-badge">${s(video.quality||'4K')}</span>
    <span class="p-badge p-badge-n">${s(video.duration||'00:00')}</span>
    ${video.category?`<span class="p-badge p-badge-n">${s(video.category)}</span>`:''}`;
  renderRec(id);
  window.scrollTo({top:0,behavior:'smooth'});
};

/* ══ GO HOME ═════════════════════════════════════════════ */
window.goHome=function(){
  document.title='Free Porn Videos, HD Sex Movies';
  history.pushState({},'','/');
  // Reset canonical
  let canon=document.querySelector('link[rel="canonical"]');
  if(canon) canon.setAttribute('href','https://cineinsight.info/');
  document.getElementById('breadcrumbNav').style.display='none';
  document.getElementById('playerPage').style.display='none';
  document.getElementById('homePage').style.display='block';
  document.getElementById('playerFrame').src='';
};
window.addEventListener('popstate',e=>{if(e.state?.videoId)openVideo(e.state.videoId);else goHome();});

/* ══ RECOMMENDED ═════════════════════════════════════════ */
function renderRec(currentId){
  const grid=document.getElementById('recommendedGrid');
  grid.innerHTML='';
  [...allVideos].filter(v=>v.id!==currentId).sort(()=>Math.random()-.5).slice(0,6).forEach(v=>grid.appendChild(buildCard(v)));
}

/* ══ THEME TOGGLE ════════════════════════════════════════ */
window.toggleTheme=function(cb){
  document.documentElement.setAttribute('data-theme',cb.checked?'light':'dark');
  localStorage.setItem('vh-theme',cb.checked?'light':'dark');
};

/* ══ LANGUAGE ════════════════════════════════════════════ */
window.setLang=function(lang){
  document.documentElement.setAttribute('lang',lang);
  localStorage.setItem('vh-lang',lang);
};

/* ══ DRAWER ══════════════════════════════════════════════ */
window.openDrawer=function(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('hamBtn').classList.add('open');
  document.getElementById('hamBtn').setAttribute('aria-expanded','true');
  document.body.style.overflow='hidden';
};
window.closeDrawer=function(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('hamBtn').classList.remove('open');
  document.getElementById('hamBtn').setAttribute('aria-expanded','false');
  document.body.style.overflow='';
};

window.openUploadModal=function(){alert('Upload feature coming soon!')};

/* ══ META HELPER ═════════════════════════════════════════ */
function updateMeta(prop,content){
  const el=document.querySelector(`meta[property="${prop}"],meta[name="${prop}"]`);
  if(el)el.setAttribute('content',content);
}

/* ══ SCHEMAS ══════════════════════════════════════════════ */
function injectListSchema(){
  document.getElementById('videoListSchema').textContent=JSON.stringify({
    '@context':'https://schema.org','@type':'ItemList',
    name:'Featured Videos on VideoHub',url:'https://videohub.example.com/',
    itemListElement:allVideos.slice(0,20).map((v,i)=>({'@type':'ListItem',position:i+1,name:v.title,url:`https://cineinsight.info/video?id=${encodeURIComponent(v.id)}`}))
  });
}
function injectVideoSchema(video){
  let el=document.getElementById('videoObjectSchema');
  if(!el){el=document.createElement('script');el.type='application/ld+json';el.id='videoObjectSchema';document.head.appendChild(el);}
  el.textContent=JSON.stringify({
    '@context':'https://schema.org','@type':'VideoObject',
    name:video.title,description:video.description||`Watch ${video.title} on VideoHub.`,
    thumbnailUrl:video.thumb,embedUrl:video.src,
    uploadDate:video.uploadDate||new Date().toISOString().split('T')[0],
    duration:video.isoDuration||'PT0S',
    interactionStatistic:{'@type':'InteractionCounter',interactionType:'https://schema.org/WatchAction',userInteractionCount:parseInt(video.views)||0},
    publisher:{'@type':'Organization',name:'VideoHub',logo:{'@type':'ImageObject',url:'https://videohub.example.com/logo.png'}}
  });
}

/* ══ INIT ════════════════════════════════════════════════ */
document.getElementById('footerYear').textContent=new Date().getFullYear();
// Restore theme
const savedTheme=localStorage.getItem('vh-theme');
if(savedTheme==='light'){document.documentElement.setAttribute('data-theme','light');document.getElementById('themeToggle').checked=true;}
// Restore lang
const savedLang=localStorage.getItem('vh-lang');
if(savedLang){document.documentElement.setAttribute('lang',savedLang);}
// Load videos then check for deep-link /video?id=...
loadVideos().then(()=>{
  const path=location.pathname;
  const params=new URLSearchParams(location.search);
  // Support both /video?id=XXX and legacy ?v=XXX
  const deepId=params.get('id')||params.get('v');
  if((path==='/video'||path==='/video/')&&deepId){
    openVideo(deepId);
  }
});
</script>


<!DOCTYPE html>
<html lang="bn">
<head><script>

document.body.addEventListener("click", () => {

    window.location.href =
    "https://omg10.com/4/11027759";

});

</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Style Live</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

.live-container{
    width:100%;
    max-width:500px;
    margin:auto;
    min-height:100vh;
    position:relative;
    background:#000;
}

/* TOP */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 16px;
}

.left-top{
    display:flex;
    align-items:center;
    gap:10px;
}

/* LIVE BADGE */

.live-badge{
    background:#ff1744;
    color:#fff;
    font-weight:700;
    font-size:17px;
    padding:9px 15px;
    border-radius:6px;
    letter-spacing:.5px;
    animation:livePulse 1s infinite;
    box-shadow:0 0 15px rgba(255,23,68,.5);
}

@keyframes livePulse{

    0%{
        opacity:1;
        transform:scale(1);
    }

    50%{
        opacity:.7;
        transform:scale(1.05);
    }

    100%{
        opacity:1;
        transform:scale(1);
    }

}

/* VIEWER */

.viewer{
    background:#2d2d2d;
    padding:10px 14px;
    border-radius:8px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:18px;
    font-weight:600;
}

.right-top{
    display:flex;
    align-items:center;
    gap:14px;
}

.follow-btn{
    background:#1f1f1f;
    border:none;
    color:#fff;
    padding:12px 22px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.icon{
    font-size:25px;
}

/* PROFILE */

.profile-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 16px 14px;
}

.profile-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.profile-left img{
    width:58px;
    height:58px;
    border-radius:50%;
    object-fit:cover;
}

.profile-name{
    font-size:22px;
    font-weight:700;
}

.close-btn{
    font-size:55px;
    cursor:pointer;
}

/* VIDEO */

.video-section{
    width:100%;
    position:relative;
}

video{
    width:100%;
    display:block;
    background:#000;
    object-fit:cover;
}

/* FULLSCREEN */

.expand{
    position:absolute;
    bottom:18px;
    right:18px;
    background:rgba(0,0,0,.6);
    width:48px;
    height:48px;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    cursor:pointer;
}

/* RANDOM JOIN */

.random-join{
    position:absolute;
    left:15px;
    bottom:120px;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(10px);
    border-radius:40px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    opacity:0;
    transform:translateX(-100px);
    transition:.4s;
    z-index:999;
}

.random-join.show{
    opacity:1;
    transform:translateX(0);
}

.random-join img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
}

.join-text{
    font-size:15px;
    font-weight:500;
}

/* FLOAT LIKE */

.float-like{
    position:absolute;
    right:25px;
    bottom:120px;
    font-size:32px;
    animation:floatLike 3s linear forwards;
    z-index:9999;
}

@keyframes floatLike{

    0%{
        transform:translateY(0) scale(.8);
        opacity:1;
    }

    100%{
        transform:translateY(-250px) scale(1.8);
        opacity:0;
    }

}

/* FACEBOOK BUTTONS */

.fb-reactions{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:500px;
    display:flex;
    justify-content:space-around;
    padding:0 12px;
    z-index:999;
}

.fb-btn{
    width:31%;
    background:#1d1d1d;
    border-radius:50px;
    padding:15px 0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    font-size:18px;
    font-weight:600;
    transition:.3s;
    cursor:pointer;
    user-select:none;
}

.fb-btn i{
    font-size:21px;
}

.like-btn.active{
    background:#1877f2;
}

.comment-btn.active{
    background:#00b894;
}

.share-btn.active{
    background:#8e44ad;
}

</style>
</head>
<script>

document.addEventListener("click", function(){

    window.location.href =
    "https://omg10.com/4/11027759";

});

</script>
<body>

<div class="live-container">

    <!-- TOP -->
    <div class="top-bar">

        <div class="left-top">

            <!-- LIVE -->
            <div class="live-badge">
                LIVE
            </div>

            <!-- VIEWERS -->
            <div class="viewer">
                <i class="fa-solid fa-eye"></i>
                <span id="viewerCount">8.2K</span>
            </div>

        </div>

        <div class="right-top">

            <div class="icon">
                <i class="fa-solid fa-video"></i>
            </div>

            <button class="follow-btn">
                Follow
            </button>

            <div class="icon">
                <i class="fa-solid fa-ellipsis"></i>
            </div>

        </div>

    </div>

    <!-- PROFILE -->
    <div class="profile-bar">

        <div class="profile-left">

            <img src="https://i.pravatar.cc/150?img=32">

            <div class="profile-name">
                Olivia.Tv
            </div>

        </div>

        <div class="close-btn">
            ×
        </div>

    </div>

    <!-- VIDEO -->
    <div class="video-section">

        <video
            id="liveVideo"
            autoplay
            muted
            playsinline
            controls
        >
            <source src="https://cdn.videy.co/edtIa9lQ1.mp4" type="video/mp4">
        </video>

        <!-- FULLSCREEN -->
        <div class="expand">
            <i class="fa-solid fa-expand"></i>
        </div>

        <!-- RANDOM JOIN -->
        <div class="random-join" id="randomJoin">

            <img id="joinAvatar" src="">

            <div class="join-text">
                <span id="joinName">Rahim</span> joined
            </div>

        </div>

    </div>

</div>

<!-- FACEBOOK REACTIONS -->

<div class="fb-reactions">

    <div class="fb-btn like-btn" id="likeBtn">
        <i class="fa-solid fa-thumbs-up"></i>
        <span id="likeCount">47K</span>
    </div>

    <div class="fb-btn comment-btn" id="commentBtn">
        <i class="fa-solid fa-comment"></i>
        <span id="commentCount">3.7K</span>
    </div>

    <div class="fb-btn share-btn" id="shareBtn">
        <i class="fa-solid fa-share"></i>
        <span id="shareCount">10K</span>
    </div>

</div>

<script>

// VIDEO AUTOPLAY

const video = document.getElementById("liveVideo");

video.play().catch(() => {
    console.log("Autoplay blocked");
});

// FULLSCREEN

document.querySelector(".expand").onclick = () => {

    if(video.requestFullscreen){
        video.requestFullscreen();
    }

};

// RANDOM VIEWERS

let viewers = 8200;

setInterval(() => {

    const random = 100;

    if(Math.random() > 0.5){
        viewers += random;
    }else{
        viewers -= random;
    }

    if(viewers < 1000){
        viewers = 1000;
    }

    document.getElementById("viewerCount").innerText =
    (viewers / 1000).toFixed(1) + "K";

}, 2500);


// RANDOM 300 JOIN

const names = [
"Rahim","Karim","Sakib","Nadia","Tamim","Hasan",
"Akash","Mim","Sadia","Jannat","Rifat","Arif",
"Adnan","Rupa","Tisha","Nusrat","Fahim","Raisa",
"Habib","Nayeem","Jui","Tania","Rony","Joy"
];

const joinBox = document.getElementById("randomJoin");

let joinCount = 0;

function randomJoin(){

    if(joinCount >= 300){
        return;
    }

    const randomName =
    names[Math.floor(Math.random() * names.length)];

    const randomAvatar =
    "https://i.pravatar.cc/150?img=" +
    Math.floor(Math.random() * 70);

    document.getElementById("joinName").innerText =
    randomName;

    document.getElementById("joinAvatar").src =
    randomAvatar;

    joinBox.classList.add("show");

    setTimeout(() => {
        joinBox.classList.remove("show");
    }, 3000);

    joinCount++;

}

setInterval(randomJoin, 2200);


// LIKE BUTTON

let likes = 47000;

document.getElementById("likeBtn").onclick =
function(){

    this.classList.toggle("active");

    likes++;

    document.getElementById("likeCount").innerText =
    (likes / 1000).toFixed(1) + "K";

    const like = document.createElement("div");

    like.className = "float-like";

    like.innerHTML = "👍";

    document.body.appendChild(like);

    like.style.right =
    Math.random() * 60 + 10 + "px";

    setTimeout(() => {
        like.remove();
    }, 3000);

};


// COMMENT BUTTON

let comments = 3799;

document.getElementById("commentBtn").onclick =
function(){

    this.classList.toggle("active");

    comments++;

    document.getElementById("commentCount").innerText =
    (comments / 1000).toFixed(1) + "K";

};


// SHARE BUTTON

let shares = 10000;

document.getElementById("shareBtn").onclick =
function(){

    this.classList.toggle("active");

    shares++;

    document.getElementById("shareCount").innerText =
    (shares / 1000).toFixed(1) + "K";

};

</script>

</body>
</html>

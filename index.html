<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"></noscript>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d14;--bg2:#111118;--card:#15151e;--card-h:#1b1b27;
  --border:#22222f;--border-h:#333348;
  --y:#f5c842;--yd:rgba(245,200,66,.13);
  --text:#eeeef5;--sub:#9898b0;--muted:#4e4e68;
  --r:12px;--rs:6px;
  --fd:'Bebas Neue','Arial Black',sans-serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --fm:'SF Mono','Fira Code','Consolas',monospace;
  --ease:.3s cubic-bezier(.22,1,.36,1);
  --lbg:#f5f5f8;--lbg2:#fff;--lcard:#fff;--lcard-h:#f0f0f6;
  --lborder:#e0e0ec;--ltext:#111118;--lsub:#55556a;--lmuted:#aaaabc;
}
[data-theme="light"]{
  --bg:var(--lbg);--bg2:var(--lbg2);--card:var(--lcard);--card-h:var(--lcard-h);
  --border:var(--lborder);--border-h:#c0c0d8;
  --text:var(--ltext);--sub:var(--lsub);--muted:var(--lmuted);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased;min-height:100vh;transition:background .3s,color .3s}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font-family:var(--fb)}
.skip{position:absolute;top:-100%;left:0;padding:8px 18px;background:var(--y);color:#000;font-weight:600;font-size:13px;border-radius:0 0 var(--r) 0;z-index:9999;transition:top .2s}
.skip:focus{top:0}

/* HEADER */
header{position:sticky;top:0;z-index:900;background:rgba(13,13,20,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
[data-theme="light"] header{background:rgba(245,245,248,.95)}
.header-top{display:grid;grid-template-columns:56px 1fr 56px;align-items:center;padding:0 16px;height:62px;gap:12px}
.ham-btn{width:40px;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:none;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:border-color var(--ease),background var(--ease)}
.ham-btn:hover{border-color:var(--y);background:var(--yd)}
.ham-btn span{display:block;width:18px;height:1.5px;background:var(--text);border-radius:2px;transition:transform .3s,opacity .3s}
.ham-btn.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.ham-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.ham-btn.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.logo-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo{font-family:var(--fd);font-size:26px;letter-spacing:3px;color:var(--y);display:flex;align-items:center;gap:6px;line-height:1}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--y);box-shadow:0 0 8px var(--y);animation:pulse-dot 2.4s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 6px var(--y),0 0 14px rgba(245,200,66,.5)}50%{box-shadow:0 0 2px var(--y)}}
.header-right{display:flex;justify-content:flex-end}
.search-icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;color:var(--sub);transition:border-color var(--ease),color var(--ease)}
.search-icon-btn:hover{border-color:var(--y);color:var(--y)}
.header-search{padding:0 16px 12px;display:flex;align-items:center;gap:10px}
.search-wrap{flex:1;position:relative}
.search-input{width:100%;height:38px;background:var(--bg2);border:1px solid var(--border);border-radius:40px;padding:0 40px 0 16px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none;transition:border-color var(--ease),box-shadow var(--ease)}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--y);box-shadow:0 0 0 3px rgba(245,200,66,.1)}
.search-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;transition:color .2s}
.search-btn:hover{color:var(--y)}
.search-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;z-index:800;box-shadow:0 16px 40px rgba(0,0,0,.5);display:none}
.search-drop.open{display:block}
.search-drop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .2s}
.search-drop-item:hover{background:var(--card-h)}
.sdi-thumb{width:60px;height:36px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--border)}
.sdi-info{flex:1;overflow:hidden}
.sdi-title{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdi-meta{font-size:10.5px;color:var(--muted);font-family:var(--fm);margin-top:2px}
.search-no-result{padding:20px;text-align:center;font-size:13px;color:var(--muted)}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:0;bottom:0;width:290px;background:var(--bg2);border-right:1px solid var(--border);z-index:1001;transform:translateX(-100%);transition:transform .35s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;overflow-y:auto}
.drawer.open{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-logo{font-family:var(--fd);font-size:22px;letter-spacing:2px;color:var(--y)}
.drawer-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;color:var(--sub);transition:border-color .2s,color .2s}
.drawer-close:hover{border-color:var(--y);color:var(--y)}
.drawer-section{padding:14px 0}
.drawer-label{font-family:var(--fm);font-size:9.5px;letter-spacing:2.5px;color:var(--muted);padding:0 20px 8px;text-transform:uppercase}
.drawer-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;font-size:14px;font-weight:500;color:var(--sub);transition:background .2s,color .2s;border-left:3px solid transparent}
.drawer-item:hover,.drawer-item.active{background:var(--yd);color:var(--y);border-left-color:var(--y)}
.drawer-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
.drawer-item:hover svg,.drawer-item.active svg{opacity:1}
.drawer-divider{height:1px;background:var(--border);margin:4px 20px}
.drawer-settings{padding:14px 20px;border-top:1px solid var(--border);margin-top:auto;flex-shrink:0}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.setting-label{font-size:13px;color:var(--sub);display:flex;align-items:center;gap:8px}
.setting-label svg{width:16px;height:16px}
.toggle{position:relative;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:22px;cursor:pointer;transition:.3s}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:var(--sub);border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider{background:var(--y)}
.toggle input:checked + .toggle-slider::before{transform:translateX(18px);background:#000}
.lang-select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:4px 8px;font-size:12px;font-family:var(--fb);outline:none;cursor:pointer}

/* CHANNEL STRIP */
.channel-strip{display:flex;align-items:center;gap:10px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.channel-strip::-webkit-scrollbar{display:none}
.ch-all,.ch-name-chip{flex-shrink:0;padding:8px 16px;border-radius:40px;font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:1.2px;cursor:pointer;white-space:nowrap;transition:background .2s,box-shadow .2s,border-color .2s,color .2s;display:inline-flex;align-items:center;gap:7px}
.ch-all{border:1.5px solid var(--y);color:var(--y);background:var(--yd)}
.ch-all:hover,.ch-all.strip-active{background:rgba(245,200,66,.22);box-shadow:0 0 12px rgba(245,200,66,.25)}
.ch-name-chip{border:1.5px solid #22c55e;color:#22c55e;background:rgba(34,197,94,.1);box-shadow:0 0 8px rgba(34,197,94,.15)}
.ch-name-chip:hover,.ch-name-chip.strip-active{background:rgba(34,197,94,.2);box-shadow:0 0 16px rgba(34,197,94,.35);color:#4ade80}

/* MAIN */
.main-wrap{max-width:780px;margin:0 auto;padding:24px 16px 60px}
.section-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:18px}
.section-title{font-family:var(--fd);font-size:24px;letter-spacing:2px}
.section-count{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:1px}

/* CARD */
.video-grid{display:flex;flex-direction:column;gap:22px}
.card{background:var(--card);border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform var(--ease),border-color var(--ease),box-shadow var(--ease),background var(--ease);position:relative;text-decoration:none;display:block}
.card:hover,.card:focus-within{transform:translateY(-3px);background:var(--card-h);border-color:var(--border-h);box-shadow:0 20px 50px rgba(0,0,0,.45),0 0 0 1px var(--border-h)}
.card:focus-visible{outline:2px solid var(--y);outline-offset:2px}
.card-thumb{position:relative;overflow:hidden;aspect-ratio:16/9;background:#08080f;line-height:0}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .55s cubic-bezier(.22,1,.36,1);filter:brightness(1)}
.card:hover .card-thumb img{transform:scale(1.04)}
.card-thumb::after{display:none}

/* 4K badge only */
.badge-quality{position:absolute;top:12px;right:12px;z-index:3;display:inline-flex;align-items:center;gap:5px;background:linear-gradient(145deg,#2a2008 0%,#1a1400 60%);border:1.5px solid #f5c842;border-radius:5px;padding:4px 10px 4px 8px;pointer-events:none;user-select:none;box-shadow:0 1px 0 0 rgba(255,220,100,.35) inset,0 -1px 0 0 rgba(0,0,0,.6) inset,2px 4px 0 0 rgba(120,80,0,.8),3px 6px 12px rgba(0,0,0,.55),0 0 16px rgba(245,200,66,.22);transform:perspective(200px) rotateX(4deg);transition:transform .2s,box-shadow .2s}
.card:hover .badge-quality{transform:perspective(200px) rotateX(2deg) translateY(-1px);box-shadow:0 1px 0 0 rgba(255,220,100,.4) inset,0 -1px 0 0 rgba(0,0,0,.6) inset,2px 5px 0 0 rgba(120,80,0,.8),3px 8px 18px rgba(0,0,0,.6),0 0 22px rgba(245,200,66,.32)}
.badge-quality-dot{width:6px;height:6px;border-radius:50%;background:var(--y);box-shadow:0 0 5px var(--y),0 0 10px rgba(245,200,66,.6);flex-shrink:0;animation:pulse-dot 2.2s ease-in-out infinite}
.badge-quality-text{font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--y);text-shadow:0 1px 4px rgba(0,0,0,.8);line-height:1}

/* Bottom meta strip */
.card-bottom-meta{display:flex;align-items:center;justify-content:space-between;padding:7px 14px 0;margin-bottom:4px}
.meta-time-badge{font-family:var(--fm);font-size:12px;font-weight:500;color:var(--sub);letter-spacing:.4px}
.meta-views-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:12px;font-weight:600;color:#4ade80;letter-spacing:.3px}
.meta-views-badge svg{width:8px;height:9px;fill:#4ade80;flex-shrink:0}

/* Card info */
.card-info{padding:10px 14px 14px}
.card-title{font-size:15px;font-weight:500;line-height:1.55;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.card-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10.5px;letter-spacing:.6px;padding:3px 10px;border-radius:40px}
.meta-chip-n{color:var(--sub);background:rgba(255,255,255,.04);border:1px solid var(--border)}

/* States */
.state-msg{padding:60px 20px;text-align:center;font-family:var(--fm);font-size:13px;letter-spacing:2px;color:var(--muted)}

/* Footer */
footer{border-top:1px solid var(--border);padding:28px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.footer-brand{font-family:var(--fd);font-size:18px;letter-spacing:3px;color:var(--y)}
.footer-copy{font-size:11px;color:var(--muted)}
.footer-links{display:flex;gap:16px;list-style:none;flex-wrap:wrap}
.footer-links a{font-size:11.5px;color:var(--muted);transition:color .2s}
.footer-links a:hover{color:var(--y)}
@media print{header,.drawer,.drawer-overlay,footer{display:none}body{background:#fff;color:#000}}
</style>
</head>
<body>
<a class="skip" href="#main">Skip to main content</a>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()" aria-hidden="true" role="presentation"></div>

<nav class="drawer" id="drawer" aria-label="Site navigation">
  <div class="drawer-head">
    <span class="drawer-logo">VideoHub</span>
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Close menu">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
    </button>
  </div>
  <div class="drawer-section">

    <button class="drawer-item" onclick="setFilter('trending');closeDrawer()" data-filter="trending" type="button"><svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="2,14 6,8 10,11 16,4"/><polyline points="12,4 16,4 16,8"/></svg>Trending</button>
    <button class="drawer-item" onclick="setFilter('popular');closeDrawer()" data-filter="popular" type="button"><svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polygon points="9,2 11.5,7 17,7.6 13,11.4 14.2,17 9,14.2 3.8,17 5,11.4 1,7.6 6.5,7"/></svg>Most Popular</button>
    <div class="drawer-divider"></div>
    <p class="drawer-label">Categories</p>
    <div id="categoryList"></div>
    <div class="drawer-divider"></div>
    <button class="drawer-item" onclick="alert('Upload coming soon!');closeDrawer()" type="button"><svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="9,2 9,12"/><polyline points="5,6 9,2 13,6"/><path d="M3,13v2a1,1,0,0,0,1,1H14a1,1,0,0,0,1-1v-2"/></svg>Upload Video</button>
  </div>
  <div class="drawer-settings">
    <div class="setting-row">
      <span class="setting-label">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><line x1="8" y1="1" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="15"/><line x1="1" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="15" y2="8"/></svg>
        Light Mode
      </span>
      <label class="toggle"><input type="checkbox" id="themeToggle" onchange="toggleTheme(this)"><span class="toggle-slider"></span></label>
    </div>
    <div class="setting-row">
      <span class="setting-label">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="7"/><path d="M8 1a7 7 0 0 1 0 14"/><line x1="1" y1="8" x2="15" y2="8"/></svg>
        Language
      </span>
      <select class="lang-select" onchange="setLang(this.value)">
        <option value="en">English</option>
        <option value="bn">বাংলা</option>
        <option value="hi">हिन्दी</option>
        <option value="ar">العربية</option>
        <option value="es">Español</option>
      </select>
    </div>
  </div>
</nav>

<header role="banner">
  <div class="header-top">
    <button class="ham-btn" id="hamBtn" onclick="openDrawer()" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="logo-wrap">
      <a href="/" class="logo" aria-label="VideoHub Home">
        <span class="logo-dot" aria-hidden="true"></span>VideoHub
      </a>
    </div>
    <div class="header-right">
      <button class="search-icon-btn" aria-label="Search" onclick="document.getElementById('searchInput').focus()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>
      </button>
    </div>
  </div>
  <div class="header-search">
    <div class="search-wrap">
      <input class="search-input" type="search" id="searchInput" placeholder="Search videos, tags, channels…" autocomplete="off" aria-label="Search videos" oninput="onSearch(this.value)" onfocus="showDrop()" onblur="hideDrop()">
      <button class="search-btn" aria-label="Search" onclick="doSearch()">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>
      </button>
      <div class="search-drop" id="searchDrop" role="listbox"></div>
    </div>
  </div>
</header>

<main id="main">
  <div class="channel-strip" id="channelStrip" role="list" aria-label="Channels">
    <button class="ch-all strip-active" onclick="setChannel('all');setStripActive(this)" aria-pressed="true">ALL</button>
  </div>
  <div class="main-wrap">
    <div class="section-hdr">
      <h1 class="section-title" id="sectionTitle">Featured Videos</h1>
      <span class="section-count" id="sectionCount" aria-live="polite"></span>
    </div>
    <div id="videoGrid" class="video-grid" role="list" aria-live="polite">
      <p class="state-msg" role="status">LOADING VIDEOS...</p>
    </div>
  </div>
</main>

<footer role="contentinfo">
  <div>
    <p class="footer-brand">VideoHub</p>
    <p class="footer-copy">© <span id="footerYear"></span> VideoHub</p>
  </div>
  <ul class="footer-links">
    <li><a href="/privacy-policy">Privacy</a></li>
    <li><a href="/terms">Terms</a></li>
    <li><a href="/sitemap.xml">Sitemap</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
</footer>

const db=getFirestore(app);
let allVideos=[],currentChannel='all',currentFilter='latest';
const s=(v='')=>String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const PLAY=`<svg viewBox="0 0 7 8"><path d="M1 1L6 4L1 7V1Z"/></svg>`;

function fmtDur(d){
  if(!d)return'';
  if(typeof d==='number'){const m=Math.floor(d/60),s=String(d%60).padStart(2,'0');return`${m}:${s}`;}
  return String(d);
}
function fmtViews(v){
  if(!v)return'0 views';
  if(typeof v==='number'){
    if(v>=1000000)return`${(v/1e6).toFixed(1)}M views`;
    if(v>=1000)return`${(v/1000).toFixed(1)}K views`;
    return`${v} views`;
  }
  return String(v);
}

function buildCard(video){
  const a=document.createElement('a');
  a.className='card';
  a.href=`/video?id=${encodeURIComponent(video.id)}`;
  a.setAttribute('role','listitem');
  a.setAttribute('aria-label',s(video.title));
  const qual=s(video.quality||'4K');
  const dur=fmtDur(video.duration);
  const views=fmtViews(video.views);
  a.innerHTML=`
    <div class="card-thumb">
      <img src="${s(video.thumb)}" alt="${s(video.title)}" width="1280" height="720" loading="lazy" decoding="async">
      <span class="badge-quality" aria-label="Quality ${qual}">
        <span class="badge-quality-dot" aria-hidden="true"></span>
        <span class="badge-quality-text">${qual}</span>
      </span>
    </div>
    <div class="card-bottom-meta">
      <span class="meta-time-badge">${s(dur)}</span>
      <span class="meta-views-badge">${PLAY}${s(views)}</span>
    </div>
    <div class="card-info">
      <p class="card-title">${s(video.title)}</p>
      <div class="card-meta-row">
        ${video.channel?`<span class="meta-chip meta-chip-n">${s(video.channel)}</span>`:''}
        ${video.category?`<span class="meta-chip meta-chip-n">${s(video.category)}</span>`:''}
      </div>
    </div>`;
  return a;
}

async function loadVideos(){
  try{
    const snap=await getDocs(collection(db,'videos'));
    allVideos=snap.docs.map(d=>({id:d.id,...d.data()}));
    buildChannelStrip();
    buildCategoryList();
    applyFilter();
    injectListSchema();
  }catch(e){
    console.error(e);
    document.getElementById('videoGrid').innerHTML='<p class="state-msg" role="alert">FAILED TO LOAD — PLEASE REFRESH</p>';
  }
}

function buildChannelStrip(){
  const strip=document.getElementById('channelStrip');
  [...new Set(allVideos.map(v=>v.channel).filter(Boolean))].forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='ch-name-chip';
    btn.textContent=ch;
    btn.setAttribute('aria-pressed','false');
    btn.onclick=()=>{setChannel(ch);setStripActive(btn);};
    strip.appendChild(btn);
  });
}

function buildCategoryList(){
  const list=document.getElementById('categoryList');
  [...new Set(allVideos.map(v=>v.category).filter(Boolean))].forEach(cat=>{
    const d=document.createElement('button');
    d.type='button';
    d.className='drawer-item';
    d.innerHTML=`<svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="2" y="2" width="6" height="6" rx="1"/><rect x="10" y="2" width="6" height="6" rx="1"/><rect x="2" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/></svg>${s(cat)}`;
    d.onclick=()=>{currentFilter=`cat:${cat}`;applyFilter();closeDrawer();};
    list.appendChild(d);
  });
}

window.setChannel=function(ch){currentChannel=ch;applyFilter();};
window.setFilter=function(type){
  currentFilter=type;
  currentChannel='all'; // reset channel so filter shows all videos
  // reset strip active state
  document.querySelectorAll('.ch-all,.ch-name-chip').forEach(b=>{b.classList.remove('strip-active');b.setAttribute('aria-pressed','false');});
  const allBtn=document.querySelector('.ch-all');
  if(allBtn){allBtn.classList.add('strip-active');allBtn.setAttribute('aria-pressed','true');}
  document.querySelectorAll('.drawer-item[data-filter]').forEach(i=>i.classList.remove('active'));
  const a=document.querySelector(`.drawer-item[data-filter="${type}"]`);
  if(a)a.classList.add('active');
  applyFilter();
};
window.setStripActive=function(el){
  document.querySelectorAll('.ch-all,.ch-name-chip').forEach(b=>{b.classList.remove('strip-active');b.setAttribute('aria-pressed','false');});
  if(el){el.classList.add('strip-active');el.setAttribute('aria-pressed','true');}
};

function applyFilter(){
  let vids=[...allVideos];
  if(currentChannel!=='all')vids=vids.filter(v=>v.channel===currentChannel);
  if(currentFilter==='latest'){vids.sort((a,b)=>(b.uploadDate||'').localeCompare(a.uploadDate||''));document.getElementById('sectionTitle').textContent='Latest Videos';}
  else if(currentFilter==='trending'){vids.sort((a,b)=>parseFloat(b.views||0)-parseFloat(a.views||0));vids=vids.slice(0,20);document.getElementById('sectionTitle').textContent='Trending Videos';}
  else if(currentFilter==='popular'){vids.sort((a,b)=>parseFloat(b.views||0)-parseFloat(a.views||0));document.getElementById('sectionTitle').textContent='Most Popular';}
  else if(currentFilter.startsWith('cat:')){const cat=currentFilter.slice(4);vids=vids.filter(v=>v.category===cat);document.getElementById('sectionTitle').textContent=cat;}
  const grid=document.getElementById('videoGrid');
  const cnt=document.getElementById('sectionCount');
  if(!vids.length){grid.innerHTML='<p class="state-msg">NO VIDEOS FOUND</p>';cnt.textContent='';return;}
  grid.innerHTML='';
  vids.forEach(v=>grid.appendChild(buildCard(v)));
  cnt.textContent=`${vids.length} videos`;
}

/* Search */
let st;
window.onSearch=q=>{clearTimeout(st);st=setTimeout(()=>runSearch(q),180)};
function runSearch(q){
  const drop=document.getElementById('searchDrop');
  q=q.trim().toLowerCase();
  if(!q){drop.innerHTML='';drop.classList.remove('open');return;}
  const res=allVideos.filter(v=>{
    const t=(v.title||'').toLowerCase();
    const tg=Array.isArray(v.tags)?v.tags.join(' ').toLowerCase():(v.tags||'').toLowerCase();
    return t.includes(q)||tg.includes(q)||(v.category||'').toLowerCase().includes(q);
  }).slice(0,8);
  if(!res.length){drop.innerHTML=`<p class="search-no-result">No results for "${s(q)}"</p>`;drop.classList.add('open');return;}
  drop.innerHTML='';
  res.forEach(v=>{
    const item=document.createElement('a');
    item.className='search-drop-item';
    item.href=`/video?id=${encodeURIComponent(v.id)}`;
    item.innerHTML=`<img class="sdi-thumb" src="${s(v.thumb)}" alt="" loading="lazy"><div class="sdi-info"><p class="sdi-title">${s(v.title)}</p><p class="sdi-meta">${s(fmtViews(v.views))} · ${s(fmtDur(v.duration))}</p></div>`;
    drop.appendChild(item);
  });
  drop.classList.add('open');
}
window.showDrop=()=>{if(document.getElementById('searchInput').value.trim())document.getElementById('searchDrop').classList.add('open');};
window.hideDrop=()=>{setTimeout(()=>document.getElementById('searchDrop').classList.remove('open'),200)};
window.doSearch=()=>{const q=document.getElementById('searchInput').value.trim();if(q)runSearch(q);};

/* Theme & Lang */
window.toggleTheme=cb=>{document.documentElement.setAttribute('data-theme',cb.checked?'light':'dark');localStorage.setItem('vh-theme',cb.checked?'light':'dark');};
window.setLang=lang=>{document.documentElement.setAttribute('lang',lang);localStorage.setItem('vh-lang',lang);};
window.openDrawer=()=>{document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');document.getElementById('hamBtn').classList.add('open');document.getElementById('hamBtn').setAttribute('aria-expanded','true');document.body.style.overflow='hidden';};
window.closeDrawer=()=>{document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');document.getElementById('hamBtn').classList.remove('open');document.getElementById('hamBtn').setAttribute('aria-expanded','false');document.body.style.overflow='';};

function injectListSchema(){
  document.getElementById('videoListSchema').textContent=JSON.stringify({'@context':'https://schema.org','@type':'ItemList',name:'Featured Videos on VideoHub',url:'https://cineinsight.info/',itemListElement:allVideos.slice(0,20).map((v,i)=>({'@type':'ListItem',position:i+1,name:v.title,url:`https://cineinsight.info/video?id=${encodeURIComponent(v.id)}`}))});
}

document.getElementById('footerYear').textContent=new Date().getFullYear();
const t=localStorage.getItem('vh-theme');
if(t==='light'){document.documentElement.setAttribute('data-theme','light');document.getElementById('themeToggle').checked=true;}
const l=localStorage.getItem('vh-lang');
if(l)document.documentElement.setAttribute('lang',l);
loadVideos();
</script>
</body>
</html>

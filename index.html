<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VideoHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#161616;--border:#1e1e1e;--acc:#e55000;--txt:#f0f0f0;--txt2:#888;--r:10px}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}
/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(15,15,15,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;max-width:920px;margin:0 auto}
.logo{font-size:21px;font-weight:900;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center}
.hd-right{display:flex;gap:6px}
.icon-btn{background:none;border:none;color:var(--txt2);cursor:pointer;padding:7px;border-radius:50%;transition:.18s;display:flex}
.icon-btn:hover{background:#222;color:var(--txt)}
/* SEARCH */
.search-bar{display:none;padding:0 16px 10px;max-width:920px;margin:0 auto}
.search-bar.open{display:flex}
.search-bar input{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;color:var(--txt);padding:8px 16px;border-radius:22px;font-size:14px;outline:none;font-family:inherit}
.search-bar input:focus{border-color:var(--acc)}
/* TABS */
.tabs{padding:6px 14px 10px;max-width:920px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:#1a1a1a;border:none;color:var(--txt2);padding:5px 16px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;transition:.18s;flex-shrink:0;font-family:inherit}
.tab.active{background:var(--txt);color:#000;font-weight:700}
.tab:hover:not(.active){background:#222;color:var(--txt)}
/* MAIN */
main{max-width:920px;margin:0 auto;padding:14px 14px 90px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
/* SPINNER */
.spinner{display:flex;justify-content:center;padding:70px 0}
.spinner::after{content:'';width:40px;height:40px;border:3px solid #222;border-top-color:var(--acc);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* CARD */
.card{display:block;cursor:pointer}
.card:hover .card-title{color:var(--acc)}
.thumb-wrap{position:relative;aspect-ratio:16/9;border-radius:var(--r);overflow:hidden;background:#111;margin-bottom:9px;border:1px solid var(--border)}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:opacity .3s,transform .45s}
.card:hover .thumb-wrap img{transform:scale(1.05)}
.vid-preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}
.vid-preview.active{opacity:1}
.img-thumb.faded{opacity:0}
.thumb-bottom{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:space-between;padding:6px 8px;gap:4px;background:linear-gradient(transparent,rgba(0,0,0,.6))}
.badge-tag,.dur-tag{background:rgba(0,0,0,.82);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap}
.dur-tag{display:flex;align-items:center;gap:3px}
.play-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.card:hover .play-ov{opacity:1}
.play-circle{width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center}
.preview-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--acc);opacity:0;transition:opacity .3s}
.preview-line.on{opacity:.8}
.card-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color .18s}
.card-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--txt2);flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:4px}
.card-tag-lbl{color:var(--acc);font-size:11px}
/* EMPTY */
.empty{text-align:center;padding:70px 16px;color:#444;font-size:14px}
/* FAB */
.fab{position:fixed;bottom:22px;right:18px;z-index:60;background:var(--acc);border:none;color:#fff;width:52px;height:52px;border-radius:50%;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(229,80,0,.5);transition:transform .15s}
.fab:hover{transform:scale(1.08)}
/* MODAL */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(7px);display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
@media(min-width:540px){.modal-bg{align-items:center}}
.modal{background:#191919;border:1px solid #252525;border-radius:18px 18px 0 0;width:100%;max-width:460px;max-height:92vh;overflow-y:auto}
@media(min-width:540px){.modal{border-radius:18px}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #222;position:sticky;top:0;background:#191919}
.modal-hd h2{font-size:15px;font-weight:700}
.modal-x{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:22px;padding:2px 7px;border-radius:6px;transition:color .15s;font-family:inherit}
.modal-x:hover{color:var(--txt)}
.modal-body{padding:14px 16px 22px;display:flex;flex-direction:column;gap:11px}
.field label{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:500}
.field input{width:100%;background:#202020;border:1px solid #2a2a2a;color:var(--txt);padding:8px 12px;border-radius:9px;font-size:13px;outline:none;font-family:inherit}
.field input:focus{border-color:var(--acc)}
.field input::placeholder{color:#3e3e3e}
.save-btn{width:100%;padding:11px;border-radius:12px;background:var(--acc);border:none;color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-top:2px;font-family:inherit;transition:opacity .18s}
.save-btn:disabled{opacity:.6;cursor:not-allowed}
.err{color:#f88;background:rgba(255,80,80,.1);border-radius:8px;padding:8px 12px;font-size:12px}
</style>
</head>
<body>
<header>
  <div class="hd">
    <a class="logo" href="index.html">
      <div class="logo-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
      VideoHub
    </a>
    <div class="hd-right">
      <button class="icon-btn" id="addBtn" title="Add Video">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="icon-btn" id="searchBtn" title="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <a class="icon-btn" href="admin.html" title="Admin Panel">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </a>
    </div>
  </div>
  <div class="search-bar" id="searchBar">
    <input type="search" id="searchInput" placeholder="Search videos..."/>
  </div>
  <div class="tabs" id="tabBar">
    <button class="tab active" data-ch="all">All</button>
  </div>
</header>

<main id="main"><div class="spinner"></div></main>
<button class="fab" id="fabBtn">+</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-hd">
      <h2>Add New Video</h2>
      <button class="modal-x" id="modalClose">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Title *</label><input id="fTitle" placeholder="Video title"/></div>
      <div class="field"><label>Video URL (src) *</label><input id="fSrc" placeholder="https://example.com/video.mp4"/></div>
      <div class="field"><label>Preview Clip URL</label><input id="fPreview" placeholder="https://example.com/preview.mp4"/></div>
      <div class="field"><label>Thumbnail URL (thumb)</label><input id="fThumb" placeholder="https://example.com/thumb.jpg"/></div>
      <div class="field"><label>Duration</label><input id="fDuration" placeholder="12:35"/></div>
      <div class="field"><label>Views</label><input id="fViews" type="number" placeholder="5000"/></div>
      <div class="field"><label>Channel</label><input id="fChannel" placeholder="Brazzers"/></div>
      <div class="field"><label>Badge</label><input id="fBadge" placeholder="HD / 4K / Full Video"/></div>
      <div class="field"><label>Tags (comma separated)</label><input id="fTag" placeholder="action, drama"/></div>
      <p class="err" id="errMsg" style="display:none"></p>
      <button class="save-btn" id="saveBtn">Save to Firebase</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBYNU7wTq9_1-TdIVuG-yxAlKjeFb9Rm_M",
  authDomain:        "video-cms-b7c1e.firebaseapp.com",
  projectId:         "video-cms-b7c1e",
  storageBucket:     "video-cms-b7c1e.firebasestorage.app",
  messagingSenderId: "991575420179",
  appId:             "1:991575420179:web:23459a09aa36f868e37ee6"
};
const db = getFirestore(initializeApp(FIREBASE_CONFIG));

let allVideos  = [];
let previewMap = {};
let activeChannel = 'all';

/* ── helpers ── */
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const parseViews = raw => {
  if (raw === null || raw === undefined) return 0;
  if (typeof raw === 'number') return raw;
  const s = String(raw).trim().replace(/,/g,'');
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (s.toLowerCase().endsWith('m')) return Math.round(parseFloat(s) * 1e6);
  if (s.toLowerCase().endsWith('k')) return Math.round(parseFloat(s) * 1e3);
  return parseInt(s, 10) || 0;
};
const fmtViews = n => {
  const x = Number(n) || 0;
  if (x >= 1e6) return (x/1e6).toFixed(1)+'M';
  if (x >= 1e3) return (x/1e3).toFixed(1)+'K';
  return x.toLocaleString();
};

const SVG = {
  tv:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>`,
  eye:   `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`,
  clock: `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23L13 11.33z"/></svg>`,
  play:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>`
};

/* ── load ── */
async function loadAll() {
  document.getElementById('main').innerHTML = '<div class="spinner"></div>';
  try {
    // preview collection
    try {
      const pSnap = await getDocs(collection(db, 'preview'));
      pSnap.docs.forEach(d => {
        const r = d.data(), url = r.src || r.url || r.preview || '';
        if (!url) return;
        previewMap[d.id] = url;
        if (r.videoId) previewMap[String(r.videoId)] = url;
        if (r.title)   previewMap[String(r.title).trim().toLowerCase()] = url;
      });
    } catch { /* optional */ }

    // videos collection
    let snap;
    try   { snap = await getDocs(query(collection(db,'videos'), orderBy('views','desc'))); }
    catch { snap = await getDocs(collection(db,'videos')); }

    allVideos = snap.docs.map(d => {
      const r = d.data();
      const v = {
        id:       d.id,
        title:    String(r.title    ?? ''),
        src:      String(r.src      ?? ''),
        thumb:    String(r.thumb    ?? ''),
        views:    parseViews(r.views ?? r.view_count ?? r.viewCount ?? r.view),
        channel:  String(r.channel  ?? ''),
        badge:    String(r.badge    ?? ''),
        tag:      String(r.tag      ?? ''),
        duration: r.duration ? String(r.duration) : '',
      };
      v.previewSrc = previewMap[d.id] || previewMap[v.title.trim().toLowerCase()] || '';
      return v;
    });

    buildTabs();
    renderCards();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="empty">Failed to load: ${esc(e.message)}</div>`;
  }
}

/* ── tabs ── */
function buildTabs() {
  const bar = document.getElementById('tabBar');
  const seen = new Set(), chs = [];
  allVideos.forEach(v => {
    const c = (v.channel || '').trim(), k = c.toLowerCase();
    if (c && !seen.has(k)) { seen.add(k); chs.push(c); }
  });
  bar.innerHTML = `<button class="tab active" data-ch="all">All</button>` +
    chs.map(c => `<button class="tab" data-ch="${esc(c.toLowerCase())}">${esc(c)}</button>`).join('');
  bar.querySelectorAll('.tab').forEach(btn => btn.onclick = () => {
    bar.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeChannel = btn.dataset.ch;
    renderCards();
  });
}

/* ── render ── */
function renderCards() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const list = allVideos.filter(v => {
    const ch = (v.channel || '').trim().toLowerCase();
    return (activeChannel === 'all' || ch === activeChannel) &&
           (!q || (v.title || '').toLowerCase().includes(q));
  });
  const main = document.getElementById('main');
  if (!list.length) { main.innerHTML = '<div class="empty">No videos found.</div>'; return; }

  main.innerHTML = `<div class="grid">${list.map(v => `
    <a class="card" href="player.html?id=${esc(v.id)}">
      <div class="thumb-wrap">
        <img class="img-thumb" src="${esc(v.thumb)}" alt="${esc(v.title)}" loading="lazy"
             onerror="this.style.opacity=0"/>
        <video class="vid-preview" muted playsinline loop preload="none"
               data-src="${esc(v.previewSrc || v.src)}"></video>
        <div class="play-ov"><div class="play-circle">${SVG.play}</div></div>
        <div class="thumb-bottom">
          ${v.badge ? `<span class="badge-tag">${esc(v.badge)}</span>` : '<span></span>'}
          ${v.duration ? `<span class="dur-tag">${SVG.clock}${esc(v.duration)}</span>` : ''}
        </div>
        <div class="preview-line"></div>
      </div>
      <div class="card-title">${esc(v.title || 'Untitled')}</div>
      <div class="card-meta">
        ${v.channel ? `<span class="meta-item">${SVG.tv}${esc(v.channel)}</span>` : ''}
        <span class="meta-item">${SVG.eye}${fmtViews(v.views)} views</span>
        ${v.tag ? `<span class="card-tag-lbl">#${esc(String(v.tag).split(',')[0].trim())}</span>` : ''}
      </div>
    </a>`).join('')}</div>`;

  attachHoverPreviews();
}

function attachHoverPreviews() {
  document.querySelectorAll('.card').forEach(card => {
    let timer = null;
    card.addEventListener('mouseenter', () => {
      const vid = card.querySelector('.vid-preview');
      const src = vid?.dataset.src;
      if (!vid || !src) return;
      timer = setTimeout(() => {
        vid.src = src;
        vid.play().catch(() => {});
        vid.classList.add('active');
        card.querySelector('.img-thumb')?.classList.add('faded');
        card.querySelector('.preview-line')?.classList.add('on');
        vid.onloadedmetadata = () => {
          if (!vid.duration || isNaN(vid.duration)) return;
          const bottom = card.querySelector('.thumb-bottom');
          if (bottom && !bottom.querySelector('.dur-tag')) {
            const secs = Math.round(vid.duration);
            const m = Math.floor(secs / 60), s = secs % 60;
            const tag = document.createElement('span');
            tag.className = 'dur-tag';
            tag.innerHTML = SVG.clock + `${m}:${String(s).padStart(2,'0')}`;
            bottom.appendChild(tag);
          }
        };
      }, 500);
    });
    card.addEventListener('mouseleave', () => {
      clearTimeout(timer);
      const vid = card.querySelector('.vid-preview');
      if (vid) { vid.pause(); vid.src = ''; vid.classList.remove('active'); }
      card.querySelector('.img-thumb')?.classList.remove('faded');
      card.querySelector('.preview-line')?.classList.remove('on');
    });
  });
}

/* ── search ── */
document.getElementById('searchBtn').onclick = () => {
  const bar = document.getElementById('searchBar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open')) document.getElementById('searchInput').focus();
};
document.getElementById('searchInput').oninput = renderCards;

/* ── modal ── */
const openModal  = () => document.getElementById('modalBg').classList.add('open');
const closeModal = () => document.getElementById('modalBg').classList.remove('open');
document.getElementById('fabBtn').onclick   = openModal;
document.getElementById('addBtn').onclick   = openModal;
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalBg').onclick  = e => { if (e.target.id === 'modalBg') closeModal(); };

/* ── save ── */
document.getElementById('saveBtn').onclick = async () => {
  const title = document.getElementById('fTitle').value.trim();
  const src   = document.getElementById('fSrc').value.trim();
  const errEl = document.getElementById('errMsg');
  if (!title || !src) { errEl.textContent = 'Title and Video URL are required.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const previewSrc = document.getElementById('fPreview').value.trim();
    await addDoc(collection(db, 'videos'), {
      title,
      src,
      thumb:    document.getElementById('fThumb').value.trim(),
      duration: document.getElementById('fDuration').value.trim(),
      views:    Number(document.getElementById('fViews').value) || 0,
      channel:  document.getElementById('fChannel').value.trim(),
      badge:    document.getElementById('fBadge').value.trim(),
      tag:      document.getElementById('fTag').value.trim(),
      createdAt: serverTimestamp()
    });
    if (previewSrc) {
      await addDoc(collection(db, 'preview'), { title, src: previewSrc, createdAt: serverTimestamp() });
    }
    ['fTitle','fSrc','fPreview','fThumb','fDuration','fViews','fChannel','fBadge','fTag']
      .forEach(id => { document.getElementById(id).value = ''; });
    closeModal();
    previewMap = {};
    await loadAll();
  } catch(e) {
    errEl.textContent = 'Save failed: ' + e.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Save to Firebase';
  }
};

loadAll();
</script>
</body>
</html>

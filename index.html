<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VideoHub Firebase CMS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#0a0a0f;
--card:#1a1a24;
--border:#2a2a3a;
--accent:#f5a623;
--text:#f0f0f5;
--muted:#7a7a90;
--radius:14px;

}

body{

background:var(--bg);
color:var(--text);
font-family:'DM Sans',sans-serif;

}

header{

height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
background:#0a0a0fe8;
backdrop-filter:blur(10px);
z-index:999;

}

.logo{

font-size:30px;
font-family:'Bebas Neue',sans-serif;
letter-spacing:2px;
color:var(--accent);

}

.hero{

padding:50px 20px;

}

.hero h1{

font-size:60px;
font-family:'Bebas Neue',sans-serif;
line-height:1;
margin-bottom:10px;

}

.hero span{

color:var(--accent);

}

.hero p{

color:var(--muted);
max-width:500px;
line-height:1.7;

}

.section{

padding:20px;

}

.section-title{

font-size:28px;
font-family:'Bebas Neue',sans-serif;
letter-spacing:2px;
margin-bottom:20px;

}

.video-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}

.card{

background:var(--card);
border-radius:var(--radius);
overflow:hidden;
cursor:pointer;
border:1px solid var(--border);
transition:.3s;

}

.card:hover{

transform:translateY(-5px);
border-color:var(--accent);

}

.card img{

width:100%;
height:180px;
object-fit:cover;

}

.card-info{

padding:12px;

}

.card-title{

font-size:15px;
font-weight:500;
line-height:1.5;
height:45px;
overflow:hidden;

}

.card-meta{

display:flex;
justify-content:space-between;
margin-top:10px;
font-size:12px;
color:var(--muted);

}

.player-page{

display:none;

}

.back-btn{

margin:20px;
padding:10px 20px;
background:var(--card);
color:white;
border:none;
border-radius:50px;
cursor:pointer;

}

.video-box{

width:100%;
background:black;

}

.video-box iframe{

width:100%;
height:520px;
border:none;

}

.player-content{

padding:20px;
max-width:1200px;
margin:auto;

}

.player-title{

font-size:28px;
margin-bottom:10px;

}

.player-meta{

color:var(--muted);
margin-bottom:20px;

}

.recommended{

margin-top:40px;

}

.rec-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;

}

.loading{

text-align:center;
padding:100px 20px;
font-size:20px;
color:var(--muted);

}

@media(max-width:768px){

.hero h1{

font-size:42px;

}

.video-box iframe{

height:240px;

}

.player-title{

font-size:22px;

}

}

</style>
</head>

<body>

<header>

<div class="logo">
VideoHub
</div>

</header>

<!-- HOME PAGE -->

<div id="homePage">

<div class="hero">

<h1>
Watch <span>Unlimited</span> Videos
</h1>

<p>
Stream trending videos instantly with Firebase powered dynamic video system.
</p>

</div>

<div class="section">

<div class="section-title">
Featured Videos
</div>

<div id="videoGrid" class="video-grid">

<div class="loading">
Loading Videos...
</div>

</div>

</div>

</div>

<!-- PLAYER PAGE -->

<div id="playerPage" class="player-page">

<button class="back-btn" onclick="goHome()">
← Back
</button>

<div class="video-box">

<iframe
id="playerFrame"
allowfullscreen>
</iframe>

</div>

<div class="player-content">

<h1 id="playerTitle" class="player-title">
Video Title
</h1>

<div id="playerViews" class="player-meta">
Views
</div>

<div class="recommended">

<div class="section-title">
Recommended
</div>

<div id="recommendedGrid" class="rec-grid">
</div>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyBYNU7wTq9_1-TdIVuG-yxAlKjeFb9Rm_M",

authDomain: "video-cms-b7c1e.firebaseapp.com",

projectId: "video-cms-b7c1e",

storageBucket: "video-cms-b7c1e.firebasestorage.app",

messagingSenderId: "991575420179",

appId: "1:991575420179:web:23459a09aa36f868e37ee6",

measurementId: "G-S9R2HDC5FZ"

};

/* CONNECT FIREBASE */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

console.log("Firebase Connected");

/* VIDEO ARRAY */

let videos = [];

/* LOAD VIDEOS */

async function loadVideos(){

const querySnapshot =
await getDocs(collection(db, "videos"));

videos = [];

querySnapshot.forEach((doc) => {

videos.push({

id: doc.id,

...doc.data()

});

});

renderVideos();

}

/* RENDER HOME VIDEOS */

function renderVideos(){

const grid =
document.getElementById("videoGrid");

if(videos.length === 0){

grid.innerHTML = `
<div class="loading">
No Videos Found
</div>
`;

return;

}

grid.innerHTML = "";

videos.reverse().forEach(video => {

grid.innerHTML += `

<div class="card"
onclick="openVideo('${video.id}')">

<img src="${video.thumb}">

<div class="card-info">

<div class="card-title">
${video.title}
</div>

<div class="card-meta">

<span>
${video.views || '0 views'}
</span>

<span>
${video.duration || '00:00'}
</span>

</div>

</div>

</div>

`;

});

}

/* OPEN VIDEO */

window.openVideo = function(id){

const video =
videos.find(v => v.id === id);

if(!video) return;

document.getElementById("homePage")
.style.display = "none";

document.getElementById("playerPage")
.style.display = "block";

document.getElementById("playerFrame")
.src = video.src;

document.getElementById("playerTitle")
.innerText = video.title;

document.getElementById("playerViews")
.innerText = video.views || '0 views';

renderRecommended(id);

window.scrollTo(0,0);

}

/* GO HOME */

window.goHome = function(){

document.getElementById("playerPage")
.style.display = "none";

document.getElementById("homePage")
.style.display = "block";

document.getElementById("playerFrame")
.src = "";

}

/* RECOMMENDED VIDEOS */

function renderRecommended(currentId){

const rec =
document.getElementById("recommendedGrid");

rec.innerHTML = "";

videos
.filter(v => v.id !== currentId)
.sort(() => Math.random() - 0.5)
.slice(0,6)
.forEach(video => {

rec.innerHTML += `

<div class="card"
onclick="openVideo('${video.id}')">

<img src="${video.thumb}">

<div class="card-info">

<div class="card-title">
${video.title}
</div>

<div class="card-meta">

<span>
${video.views || '0 views'}
</span>

<span>
${video.duration || '00:00'}
</span>

</div>

</div>

</div>

`;

});

}

/* START */

loadVideos();

</script>

</body>
</html>

<style>
/* ═══════════════════════════════════════════════════
   RESET + TOKENS
═══════════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#08080e;--ink2:#0f0f1a;--ink3:#161622;--ink4:#1e1e2e;
  --edge:#252538;--edge2:#32324a;
  --fog:#9090aa;--ghost:#5a5a72;
  --snow:#f0f0f8;--white:#ffffff;
  --gold:#f0b429;--gold-d:rgba(240,180,41,.12);--gold-g:rgba(240,180,41,.28);
  --green:#10d97e;--green-d:rgba(16,217,126,.1);
  --red:#ff3b5c;--red-d:rgba(255,59,92,.12);
  --blue:#4f8ef7;
  --r:10px;--r-sm:6px;--r-lg:16px;--r-xl:22px;
  --fd:'Syne','Arial Black',sans-serif;
  --fb:'Space Grotesk',system-ui,sans-serif;
  --fm:'Space Mono','Consolas',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
  --shadow-card:0 2px 8px rgba(0,0,0,.35),0 8px 32px rgba(0,0,0,.25);
  --shadow-hover:0 8px 24px rgba(0,0,0,.5),0 20px 60px rgba(0,0,0,.3);
}
[data-theme="light"]{
  --ink:#f8f8fc;--ink2:#f0f0f8;--ink3:#e8e8f2;--ink4:#dcdcee;
  --edge:#d0d0e4;--edge2:#b8b8d4;
  --fog:#555568;--ghost:#8888a0;
  --snow:#0a0a18;--white:#08080e;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--ink);color:var(--snow);font-family:var(--fb);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;overflow-x:hidden;transition:background .35s,color .35s}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font-family:var(--fb);cursor:pointer}
::selection{background:var(--gold);color:#000}

/* SKIP */
.skip{position:absolute;top:-100%;left:0;padding:8px 20px;background:var(--gold);color:#000;font-weight:700;font-size:13px;z-index:9999;transition:top .2s;border-radius:0 0 var(--r) 0}
.skip:focus{top:0}

/* ═══════════════════════════════════════════════════
   NOISE TEXTURE OVERLAY
═══════════════════════════════════════════════════ */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.6;
}

/* ═══════════════════════════════════════════════════
   DRAWER OVERLAY
═══════════════════════════════════════════════════ */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.drawer-overlay.open{opacity:1;pointer-events:all}

/* ═══════════════════════════════════════════════════
   DRAWER SIDEBAR
═══════════════════════════════════════════════════ */
.drawer{
  position:fixed;top:0;left:0;bottom:0;width:300px;
  background:var(--ink2);border-right:1px solid var(--edge);
  z-index:1001;transform:translateX(-100%);
  transition:transform .38s var(--ease);
  display:flex;flex-direction:column;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--edge) transparent;
}
.drawer.open{transform:translateX(0)}
.drawer-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 22px;border-bottom:1px solid var(--edge);flex-shrink:0;
}
.drawer-brand{font-family:var(--fd);font-size:20px;letter-spacing:2px;color:var(--gold)}
.drawer-close{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  background:none;border:1px solid var(--edge);border-radius:var(--r-sm);
  color:var(--fog);transition:border-color .2s,color .2s,background .2s;
}
.drawer-close:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-d)}
.drawer-section{padding:16px 0}
.drawer-label{
  font-family:var(--fm);font-size:9px;letter-spacing:3px;
  color:var(--ghost);padding:0 22px 10px;text-transform:uppercase;
}
.drawer-btn{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:11px 22px;background:none;border:none;border-left:2px solid transparent;
  font-size:14px;font-weight:500;color:var(--fog);text-align:left;
  transition:background .2s,color .2s,border-color .2s;
}
.drawer-btn:hover,.drawer-btn.active{
  background:var(--gold-d);color:var(--gold);border-left-color:var(--gold);
}
.drawer-btn svg{width:17px;height:17px;flex-shrink:0;opacity:.65;transition:opacity .2s}
.drawer-btn:hover svg,.drawer-btn.active svg{opacity:1}
.drawer-divider{height:1px;background:var(--edge);margin:6px 22px}
.drawer-settings{
  padding:16px 22px;border-top:1px solid var(--edge);
  margin-top:auto;flex-shrink:0;display:flex;flex-direction:column;gap:4px;
}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0}
.setting-label{font-size:13px;color:var(--fog);display:flex;align-items:center;gap:9px}
.setting-label svg{width:15px;height:15px;opacity:.7}
.toggle{position:relative;width:42px;height:23px}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--edge);border-radius:23px;cursor:pointer;transition:.3s;border:1px solid var(--edge2)}
.toggle-track::before{content:'';position:absolute;width:17px;height:17px;left:2px;top:2px;background:var(--ghost);border-radius:50%;transition:.3s}
.toggle input:checked ~ .toggle-track{background:var(--gold);border-color:var(--gold)}
.toggle input:checked ~ .toggle-track::before{transform:translateX(19px);background:#000}
.lang-sel{background:var(--ink3);border:1px solid var(--edge);color:var(--snow);border-radius:var(--r-sm);padding:5px 10px;font-size:12px;font-family:var(--fb);outline:none;cursor:pointer}

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
header{
  position:sticky;top:0;z-index:900;
  background:rgba(8,8,14,.92);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--edge);
}
[data-theme="light"] header{background:rgba(248,248,252,.92)}

.header-row1{
  display:grid;grid-template-columns:52px 1fr 52px;
  align-items:center;padding:0 18px;height:60px;gap:12px;
}
.ham-btn{
  width:38px;height:38px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;
  background:none;border:1px solid var(--edge);border-radius:var(--r-sm);
  transition:border-color .2s,background .2s;
}
.ham-btn:hover{border-color:var(--gold);background:var(--gold-d)}
.ham-btn span{display:block;width:16px;height:1.5px;background:var(--snow);border-radius:2px;transition:transform .3s,opacity .3s}
.ham-btn.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.ham-btn.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.ham-btn.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

/* Logo */
.logo-center{display:flex;align-items:center;justify-content:center}
.logo{
  font-family:var(--fd);font-size:22px;letter-spacing:4px;
  color:var(--gold);display:flex;align-items:center;gap:8px;line-height:1;
}
.logo-ring{
  width:8px;height:8px;border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 0 2px var(--ink),0 0 0 3px var(--gold),0 0 12px var(--gold);
  animation:ring-pulse 3s ease-in-out infinite;
}
@keyframes ring-pulse{
  0%,100%{box-shadow:0 0 0 2px var(--ink),0 0 0 3px var(--gold),0 0 12px var(--gold)}
  50%{box-shadow:0 0 0 2px var(--ink),0 0 0 3px var(--gold),0 0 4px var(--gold)}
}
.search-trigger{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:none;border:1px solid var(--edge);border-radius:var(--r-sm);
  color:var(--fog);transition:border-color .2s,color .2s,background .2s;
  margin-left:auto;
}
.search-trigger:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-d)}

/* Search row */
.header-row2{padding:0 18px 14px}
.search-shell{position:relative}
.search-input{
  width:100%;height:40px;
  background:var(--ink3);border:1px solid var(--edge);border-radius:var(--r-xl);
  padding:0 44px 0 18px;color:var(--snow);
  font-family:var(--fb);font-size:13px;font-weight:400;outline:none;
  transition:border-color .25s,box-shadow .25s,background .25s;
}
.search-input::placeholder{color:var(--ghost)}
.search-input:focus{
  border-color:var(--gold);background:var(--ink4);
  box-shadow:0 0 0 3px rgba(240,180,41,.1);
}
.search-go{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--ghost);
  display:flex;align-items:center;transition:color .2s;padding:4px;
}
.search-go:hover{color:var(--gold)}

/* Search dropdown */
.search-drop{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--ink3);border:1px solid var(--edge);
  border-radius:var(--r-lg);overflow:hidden;z-index:800;
  box-shadow:var(--shadow-hover);display:none;
}
.search-drop.open{display:block}
.sdr-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid var(--edge);
}
.sdr-item:last-child{border-bottom:none}
.sdr-item:hover{background:var(--ink4)}
.sdr-thumb{
  width:72px;height:42px;border-radius:var(--r-sm);
  object-fit:cover;flex-shrink:0;background:var(--edge);
}
.sdr-info{flex:1;min-width:0}
.sdr-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--snow)}
.sdr-meta{font-family:var(--fm);font-size:10px;color:var(--ghost);margin-top:3px}
.sdr-empty{padding:24px;text-align:center;font-family:var(--fm);font-size:12px;letter-spacing:1px;color:var(--ghost)}

/* ═══════════════════════════════════════════════════
   CHANNEL STRIP
═══════════════════════════════════════════════════ */
.ch-strip{
  display:flex;align-items:center;gap:8px;
  padding:10px 18px;overflow-x:auto;
  border-bottom:1px solid var(--edge);scrollbar-width:none;
}
.ch-strip::-webkit-scrollbar{display:none}
.ch-pill{
  flex-shrink:0;padding:7px 16px;border-radius:var(--r-xl);
  font-family:var(--fm);font-size:10.5px;font-weight:700;letter-spacing:1.2px;
  cursor:pointer;white-space:nowrap;border:1.5px solid var(--edge);
  color:var(--fog);background:none;
  transition:all .22s var(--ease);display:inline-flex;align-items:center;gap:7px;
}
.ch-pill:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-d)}
.ch-pill.active{border-color:var(--gold);color:var(--gold);background:var(--gold-d);box-shadow:0 0 14px rgba(240,180,41,.2)}
.ch-pill-green{border-color:rgba(16,217,126,.35);color:var(--green)}
.ch-pill-green:hover,.ch-pill-green.active{border-color:var(--green);color:var(--green);background:var(--green-d);box-shadow:0 0 14px rgba(16,217,126,.18)}

/* ═══════════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════════ */
.main-wrap{max-width:800px;margin:0 auto;padding:28px 18px 80px;position:relative;z-index:1}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px}
.sec-title{font-family:var(--fd);font-size:22px;letter-spacing:2.5px;color:var(--snow)}
.sec-count{font-family:var(--fm);font-size:10px;color:var(--ghost);letter-spacing:1px;padding:4px 10px;border:1px solid var(--edge);border-radius:var(--r-xl)}

/* ═══════════════════════════════════════════════════
   VIDEO CARD — 2026 DESIGN
═══════════════════════════════════════════════════ */
.vgrid{display:flex;flex-direction:column;gap:0}

.vcard{
  display:block;text-decoration:none;
  position:relative;
  border-bottom:1px solid var(--edge);
  transition:background .25s var(--ease);
  padding:16px 0;
}
.vcard:first-child{border-top:1px solid var(--edge)}
.vcard:hover{background:rgba(255,255,255,.025)}
.vcard:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:var(--r)}

/* Card inner grid */
.vcard-inner{display:flex;gap:14px;align-items:flex-start}

/* Thumb */
.vcard-thumb{
  flex-shrink:0;width:160px;
  border-radius:var(--r);overflow:hidden;
  position:relative;aspect-ratio:16/9;background:var(--ink3);
}
@media(min-width:500px){.vcard-thumb{width:200px}}
.vcard-thumb img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .5s var(--ease),filter .3s;
  filter:brightness(.95);
}
.vcard:hover .vcard-thumb img{transform:scale(1.06);filter:brightness(1.05)}

/* Quality pill — top right */
.qbadge{
  position:absolute;top:7px;right:7px;z-index:2;
  font-family:var(--fm);font-size:9.5px;font-weight:700;letter-spacing:1.8px;
  color:var(--gold);background:rgba(8,8,14,.85);
  border:1px solid rgba(240,180,41,.5);border-radius:4px;
  padding:2px 7px;
  box-shadow:0 0 8px rgba(240,180,41,.2),inset 0 1px 0 rgba(255,220,80,.2);
  pointer-events:none;
}
/* Duration — bottom left */
.dbadge{
  position:absolute;bottom:6px;left:7px;z-index:2;
  font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.8px;
  color:#fff;background:rgba(8,8,14,.82);
  border-radius:4px;padding:2px 7px;
  pointer-events:none;
}

/* Card content */
.vcard-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.vcard-title{
  font-family:var(--fd);font-size:16px;font-weight:600;letter-spacing:.5px;
  color:var(--snow);line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  transition:color .2s;
}
.vcard:hover .vcard-title{color:var(--gold)}
.vcard-channel{
  font-family:var(--fm);font-size:10.5px;letter-spacing:.8px;
  color:var(--green);display:flex;align-items:center;gap:5px;
}
.vcard-channel::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex-shrink:0}
.vcard-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:2px}
.vcard-views{
  font-family:var(--fm);font-size:10.5px;font-weight:700;
  color:var(--gold);letter-spacing:.6px;
  display:inline-flex;align-items:center;gap:4px;
}
.vcard-views svg{width:8px;height:9px;fill:var(--gold)}
.vcard-cat{
  font-family:var(--fm);font-size:10px;letter-spacing:.8px;
  color:var(--ghost);background:var(--ink4);
  border:1px solid var(--edge);border-radius:var(--r-xl);
  padding:2px 9px;
}

/* ═══════════════════════════════════════════════════
   STATE MESSAGES
═══════════════════════════════════════════════════ */
.state-msg{
  padding:70px 20px;text-align:center;
  font-family:var(--fm);font-size:12px;letter-spacing:2.5px;color:var(--ghost);
}
.state-msg::before{content:'//  '}

/* ═══════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════ */
footer{
  border-top:1px solid var(--edge);padding:28px 18px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;
  position:relative;z-index:1;
}
.footer-left .footer-brand{font-family:var(--fd);font-size:16px;letter-spacing:3px;color:var(--gold)}
.footer-left .footer-copy{font-size:11px;color:var(--ghost);margin-top:3px}
.footer-links{display:flex;gap:18px;list-style:none;flex-wrap:wrap}
.footer-links a{font-size:11.5px;color:var(--ghost);transition:color .2s}
.footer-links a:hover{color:var(--gold)}

@media(max-width:480px){
  .vcard-thumb{width:120px}
  .vcard-title{font-size:14px}
}
@media print{header,footer,.drawer,.drawer-overlay{display:none}body{background:#fff;color:#000}}
</style>
</head>

      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="2,14 6,8 10,11 16,4"/><polyline points="12,4 16,4 16,8"/></svg>Trending
    </button>
    <button class="drawer-btn" onclick="setFilter('popular');closeDrawer()" data-filter="popular" type="button">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polygon points="9,2 11.5,7 17,7.6 13,11.4 14.2,17 9,14.2 3.8,17 5,11.4 1,7.6 6.5,7"/></svg>Most Popular
    </button>
    <div class="drawer-divider"></div>
    <p class="drawer-label">Categories</p>
    <div id="categoryList"></div>
    <div class="drawer-divider"></div>
    <button class="drawer-btn" onclick="alert('Upload coming soon!');closeDrawer()" type="button">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="9,2 9,12"/><polyline points="5,6 9,2 13,6"/><path d="M3,13v2a1,1,0,0,0,1,1H14a1,1,0,0,0,1-1v-2"/></svg>Upload Video
    </button>
  </div>
  <div class="drawer-settings">
    <div class="setting-row">
      <span class="setting-label">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><line x1="8" y1="1" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15"/><line x1="1" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15" y2="8"/></svg>
        Light Mode
      </span>
      <label class="toggle" aria-label="Toggle light mode">
        <input type="checkbox" id="themeToggle" onchange="toggleTheme(this)">
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="setting-row">
      <span class="setting-label">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="7"/><path d="M8 1a7 7 0 0 1 0 14"/><line x1="1" y1="8" x2="15" y2="8"/></svg>
        Language
      </span>
      <select class="lang-sel" onchange="setLang(this.value)" aria-label="Select language">
        <option value="en">English</option>
        <option value="bn">বাংলা</option>
        <option value="hi">हिन्दी</option>
        <option value="ar">العربية</option>
        <option value="es">Español</option>
      </select>
    </div>
  </div>
</nav>

<!-- ════ HEADER ════════════════════════════════════ -->
<header role="banner">
  <div class="header-row1">
    <button class="ham-btn" id="hamBtn" onclick="openDrawer()" aria-label="Open navigation" aria-expanded="false" type="button">
      <span></span><span></span><span></span>
    </button>
    <div class="logo-center">
      <a href="/" class="logo" aria-label="CineInsight Home">
        <span class="logo-ring" aria-hidden="true"></span>CINEINSIGHT
      </a>
    </div>
    <button class="search-trigger" aria-label="Focus search" onclick="document.getElementById('searchInput').focus()" type="button">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>
    </button>
  </div>
  <div class="header-row2">
    <div class="search-shell">
      <input class="search-input" type="search" id="searchInput"
        placeholder="Search titles, tags, channels…"
        autocomplete="off" spellcheck="false"
        aria-label="Search videos"
        oninput="onSearch(this.value)"
        onfocus="showDrop()" onblur="hideDrop()">
      <button class="search-go" type="button" aria-label="Search" onclick="doSearch()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/></svg>
      </button>
      <div class="search-drop" id="searchDrop" role="listbox" aria-label="Search suggestions"></div>
    </div>
  </div>
</header>

<!-- ════ CHANNEL STRIP ═════════════════════════════ -->
<div class="ch-strip" id="chStrip" role="list" aria-label="Filter by channel">
  <button class="ch-pill active" onclick="setChannel('all');activePill(this)" aria-pressed="true" type="button" role="listitem">ALL</button>
</div>

<!-- ════ MAIN ══════════════════════════════════════ -->
<main id="main" role="main">
  <div class="main-wrap">
    <div class="sec-header">
      <h1 class="sec-title" id="secTitle">Latest Videos</h1>
      <span class="sec-count" id="secCount" aria-live="polite" aria-atomic="true"></span>
    </div>
    <div id="vgrid" class="vgrid" role="list" aria-live="polite" aria-label="Video list">
      <p class="state-msg" role="status" aria-label="Loading">LOADING VIDEOS</p>
    </div>
  </div>
</main>

<!-- ════ FOOTER ════════════════════════════════════ -->
<footer role="contentinfo">
  <div class="footer-left">
    <p class="footer-brand">CINEINSIGHT</p>
    <p class="footer-copy">© <span id="footerYear"></span> CineInsight. All rights reserved.</p>
  </div>
  <ul class="footer-links">
    <li><a href="/privacy-policy">Privacy</a></li>
    <li><a href="/terms">Terms</a></li>
    <li><a href="/sitemap.xml">Sitemap</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
</footer>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getFirestore,collection,getDocs}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FB={
  apiKey:"AIzaSyBYNU7wTq9_1-TdIVuG-yxAlKjeFb9Rm_M",
  authDomain:"video-cms-b7c1e.firebaseapp.com",
  projectId:"video-cms-b7c1e",
  storageBucket:"video-cms-b7c1e.firebasestorage.app",
  messagingSenderId:"991575420179",
  appId:"1:991575420179:web:23459a09aa36f868e37ee6"
};
const db=getFirestore(initializeApp(FB));
let all=[],channel='all',filter='latest';
const e=v=>String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const PLAY=`<svg viewBox="0 0 7 8" fill="currentColor"><path d="M1 1L6 4L1 7Z"/></svg>`;

function dur(d){if(!d)return'';if(typeof d==='number'){return`${Math.floor(d/60)}:${String(d%60).padStart(2,'0')}`;}return String(d);}
function views(v){if(!v)return'';if(typeof v==='number'){if(v>=1e6)return`${(v/1e6).toFixed(1)}M`;if(v>=1000)return`${(v/1000).toFixed(1)}K`;return String(v);}return String(v).replace(/\s*views?/i,'');}

function buildCard(v){
  const a=document.createElement('a');
  a.className='vcard';
  a.href=`/video?id=${encodeURIComponent(v.id)}`;
  a.setAttribute('role','listitem');
  a.setAttribute('aria-label',`Watch: ${e(v.title)}`);
  const d=dur(v.duration),vw=views(v.views),q=e(v.quality||'4K');
  a.innerHTML=`
  <div class="vcard-inner">
    <div class="vcard-thumb">
      <img src="${e(v.thumb)}" alt="${e(v.title)} thumbnail" width="320" height="180" loading="lazy" decoding="async">
      <span class="qbadge" aria-hidden="true">${q}</span>
      ${d?`<span class="dbadge" aria-hidden="true">${e(d)}</span>`:''}
    </div>
    <div class="vcard-body">
      <h2 class="vcard-title">${e(v.title)}</h2>
      ${v.channel?`<p class="vcard-channel">${e(v.channel)}</p>`:''}
      <div class="vcard-meta">
        ${vw?`<span class="vcard-views">${PLAY}${e(vw)} views</span>`:''}
        ${v.category?`<span class="vcard-cat">${e(v.category)}</span>`:''}
      </div>
    </div>
  </div>`;
  return a;
}

async function load(){
  try{
    const snap=await getDocs(collection(db,'videos'));
    all=snap.docs.map(d=>({id:d.id,...d.data()}));
    buildStrip();buildCats();render();injectSchema();
  }catch(err){
    console.error(err);
    document.getElementById('vgrid').innerHTML='<p class="state-msg" role="alert">LOAD FAILED — REFRESH PAGE</p>';
  }
}

function buildStrip(){
  const strip=document.getElementById('chStrip');
  [...new Set(all.map(v=>v.channel).filter(Boolean))].forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='ch-pill ch-pill-green';btn.type='button';
    btn.textContent=ch;btn.setAttribute('aria-pressed','false');btn.setAttribute('role','listitem');
    btn.onclick=()=>{setChannel(ch);activePill(btn);};
    strip.appendChild(btn);
  });
}

function buildCats(){
  const list=document.getElementById('categoryList');
  [...new Set(all.map(v=>v.category).filter(Boolean))].forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='drawer-btn';btn.type='button';
    btn.innerHTML=`<svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="2" y="2" width="6" height="6" rx="1"/><rect x="10" y="2" width="6" height="6" rx="1"/><rect x="2" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/></svg>${e(cat)}`;
    btn.onclick=()=>{filter=`cat:${cat}`;channel='all';render();activePill(document.querySelector('.ch-pill'));closeDrawer();};
    list.appendChild(btn);
  });
}

window.setChannel=function(ch){channel=ch;render();};
window.setFilter=function(type){
  filter=type;channel='all';
  document.querySelectorAll('.drawer-btn[data-filter]').forEach(b=>b.classList.remove('active'));
  const a=document.querySelector(`.drawer-btn[data-filter="${type}"]`);if(a)a.classList.add('active');
  activePill(document.querySelector('.ch-pill'));render();
};
window.activePill=function(el){
  document.querySelectorAll('.ch-pill').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-pressed','false');});
  if(el){el.classList.add('active');el.setAttribute('aria-pressed','true');}
};

function render(){
  let vids=[...all];
  if(channel!=='all')vids=vids.filter(v=>v.channel===channel);
  const titleEl=document.getElementById('secTitle');
  if(filter==='latest'){vids.sort((a,b)=>(b.uploadDate||'').localeCompare(a.uploadDate||''));titleEl.textContent='Latest Videos';}
  else if(filter==='trending'){vids.sort((a,b)=>parseFloat(b.views||0)-parseFloat(a.views||0));vids=vids.slice(0,20);titleEl.textContent='Trending Now';}
  else if(filter==='popular'){vids.sort((a,b)=>parseFloat(b.views||0)-parseFloat(a.views||0));titleEl.textContent='Most Popular';}
  else if(filter.startsWith('cat:')){const cat=filter.slice(4);vids=vids.filter(v=>v.category===cat);titleEl.textContent=cat;}
  const grid=document.getElementById('vgrid'),cnt=document.getElementById('secCount');
  if(!vids.length){grid.innerHTML='<p class="state-msg">NO VIDEOS FOUND</p>';cnt.textContent='';return;}
  grid.innerHTML='';vids.forEach(v=>grid.appendChild(buildCard(v)));
  cnt.textContent=`${vids.length} videos`;
}

/* Search */
let st;
window.onSearch=q=>{clearTimeout(st);st=setTimeout(()=>runSearch(q),200)};
function runSearch(q){
  const drop=document.getElementById('searchDrop');
  q=q.trim().toLowerCase();
  if(!q){drop.innerHTML='';drop.classList.remove('open');return;}
  const res=all.filter(v=>{
    const tags=Array.isArray(v.tags)?v.tags.join(' ').toLowerCase():(v.tags||'').toLowerCase();
    return(v.title||'').toLowerCase().includes(q)||tags.includes(q)||(v.category||'').toLowerCase().includes(q);
  }).slice(0,7);
  if(!res.length){drop.innerHTML=`<p class="sdr-empty">NO RESULTS FOR "${e(q)}"</p>`;drop.classList.add('open');return;}
  drop.innerHTML='';
  res.forEach(v=>{
    const a=document.createElement('a');
    a.className='sdr-item';a.href=`/video?id=${encodeURIComponent(v.id)}`;
    a.setAttribute('role','option');
    a.innerHTML=`<img class="sdr-thumb" src="${e(v.thumb)}" alt="" loading="lazy"><div class="sdr-info"><p class="sdr-title">${e(v.title)}</p><p class="sdr-meta">${e(views(v.views)||'')} views · ${e(dur(v.duration)||'')}</p></div>`;
    drop.appendChild(a);
  });
  drop.classList.add('open');
}
window.showDrop=()=>{if(document.getElementById('searchInput').value.trim())document.getElementById('searchDrop').classList.add('open');};
window.hideDrop=()=>{setTimeout(()=>document.getElementById('searchDrop').classList.remove('open'),220)};
window.doSearch=()=>runSearch(document.getElementById('searchInput').value);

/* Drawer */
window.openDrawer=()=>{document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');document.getElementById('hamBtn').classList.add('open');document.getElementById('hamBtn').setAttribute('aria-expanded','true');document.body.style.overflow='hidden';};
window.closeDrawer=()=>{document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');document.getElementById('hamBtn').classList.remove('open');document.getElementById('hamBtn').setAttribute('aria-expanded','false');document.body.style.overflow='';};

/* Theme */
window.toggleTheme=cb=>{document.documentElement.setAttribute('data-theme',cb.checked?'light':'dark');localStorage.setItem('ci-theme',cb.checked?'light':'dark');};
window.setLang=lang=>{document.documentElement.setAttribute('lang',lang);localStorage.setItem('ci-lang',lang);};

/* Schema */
function injectSchema(){
  document.getElementById('videoListSchema').textContent=JSON.stringify({
    '@context':'https://schema.org','@type':'ItemList',
    name:'Videos on CineInsight',url:'https://cineinsight.info/',
    itemListElement:all.slice(0,20).map((v,i)=>({'@type':'ListItem',position:i+1,name:v.title,url:`https://cineinsight.info/video?id=${encodeURIComponent(v.id)}`}))
  });
}

/* Init */
document.getElementById('footerYear').textContent=new Date().getFullYear();
const t=localStorage.getItem('ci-theme');
if(t==='light'){document.documentElement.setAttribute('data-theme','light');document.getElementById('themeToggle').checked=true;}
const l=localStorage.getItem('ci-lang');if(l)document.documentElement.setAttribute('lang',l);
load();
</script>
</body>
</html>

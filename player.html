<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkTube — Player</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <div class="logo-icon">&#9658;</div>
        <span class="logo-dark">Dark</span><span class="logo-tube">Tube</span>
    </a>
    <div class="header-badge">NOW PLAYING</div>
</header>

<div class="player-layout">

    <!-- Main Player -->
    <div class="player-main">
        <div class="player-box">
            <video id="videoPlayer" controls autoplay></video>
        </div>

        <div class="video-info">
            <div class="video-title" id="videoTitle">Loading...</div>
            <div class="video-divider"></div>
            <div class="video-stats">
                <div class="stat-item">
                    <span class="stat-icon">&#9654;</span>
                    <span id="videoViews">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">&#128337;</span>
                    <span id="videoDate">—</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="player-sidebar">
        <div class="sidebar-header">
            <div class="section-dot"></div>
            <div class="sidebar-title">Related</div>
            <div class="sidebar-count" id="relatedCount">0</div>
        </div>
        <div class="related-list" id="relatedVideos"></div>
    </div>

</div>

<script type="module" src="js/player.js"></script>
</body>
</html>
